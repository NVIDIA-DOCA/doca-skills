id: discover-doca-environment
goal: Discover the local DOCA source, package, device, and capability context before selecting runtime commands.
source_globs:
  - VERSION
  - meson.build
  - meson_options.txt
  - libs/**/include/public/**/*.h
capabilities:
  - doca-sdk
risk_class: read-only
command_kind: discovery
inputs:
  - {"name": "repo_root", "type": "path", "required": false, "description": "Repository root or source-package root to inspect; default is the current working directory."}
  - {"name": "focus_paths", "type": "array", "required": false, "description": "Optional source paths that limit discovery to the files relevant to the task."}
outputs:
  - {"name": "source_version", "type": "string", "description": "Version read from source metadata when present."}
  - {"name": "available_capabilities", "type": "array", "description": "Capability IDs present in the packaged agent manifest."}
  - {"name": "capability_discovery_data", "type": "object", "description": "Device, library, mode, offload, version, and constraint data from matching capability contracts."}
  - {"name": "experimental_api_summary", "type": "object", "description": "Experimental API count summary when SDK headers are present."}
  - {"name": "read_only_environment_sensors", "type": "object", "description": "Read-only package, device, and capability discovery command results, including missing or failed utilities."}
structured_errors:
  - {"code": "missing_source_metadata", "message": "Expected source metadata is absent from the package view.", "recovery": "Report the reduced source view and avoid guessing package or version facts."}
  - {"code": "missing_discovery_tool", "message": "A documented discovery utility is unavailable.", "recovery": "Stop at source-backed facts and record the missing utility."}
  - {"code": "ambiguous_environment", "message": "Source and installed package context disagree.", "recovery": "Ask which environment is authoritative before runtime actions."}
result_schema: contracts/schemas/task-result.schema.json
sensors:
  - Read VERSION and package metadata present in the source or installation.
  - Inspect selected SDK headers for DOCA_EXPERIMENTAL before using APIs.
  - Use documented DOCA device or capability discovery utilities when available.
  - Treat sample PCI addresses, IB device names, interface names, and representor names as placeholders until discovered locally.
actuators:
  - Run read-only source inspection commands.
  - Run read-only version, package, and device discovery commands when available.
constraints:
  - Do not mutate device state, networking, package installation, hugepages, devlink, sysfs, credentials, or persistent configuration during discovery.
  - Do not convert example command values into environment facts.
  - Mark missing discovery utilities or missing hardware as blockers rather than guessing.
approval_required_for:
  - Any mutation beyond read-only discovery.
  - Any package upgrade, firmware action, persistent configuration, device state change, network change, hugepage change, devlink write, or sysfs write.
verifier:
  - Record the exact source paths and read-only commands used for discovery.
  - Confirm every runtime value used later came from a sensor or from explicit user input.
  - Inspect SDK headers for DOCA_EXPERIMENTAL markers before making quantitative experimental-API claims.
recovery:
  - If discovery fails, stop with the missing prerequisite and avoid runtime actions.
  - If conflicting source and installed versions are found, ask which environment is authoritative.
  - If a value came from a sample instead of a sensor, discard it and rerun discovery.
