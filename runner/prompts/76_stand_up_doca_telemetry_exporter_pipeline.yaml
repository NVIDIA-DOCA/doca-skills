id: "76_stand_up_doca_telemetry_exporter_pipeline"
name: "Stand up a DOCA Telemetry exporter pipeline for a class-of-workload, validate the schema, and confirm the exporter is actually shipping the metrics you expect end-to-end — class-shaped"
description: |
  Class-shaped DOCA Telemetry exporter-pipeline prompt.
  The HEADLINE is the class ("stand up a DOCA Telemetry
  exporter pipeline against a class of workload,
  validate the counter schema with `doca_telemetry_utils`,
  and confirm the exporter is actually shipping the
  metrics you expect end-to-end on this device with this
  DOCA version"); the worked example is a BlueField-3
  ingestion pipeline that needs to ship PCIe-link
  diagnostic counters (e.g. the
  `pcie_link_write_stalled_time_*` family with `node`,
  `pcie_index`, `depth`, `unit` property dimensions)
  into a downstream collector so an SRE team can spot
  PCIe back-pressure events on a customer fabric. The
  newly-covered tool is `skills/tools/doca-telemetry-utils`.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent
  to drive ANY exporter-pipeline-stand-up question:
  separate the operator-side support tool
  (`doca-telemetry-utils`) from the developer-side
  collector library (`doca-telemetry`) from the
  developer-side publisher library
  (`doca-telemetry-exporter`) from a DOCA Telemetry
  Service deployment (DTS) — conflating these is the
  most common telemetry first-touch error; enumerate the
  device's actual counter schema via
  `doca_telemetry_utils get-counters` BEFORE committing
  any counter name to the exporter config; resolve every
  candidate counter name into its Data ID and property
  dimensions and gate it against the per-device
  capability probe BEFORE the config commits; refuse to
  invent counter names, property dimension values, or
  Data ID spellings; treat a name that resolves to a
  Data ID the device does not support as the canonical
  "silently dropped metric" failure mode; capture the
  four-tuple (DOCA version, device PCI / generation,
  counter Data IDs + properties, exporter config) for
  the deployment; smoke the exporter end-to-end before
  scaling; walk the layered debug ladder when the
  pipeline is silent downstream; cross-link
  `doca-telemetry` for the developer-side library
  decision; generalize to another counter family or
  another device generation.

  A baseline agent without skills typically: collapses
  `doca-telemetry-utils`, `doca-telemetry`, the
  exporter, and DTS into "DOCA telemetry"; commits a
  counter name to the exporter config without checking
  the device actually exposes it (silent metric drop);
  invents property dimension values from generic
  intuition; quotes a Data ID spelling from memory as
  authoritative; jumps from "config written" to "pipeline
  deployed" without an end-to-end smoke that proves
  the downstream collector actually receives events;
  treats a silent downstream as "collector misconfig"
  instead of working the layered ladder (schema mismatch
  → unsupported counter → Data ID skew → version skew
  → transport).

prompt: |
  I run platform telemetry for our BlueField-3 fleet,
  and I have been asked to stand up a DOCA Telemetry
  exporter pipeline that ships PCIe-link diagnostic
  counters from each BlueField into our downstream
  collector so our SRE team can correlate PCIe
  back-pressure events against customer-fabric
  incidents. Specifically, the counter family we want
  is `pcie_link_write_stalled_time_*` with the
  property dimensions documented in the public DOCA
  Telemetry guide (`node`, `pcie_index`, `depth`,
  `unit`). I have `doca_telemetry_utils` available on
  the BlueField and DOCA installed; I have not stood
  up a DOCA Telemetry exporter before.

  Walk me through:

  1. First, draw the surfaces for me. People keep
     saying "DOCA Telemetry" as if it's one thing,
     but I can see at least three names floating
     around (`doca_telemetry_utils`,
     `doca-telemetry`, `doca-telemetry-exporter`)
     plus something called "DOCA Telemetry Service".
     Which of these is the developer-side collector
     library, which is the developer-side publisher
     library, which is the operator-side support
     tool I'm here for, and which is the productized
     service deployment? Be explicit that conflating
     them is the most common first-touch telemetry
     error. Tell me which one this skill
     (`doca-telemetry-utils`) is and which other
     skills I should co-load for the developer-side
     library decision.
  2. Locate the AUTHORITATIVE counter schema for
     MY BlueField-3 before I commit any counter
     name to the exporter config. I have heard of
     `doca_telemetry_utils get-counters`. Walk me
     through what that invocation enumerates —
     does it return every counter the DOCA
     diagnostic-data surface knows about
     in general, or every counter THIS device
     actually exposes? Tell me explicitly which
     question this answers and which it does not.
  3. For my chosen counter family
     (`pcie_link_write_stalled_time_*`), walk me
     through resolving a candidate counter name into
     its Data ID AND its property dimensions
     (`node`, `pcie_index`, `depth`, `unit`) via
     the name → ID invocation
     (`doca_telemetry_utils <name> [props]`). Tell
     me what each property dimension MEANS for
     this counter family (node, pcie_index, depth,
     unit). Do NOT invent the documented values
     from generic intuition — if I ask for the
     valid value set for `depth` and you don't
     have it from the shipped tool's output, say
     so and tell me where to look (the public
     DOCA Telemetry guide on `docs.nvidia.com`
     reachable via
     `doca-public-knowledge-map ## DOCA tools`).
  4. CRITICAL — before I commit anything to the
     exporter config, walk me through the
     per-device capability probe
     (`<device PCI> <name> [properties]`). Why is
     this the gate-before-commit step? What
     happens if I commit a counter name to the
     exporter config and the device does NOT
     support it under the property dimensions I
     chose? Tell me explicitly that this is the
     canonical "silently dropped metric" failure
     mode — the exporter does NOT fail loudly, it
     just emits nothing for that counter — and
     that the gate must happen BEFORE the config
     commits, not after.
  5. I have a Data ID from a captured log from
     someone else's pipeline
     (`0x1160000600030201`). Walk me through the
     reverse-resolve invocation
     (`doca_telemetry_utils <DATA_ID>`) — what does
     it tell me, and why does the Data ID encode
     the property dimensions (not just the
     counter name)? This matters because if my
     exporter config and someone else's exporter
     config emit "the same counter" with different
     property dimensions, the Data IDs differ and
     the downstream collector sees them as
     different metrics.
  6. Tell me the FIRST thing I should run end-to-
     end after the exporter config is written. I
     want the cheapest possible smoke that proves
     the full chain works — the BlueField is
     producing counters under the Data IDs my
     config commits to, the exporter is shipping
     them, and the downstream collector is
     receiving events with those Data IDs.
     What does passing look like? What does
     failing look like (in particular, what does
     "exporter started fine but downstream
     collector is silent" mean and where do I
     look)? Tell me explicitly NOT to skip the
     end-to-end smoke and declare the pipeline
     deployed because the exporter process is
     running.
  7. When the downstream collector is silent,
     walk me through the layered debug ladder in
     order: (a) is `doca_telemetry_utils`
     installed and is the paired `doca-telemetry`
     library on the matching schema version
     (route to
     [`doca-version`](../../doca-version/SKILL.md))?
     (b) did the counter name resolve to the
     Data ID I expected, with the property
     dimensions I committed to? (c) did the
     per-device probe confirm THIS device
     actually exposes that Data ID? (d) did the
     downstream collector get the events but
     dropped them on a schema-version skew? (e)
     is it a transport-side failure
     (network / DTS / exporter runtime config)?
     For each layer, name the canonical
     first-stop check and which skill or public
     doc to consult. Tell me when to STOP
     retrying and escalate.
  8. Tell me what I MUST CAPTURE alongside the
     deployed pipeline so the next operator can
     either reproduce it or rule out a difference
     from their setup. Walk me through the
     capture set: DOCA version (anchored
     against `doca-version`), BlueField generation
     and PCI address(es), the resolved Data IDs
     (NOT just the counter names — the Data IDs,
     because the property dimensions are encoded
     into them) and their property values, the
     exporter config verbatim, the downstream
     collector schema version. Why is each leg
     required?

  After that, briefly generalize: name ONE OTHER
  instance of this class — for example, switching
  the counter family from
  `pcie_link_write_stalled_time_*` to a different
  family on the same BlueField-3 (e.g. an
  RDMA-port-bytes counter family with different
  property dimensions, same exporter config
  pattern), OR keeping the
  `pcie_link_write_stalled_time_*` family but
  switching from BlueField-3 to a different
  device generation (different per-device
  capability surface, same workflow) — and
  identify which parts of your answer above STAY
  THE SAME (the four-surface decomposition rule,
  the enumerate-before-config rule, the
  name → Data ID + properties resolution step,
  the per-device gate-before-commit rule, the
  end-to-end smoke, the Data-ID-encodes-
  properties rule, the four-tuple capture
  including Data IDs not names) versus which
  CHANGE (which counter family applies, which
  property dimensions matter, which device
  capability surface, which counters are
  supported under which property values).

context:
  audience: "intermediate"
  intent: "stand_up_doca_telemetry_exporter_pipeline_end_to_end"
  prior_knowledge: "runs platform telemetry for a BlueField-3 fleet, has DOCA installed and doca_telemetry_utils available, has been asked to ship pcie_link_write_stalled_time_* counter family with documented property dimensions (node, pcie_index, depth, unit) into a downstream collector, has not stood up a DOCA Telemetry exporter before, may confuse doca-telemetry-utils with doca-telemetry, the developer-side exporter library, and DTS"
  baseline_artifact: "doca-telemetry-utils"
  changed_skill_in_pr: "tools/doca-telemetry-utils"
  expected_skill_co_load:
    - "doca-telemetry-utils"
    - "doca-telemetry"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-debug"
    - "doca-hardware-safety"

criteria:
  - id: "four_surfaces_decomposition_drawn"
    label: "Draws the four-surface decomposition (utils tool vs collector lib vs exporter lib vs DTS service) and routes correctly"
    weight: 3
    pass_when: |
      In response to question 1, the agent
      explicitly draws the four surfaces:
      (a) `doca_telemetry_utils` is the
      operator-side support CLI (this skill);
      (b) `doca-telemetry` is the developer-side
      collector library;
      (c) `doca-telemetry-exporter` is the
      developer-side publisher library;
      (d) DTS (DOCA Telemetry Service) is the
      productized service deployment. The agent
      must state that conflating them is the most
      common first-touch telemetry error and must
      cross-link `doca-telemetry` as a co-load
      for the developer-side library decision. A
      response that collapses two or more of
      these surfaces into one, that omits the
      cross-link, or that asserts a different
      decomposition, fails.

  - id: "enumerate_schema_before_config_commits"
    label: "Routes through get-counters schema enumeration BEFORE committing any counter name to the exporter config"
    weight: 3
    pass_when: |
      In response to question 2, the agent
      explicitly walks `doca_telemetry_utils
      get-counters` as the schema-discovery step
      to run BEFORE writing the exporter config.
      The agent must clarify whether the
      invocation enumerates every counter the
      DOCA diagnostic-data surface knows about
      (the broader set) or only the counters
      this specific device exposes (a narrower
      set requires the per-device probe in step
      4). The agent must NOT skip schema
      enumeration and jump to the config write.
      A response that omits the enumeration
      step, that treats it as optional, or that
      claims `get-counters` is already
      per-device without naming the separate
      per-device probe, fails.

  - id: "name_to_data_id_and_properties_resolution"
    label: "Resolves counter name → Data ID + property dimensions and refuses to invent property values"
    weight: 3
    pass_when: |
      In response to question 3, the agent walks
      the `doca_telemetry_utils <name> [props]`
      resolution step and explains the four
      property dimensions documented for the
      `pcie_link_write_stalled_time_*` family
      (`node`, `pcie_index`, `depth`, `unit`) at
      the level of what each one MEANS for that
      counter family. The agent must REFUSE to
      invent specific documented values for the
      property dimensions from generic
      intuition; if the user asks for the valid
      value set for a dimension and the agent
      cannot point to it from the shipped tool's
      output, the agent says so and routes to
      the public DOCA Telemetry guide on
      `docs.nvidia.com` (via
      `doca-public-knowledge-map ## DOCA tools`).
      A response that invents property values,
      that asserts specific value sets from
      memory as authoritative, or that omits
      the property-dimension story, fails.

  - id: "per_device_gate_before_commit_named"
    label: "Names the per-device capability probe as the gate-before-commit step and surfaces the silent-drop failure mode"
    weight: 3
    pass_when: |
      In response to question 4, the agent
      walks the per-device capability probe
      (`<device PCI> <name> [properties]`) as
      the gate-before-commit step before any
      counter name lands in the exporter
      config. The agent must explicitly state
      that a counter name resolving to a Data
      ID the device does NOT support under the
      chosen property dimensions is the
      canonical "silently dropped metric"
      failure mode — the exporter does NOT
      fail loudly; it just emits nothing for
      that counter — and that the gate must
      happen BEFORE the config commits, not
      after. A response that omits the probe,
      that treats the probe as optional, or
      that does not surface the silent-drop
      failure mode as canonical, fails.

  - id: "data_id_encodes_properties_rule"
    label: "States the Data-ID-encodes-properties rule and explains the reverse-resolve correctly"
    weight: 2
    pass_when: |
      In response to question 5, the agent
      explains that the Data ID encodes BOTH
      the counter identity AND the property
      dimensions, so two exporter configs that
      ship "the same counter" with different
      property dimensions produce different
      Data IDs and the downstream collector
      sees them as different metrics. The
      agent walks the reverse-resolve
      invocation (`doca_telemetry_utils
      <DATA_ID>`) as the correct way to
      translate a captured Data ID back to its
      name and property dimensions. A response
      that treats the Data ID as a pure name
      hash, that omits the property-dimension
      encoding, or that asserts two configs
      shipping "the same counter" will produce
      the same Data ID regardless of properties,
      fails.

  - id: "end_to_end_smoke_before_declaring_deployed"
    label: "Walks the end-to-end smoke (BlueField produces → exporter ships → downstream collector receives) BEFORE declaring the pipeline deployed"
    weight: 3
    pass_when: |
      In response to question 6, the agent walks
      the explicit ordered end-to-end smoke
      AFTER the exporter config is written:
      (a) confirm the BlueField is producing
      counters under the Data IDs the config
      commits to; (b) confirm the exporter is
      shipping them; (c) confirm the downstream
      collector is receiving events under those
      Data IDs; (d) only THEN declare the
      pipeline deployed. The agent must
      explicitly state that the exporter
      process running is NOT proof the
      pipeline is deployed — a silent downstream
      collector is a deployment failure even
      with a happy exporter. A response that
      skips the end-to-end smoke, that treats
      a running exporter as proof of
      deployment, or that omits the
      "exporter running but downstream
      silent" failure case, fails.

  - id: "layered_debug_ladder_for_silent_downstream"
    label: "Walks the layered debug ladder when the downstream collector is silent"
    weight: 3
    pass_when: |
      In response to question 7, the agent
      walks the layered debug ladder in order:
      install / version match → name → Data ID
      resolution → per-device support →
      schema-version skew at the collector →
      transport-side failure. For each layer
      the agent names the canonical first-stop
      check and which skill or public doc to
      consult (`doca-setup`, `doca-version`,
      `doca-telemetry`, `doca-debug`, the
      public DOCA Telemetry guide on
      `docs.nvidia.com`). The agent must say
      when to STOP retrying and escalate. A
      response that omits a layer, that
      collapses the ladder, or that asserts a
      transport-side fix without working the
      schema-side layers first, fails.

  - id: "capture_set_uses_data_ids_not_names"
    label: "Capture set required for the deployed pipeline uses Data IDs (not just counter names) to preserve the property-dimension encoding"
    weight: 3
    pass_when: |
      In response to question 8, the agent
      enumerates the capture set required for
      the deployed pipeline: DOCA version
      (anchored against `doca-version`),
      BlueField generation and PCI address(es),
      the resolved DATA IDs (not just the
      counter names — Data IDs, because the
      property dimensions are encoded into
      them) and their property values, the
      exporter config verbatim, the downstream
      collector schema version. The agent must
      explain why each leg is required. A
      response that captures only counter
      names (losing the property-dimension
      encoding), that omits the Data IDs, or
      that treats capture as optional, fails.

  - id: "no_invented_data_ids_or_property_values"
    label: "Does not invent Data ID spellings, counter names beyond the family, or property dimension values from memory"
    weight: 3
    pass_when: |
      The agent does NOT quote a specific
      Data ID spelling for the
      `pcie_link_write_stalled_time_*` family
      from memory as authoritative, does NOT
      quote a specific property dimension value
      set (for `node`, `pcie_index`, `depth`,
      `unit`) from memory as authoritative, and
      does NOT invent counter names beyond the
      family the user named. The agent states
      that the authoritative source for the
      schema is `doca_telemetry_utils
      get-counters` on the user's install plus
      the public DOCA Telemetry guide on
      `docs.nvidia.com` (reachable via
      `doca-public-knowledge-map ## DOCA tools`).
      If the agent DOES surface a candidate
      spelling, it must be framed as a sketch
      with the user told to verify it against
      the tool output. Inventing a spelling
      and presenting it as authoritative fails
      — that is the canonical hallucination
      failure mode for this skill.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from pcie_link_write_stalled_time_* on BlueField-3 to another counter family or another device generation"
    weight: 2
    pass_when: |
      The agent explicitly addresses the
      generalization part of the prompt: it
      walks at least ONE OTHER instance —
      either switching the counter family on
      the same device (e.g. an
      RDMA-port-bytes counter family with
      different property dimensions) OR
      keeping the same counter family but
      switching the device generation
      (different per-device capability
      surface) — and identifies which parts
      STAY THE SAME (the four-surface
      decomposition rule, the
      enumerate-before-config rule, the
      name → Data ID + properties resolution
      step, the per-device gate-before-commit
      rule, the end-to-end smoke, the
      Data-ID-encodes-properties rule, the
      four-tuple capture rule using Data IDs
      not names) versus which CHANGE (which
      counter family applies, which property
      dimensions matter, which device
      capability surface, which counters are
      supported under which property values).
      A response that walks only the worked
      example and is silent on the broader
      class fails this criterion.
