id: "65_measure_doca_flow_dpa_offload_performance"
name: "Measure DPA-offloaded doca-flow performance for a class-of-traffic workload and decide whether DPA-offload is the right path — class-shaped"
description: |
  Class-shaped DPA-offloaded Flow performance prompt. The
  HEADLINE is the class ("measure DPA-offloaded doca-flow
  performance for a class-of-traffic workload on DPA-capable
  hardware, and decide whether DPA-offload is the right path
  for the workload"); the worked example is a path-selector
  update workload on BlueField-3 because that is the worked
  example the shipped doca/tools/flow_dpa_perf README documents
  and the newly-covered tool in skills/tools/doca-flow-dpa-perf.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  drive ANY DPA-Flow-perf-class question: separate the DPA path
  from the host / DPU-CPU path (route to `doca-flow-perf` for
  the latter); confirm hardware preconditions (ConnectX-7+ /
  BlueField-3+, VNF Flow mode, PF/VF not SF) before invoking;
  pick the active / passive device split; pick workload-shape
  axes (operation, burst, queue, completion threshold, PSL
  tables, table size, workers, algo, work policy); read
  iteration statistics (median + max + standard deviation) not
  just the average; capture the four-tuple AND the tool name;
  refuse to invent flag strings or default values from memory;
  cross-link `doca-version` for the four-way match;
  generalize from update operation to disable, and from one
  device class to another.

  A baseline agent without skills typically: conflates DPA-Flow
  perf with host-side Flow perf and quotes one number as the
  other; invents flag strings like `doca_flow_dpa_perf
  --offload dpa` from generic CLI knowledge; recommends running
  on BlueField-2 without checking the DPA-capable hardware set;
  recommends an SF device target despite the shipped README
  explicitly excluding SFs; quotes an average Kops/sec number
  without the median, max, or standard deviation; jumps from a
  single small run straight to a parameter sweep without a
  smoke; cannot generalize to a different operation (disable),
  algorithm (identity vs random), or device class.

prompt: |
  I have a doca-flow application that programs path-selector
  entries through DOCA Flow on a BlueField-3 host, and someone
  has suggested I move the rule update path onto the DPA so
  the host CPU stops being the bottleneck. Before I commit to
  the DPA-offload, I want to measure what the DPA path can
  actually deliver for *my* workload and I want a defensible
  Kops/sec number with the iteration stats I can quote in a
  design review.

  Walk me through:

  1. First, is this the right tool for the question? People
     keep telling me about `doca_flow_perf` and
     `doca_flow_dpa_perf` interchangeably. What is the
     boundary between them — which path does each one measure,
     when do I reach for one versus the other, and what is the
     classic apples-to-oranges failure if I quote a number
     from one as if it came from the other?
  2. Tell me the hardware preconditions for `doca_flow_dpa_perf`
     before I burn time. I have a fleet that mixes
     BlueField-2, BlueField-3, and an older ConnectX. Which of
     those can I run this tool against, which can I not, and
     where is that documented? I do NOT want you to assume any
     of my devices are DPA-capable from generic knowledge; if
     you do not know, tell me where to look on my installed
     version. Cover SF / VF / PF device targets too —
     specifically, can I use an SF for this tool?
  3. Walk me through the active / passive device split. My
     BlueField-3 is two-port; if I were on a one-port
     ConnectX-9 instead, would the invocation shape change?
     Tell me the difference and why.
  4. Walk me through the workload-shape axes I have to commit
     to BEFORE I run anything. My workload is an update
     workload (not disable-enable). Class-level only — name
     each axis (burst, queue, completion threshold, PSL
     tables, table size, workers, hash pipe algo, work policy,
     warmup, pipeline policy) and tell me what wrong choice
     would silently do to my session, but do NOT invent
     specific default values for me — point me at the shipped
     README on my install and `--help` on my binary as the
     authoritative source.
  5. Tell me the first thing I should run. I want the cheapest
     smoke that confirms the tool can bind my active / passive
     device pair, start the DPA path, and emit defensible
     iteration stats — not a final Kops/sec number. What do I
     read off the smoke to decide whether to commit to a
     bigger run? Specifically tell me what the iteration-stats
     block in the output looks like when the smoke is healthy
     (median ≈ max + low standard deviation + warmup having
     taken effect) and what it looks like when it is not.
  6. After the smoke is clean, walk me through capturing a
     defensible Kops/sec baseline. What four-tuple do I have to
     capture alongside the iteration stats so someone else can
     re-run and compare? What is the rule for naming which
     tool produced the number when the number ends up next to
     a `doca_flow_perf` number on the same workload?
  7. If the tool reports zero ops, hangs, fails the self-test,
     or produces a wildly variable Kops/sec — walk me through
     the layered diagnosis. I want to know which layer I am in
     (config-syntax / device-binding / dpa-precondition /
     workload-precondition / measurement-soundness / self-test
     / version / cross-cutting) and which skill or public doc
     I should be reading at each layer. Tell me when I am
     supposed to STOP retrying and escalate.
  8. How do I know the `doca_flow_dpa_perf` binary on my host,
     the `doca-flow` library version on the host the
     application links against, and the DPA programming
     runtime are all from the same DOCA install? What is the
     right way to handle it if they are not?

  After that, briefly generalize: name ONE OTHER instance of
  this measurement class — for example, switching from the
  update operation to the disable-enable operation on the same
  hardware, or repeating the same update workload on a
  different DPA-capable device class (a one-port ConnectX-9
  active-only setup) — and identify which parts of your answer
  above STAY THE SAME (the DPA-vs-host boundary, the
  workload-shape decision, the iteration-stats reading rule,
  the four-tuple + tool-name capture rule, the version overlay
  via `doca-version`) versus which CHANGE (which DPA-side
  paths each operation exercises, whether the active / passive
  split is two-port or one-port, the algo / operation
  compatibility per the README, the expected order-of-
  magnitude of the resulting Kops/sec number).

context:
  audience: "intermediate"
  intent: "measure_dpa_offloaded_flow_performance"
  prior_knowledge: "has a BlueField-3 host with DOCA installed and a doca-flow application that programs path-selector entries, has a fleet that mixes DPA-capable and non-DPA-capable hardware, has heard about doca_flow_perf and doca_flow_dpa_perf but has not used either, wants a defensible Kops/sec number with iteration stats, is explicitly NOT looking for an invented flag string"
  baseline_artifact: "doca-flow-dpa-perf"
  changed_skill_in_pr: "tools/doca-flow-dpa-perf"
  expected_skill_co_load:
    - "doca-flow-dpa-perf"
    - "doca-flow"
    - "doca-flow-perf"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-debug"
    - "doca-hardware-safety"

criteria:
  - id: "dpa_vs_host_boundary_named"
    label: "Names the DPA-path vs host-path boundary and routes the host-path question to doca-flow-perf"
    weight: 3
    pass_when: |
      In response to question 1, the agent explicitly states
      the boundary: `doca_flow_dpa_perf` measures the
      DPA-offloaded Flow rule update / disable path on a
      DPA-capable device; `doca_flow_perf` measures the host /
      DPU-CPU Flow path. The agent must say that quoting a
      number from one as if it came from the other is the
      cross-tool apples-to-oranges failure and must cite both
      skills explicitly. A response that conflates the two
      tools, that omits the boundary, or that asserts the two
      numbers are interchangeable, fails.

  - id: "hardware_preconditions_named"
    label: "Names the device-class preconditions (ConnectX-7+ / BlueField-3+, VNF mode, no SFs) and refuses to assume DPA capability"
    weight: 3
    pass_when: |
      In response to question 2, the agent explicitly names
      the device-class preconditions: ConnectX-7 lower bound
      (ConnectX-8 recommended-or-later per the shipped
      README), BlueField-3 supported, BlueField-2 NOT
      supported, pre-ConnectX-7 NOT supported. The agent must
      also state that VNF Flow mode is required and that SFs
      are NOT supported on the DPA path (PF recommended; VF
      acceptable; SF refused). The agent must route the
      authoritative version of the support set to the public
      DOCA Flow DPA Perf page plus the shipped README on the
      user's install, not to memory. A response that assumes
      DPA capability on BlueField-2, that omits the SF
      exclusion, or that asserts the support set without
      citing the shipped README, fails.

  - id: "active_passive_split_named"
    label: "Names the active / passive device split and adapts to one-port vs two-port hardware"
    weight: 2
    pass_when: |
      In response to question 3, the agent explicitly names
      the active / passive device split: two-port boards
      (BlueField-3, ConnectX-8 in two-port mode) run an
      active steering device + a passive outgoing-traffic
      device; one-port boards (ConnectX-9 single-port mode)
      run active only and drop traffic on the steering
      pipeline. The agent must say the invocation shape
      changes between the two cases per the shipped README's
      example invocations. A response that invents a hybrid
      invocation, that treats the one-port case as a
      configuration error of the two-port case, or that
      omits the split entirely, fails.

  - id: "workload_shape_axes_named_class_level"
    label: "Names the workload-shape axes at the class level without inventing default values"
    weight: 3
    pass_when: |
      In response to question 4, the agent walks the
      workload-shape axes at the CLASS level — burst, queue,
      completion threshold, number of PSL tables, table
      size, workers, hash pipe algorithm, work policy,
      warmup, pipeline policy — and says what a wrong choice
      would silently do (silent narrowing, ambiguous
      attribution, divisibility / power-of-2 / range
      violations). The agent must NOT invent specific
      default values from memory; the authoritative source
      is the shipped README on the user's install and
      `--help` on the binary, and the agent must point the
      user there explicitly. A response that invents
      specific default values (e.g. asserting a default
      burst size or queue size from memory), that collapses
      the axes into one undifferentiated "workload" axis, or
      that omits axes, fails.

  - id: "smoke_before_bulk_with_iteration_stats"
    label: "Walks the smoke-before-bulk loop and reads iteration stats correctly"
    weight: 3
    pass_when: |
      In response to question 5, the agent walks the
      explicit ordered flow: (a) FIRST a small smoke run
      with small `num-operations`, small `num-iterations`,
      warmup enabled, single worker; (b) THEN read the
      printed parameter set (the tool's own echo line); (c)
      THEN inspect iteration statistics — median ≈ max + low
      standard deviation + warmup-having-taken-effect is the
      soundness signal; high standard deviation or missing
      warmup is a flag; (d) ONLY THEN plan a longer / swept
      run. The agent must NOT collapse the sequence, must
      NOT quote an average Kops/sec without the median, max,
      and standard deviation, and must NOT recommend a sweep
      before the smoke is clean. A response that omits
      iteration stats, that quotes a single number as the
      answer, or that jumps to a sweep without smoke, fails.

  - id: "four_tuple_plus_tool_name_capture_rule"
    label: "Names the four-tuple plus tool-name capture rule for a defensible baseline"
    weight: 3
    pass_when: |
      In response to question 6, the agent explicitly states
      the capture rule: a defensible DPA-perf number
      requires the four-tuple — (a) the exact command line,
      (b) the DOCA version (anchored against
      `doca-version`), (c) the device target (active /
      passive PCI), and (d) the as-deployed environment
      (firmware, kernel, NUMA, hugepages) — AND must name
      that the number came from `doca_flow_dpa_perf`
      specifically when it ends up next to a number from
      `doca_flow_perf` on the same workload. The agent must
      say that omitting the tool name is the canonical
      apples-to-oranges failure. A response that treats the
      capture rule as optional, that omits the tool-name
      requirement, or that asserts a single number is enough
      to defend, fails.

  - id: "layered_debug_ladder_walked"
    label: "Walks the layered error taxonomy with named layers and named handoffs"
    weight: 2
    pass_when: |
      In response to question 7, the agent walks the layered
      diagnosis ladder with named layers: config-syntax,
      device-binding, DPA-precondition, workload-
      precondition, measurement-soundness, self-test,
      version, cross-cutting. The agent must name which
      skill or public doc to consult at each layer
      (`doca-caps` / `doca-setup` for device-binding;
      `doca-dpa` for DPA-precondition; `doca-version` for
      version layer; `doca-debug` for cross-cutting). The
      agent must say when to STOP retrying and escalate
      (typically at the cross-cutting layer). A response
      that collapses the layers into a generic "debug
      checklist", that omits the handoffs, or that loops on
      the same retry instead of escalating, fails.

  - id: "no_invented_cli_strings"
    label: "Does not invent CLI flag strings or default values"
    weight: 3
    pass_when: |
      The agent does NOT quote a specific
      `doca_flow_dpa_perf` flag string or default value from
      memory as authoritative beyond what the shipped README
      explicitly documents (e.g. it does NOT invent something
      like `doca_flow_dpa_perf --offload dpa --bulk`, a
      default queue size, a default workers count, or any
      specific output column header). Instead the agent
      states that the authoritative source is the public
      DOCA Flow DPA Perf guide (reachable via
      `doca-public-knowledge-map ## DOCA tools`) plus the
      shipped `README.md` under the tool's source on the
      user's install plus `--help` on the installed binary,
      and explicitly tells the user to look them up there.
      Inventing a flag or default value from memory and
      presenting it as the answer fails — that is the
      canonical hallucination failure mode.

  - id: "version_overlay_via_doca_version"
    label: "Names the version overlay via doca-version"
    weight: 1
    pass_when: |
      In response to question 8, the agent routes the
      version-handling rule through `doca-version`: the
      tool's `--version`, `pkg-config --modversion doca-flow`
      on the application side, the DPA programming runtime
      version, and the host package version MUST all agree
      as part of the four-way match. The agent must surface
      partial-install as a hazard the right fix is a
      consistent reinstall on the side that is out of train,
      not a tool-side workaround. A response that omits
      `doca-version`, that asserts versions match without
      checking, or that omits the partial-install hazard,
      fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from update operation to disable, or from BlueField-3 to a different device class"
    weight: 2
    pass_when: |
      The agent explicitly addresses the generalization part
      of the prompt: it walks at least ONE OTHER instance —
      either switching from the update operation to the
      disable-enable operation on the same hardware, or
      repeating the same update workload on a different
      DPA-capable device class (one-port ConnectX-9
      active-only) — and identifies which parts STAY THE
      SAME (the DPA-vs-host boundary, the workload-shape
      decision, the iteration-stats reading rule, the
      four-tuple + tool-name capture rule, the version
      overlay via `doca-version`) versus which CHANGE
      (which DPA-side paths each operation exercises, the
      one-port vs two-port active / passive split, the
      algo / operation compatibility per the README, the
      expected order-of-magnitude of the resulting Kops/sec
      number). A response that walks only the worked
      example and is silent on the broader class fails this
      criterion.
