id: "59_drive_rdma_from_gpu_kernel"
name: "Drive RDMA initiation directly from a CUDA kernel — class-shaped"
description: |
  Class-shaped GPU-initiated RDMA prompt. The HEADLINE is the
  class ("drive RDMA initiation directly from a CUDA kernel
  using a channel + queue surface"); the worked example is a
  CUDA kernel posting RDMA writes from GPU memory to a remote
  DPU, because doca-gpi is the focused channel + queue surface
  for that pattern.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how
  to set up ANY GPU-initiated RDMA flow that doca-gpi
  surfaces (CUDA-kernel writer, CUDA-kernel reader, CUDA-
  kernel-driven multi-queue fan-out — each one is one
  instance of the same class). The bundle proves this by
  asking the agent to walk: surface selection vs
  doca-gpunetio FIRST (gate, not error path), the stability
  mix on the doca_gpi_* symbol set (small DOCA_STABLE core +
  wide DOCA_EXPERIMENTAL periphery), the GPI context plus its
  channels plus its bound RDMA queues, the cap-query before
  any sizing knob, the GPU datapath assignment + start order,
  the descriptor exchange for the underlying doca-rdma queue,
  the GPU-side handle handoff to the CUDA kernel, and a
  single-work-request smoke before going wide. The same SHAPE
  applies to every GPU-initiated RDMA flow; the per-flow
  details differ.

  A baseline agent without skills typically: conflates
  doca-gpi with doca-gpunetio and recommends either
  indistinguishably; ignores the stability mix and treats the
  whole API as production-stable; invents doca_gpi_* symbol
  names from generic GPUDirect knowledge; recommends sizing
  values from memory without naming the cap-query family;
  retrieves the GPU handle BEFORE doca_ctx_start() or BEFORE
  assigning the GPU datapath; silently authors CUDA-side
  device code (which belongs to doca-gpunetio) inside the
  agent's reply; pretends GPI "owns" the underlying RDMA
  queue rather than binding one provided by doca-rdma; skips
  the descriptor-exchange step entirely; jumps to bulk RDMA
  posting without a single-work-request smoke.

prompt: |
  I have a host with a BlueField-3 DPU, an NVIDIA GPU
  (A100), and DOCA installed. I want my CUDA kernel — running
  on the GPU — to post RDMA writes from GPU memory to a
  remote DPU's pinned memory, at line rate, with NO host CPU
  on the data path. Eventually this is a feature-extraction
  pipeline that ships intermediate tensors directly from GPU
  memory to the remote DPU; right now I just want one RDMA
  write to land cleanly on the remote so I know the
  GPU-initiated path is alive.

  Walk me through it. Specifically:

  1. Which DOCA library should I be using? I know doca-gpunetio
     exists; I've heard there's a doca-gpi too. I do NOT want
     you to silently pick for me — tell me which one fits
     a CUDA-kernel-driven RDMA initiator and which one fits
     everything else, and why.

  2. Whatever you recommend, tell me HONESTLY about its API
     stability: is the symbol set fully stable, fully
     EXPERIMENTAL, or somewhere in between? I do not want to
     ship code that stops compiling next DOCA release.

  3. Walk me through the host-side object model (what objects
     I create, what I size, when I bind memory, when I start
     the context) and the GPU-side handoff (what handle I
     hand to the CUDA kernel and when it is valid).

  4. Where does doca-rdma fit in? Where does doca-gpunetio
     fit in? I want to understand the layering before I start
     wiring things together.

  5. Before I commit to any specific channel count or RDMA
     queue size, what queries do I need to run, and against
     what? I want to size correctly for THIS device.

  6. What single-work-request smoke would you recommend
     before I push to volume? I do not want to drive bulk
     writes at full rate as my first integration test.

  7. After that, briefly tell me which parts of your answer
     would carry over to a DPA-resident initiator instead
     of a GPU-resident one (i.e. how would the picture change
     if the initiator kernel were on the DPA, not on the
     GPU?), and identify which parts stay the same vs which
     change.

context:
  audience: "intermediate"
  intent: "configure_library_context"
  prior_knowledge: "knows what a DPU and a CUDA kernel are; has a BlueField-3 plus host with NVIDIA GPU and DOCA installed; has done at least one DOCA build before but has never used doca-gpi or the DOCA GPU NetIO programming model specifically; does not yet know whether doca-gpi vs doca-gpunetio is the right surface for this case"
  baseline_artifact: "doca-gpi"
  changed_skill_in_pr: "libs/doca-gpi"
  expected_skill_co_load:
    - "doca-gpi"
    - "doca-gpunetio"
    - "doca-rdma"
    - "doca-rdmi"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-debug"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-hardware-safety"

criteria:
  - id: "doca_gpi_vs_doca_gpunetio_selection_called_out"
    label: "Selects doca-gpi for channel/queue-level CUDA-kernel-driven RDMA, with a stated rule"
    weight: 3
    pass_when: |
      The agent's FIRST move is to pick between doca-gpi and
      doca-gpunetio — explicitly, with a stated rule. The
      correct pick for this prompt is doca-gpi, BECAUSE the
      CUDA kernel needs to drive an RDMA queue directly from
      GPU memory rather than use the higher-level Send/Receive
      Ethernet-shaped abstraction. The agent must also surface
      that doca-gpunetio is the right answer for the
      Send/Receive case, and that both can coexist in one
      application. A response that recommends doca-gpunetio
      for the CUDA-kernel-driven RDMA initiator case without
      naming the selection rule, or that silently picks one
      library and never compares the two, fails.

  - id: "stability_mix_surfaced_honestly"
    label: "Surfaces the stability mix — DOCA_STABLE core + DOCA_EXPERIMENTAL periphery"
    weight: 3
    pass_when: |
      The agent explicitly surfaces that the doca_gpi_* API
      is a stability mix: doca_gpi_create / destroy /
      as_ctx / channel_get_handle are DOCA_STABLE, AND the
      rest of the surface (sizing setters, GPU-handle
      retrieval, RDMA queue descriptor exchange, memory
      binding) is DOCA_EXPERIMENTAL, AND the runtime
      authority is the installed headers / version map, not
      the public docs. A response that claims the entire
      surface is GA / stable / production-stable fails. A
      response that claims the entire surface is
      experimental and recommends against shipping fails too
      — the stable core is real. A response that says
      "mostly stable" without naming which calls are stable
      vs which are experimental fails.

  - id: "object_model_context_channels_queues"
    label: "Names the GPI context + channels + RDMA queues object hierarchy"
    weight: 2
    pass_when: |
      The agent names the three-level host-side object
      hierarchy — the top-level doca_gpi context (created
      on a doca_dev), N channels per context (sized via
      doca_gpi_set_channel_num), M RDMA queues per channel
      (sized via doca_gpi_set_rdma_queue_num) — and walks
      the DOCA Core context lifecycle (create → configure
      → assign GPU datapath → start → retrieve handles →
      exchange descriptors → connect queues → use → stop
      → destroy) in order. A response that conflates
      channels and queues fails. A response that walks the
      lifecycle in the wrong order (e.g. handle retrieval
      before start) fails.

  - id: "gpu_datapath_assignment_before_start"
    label: "Calls out GPU datapath assignment + start order BEFORE handle retrieval"
    weight: 2
    pass_when: |
      The agent explicitly states that, before
      doca_ctx_start(), the application must assign the
      GPI context to the GPU datapath (the documented
      DOCA_ERROR_BAD_STATE doc string on
      channel_get_handle / channel_get_gpu_handle names
      "not assigned to gpu datapath" as a failure mode);
      AND that doca_gpi_channel_get_handle and
      doca_gpi_channel_get_gpu_handle must be called AFTER
      doca_ctx_start() (not before). A response that
      recommends `_get_gpu_handle` before `_ctx_start`
      fails (this is a DOCA_ERROR_BAD_STATE waiting to
      happen). A response that omits the GPU datapath
      assignment entirely fails.

  - id: "doca_rdma_queue_binding_named"
    label: "Names doca-rdma as the underlying queue surface that GPI binds via channel_connect_rdma_queue"
    weight: 2
    pass_when: |
      The agent explicitly states that GPI does NOT own the
      underlying RDMA queue; the RDMA queue is created and
      managed via doca-rdma, and GPI BINDS to it via
      doca_gpi_channel_connect_rdma_queue after exchanging
      doca_gpi_channel_get_rdma_queue_descriptor with the
      remote peer. The agent must also name that the CUDA-
      side programming model (kernel launch, GPU memory,
      device-side completion polling) is owned by
      doca-gpunetio. A response that pretends GPI creates
      the RDMA queue itself fails. A response that
      conflates GPI with doca-gpunetio fails. A response
      that authors CUDA kernel device code inline (e.g.
      claims a GPI-side device-side API) fails.

  - id: "capability_query_before_sizing"
    label: "Calls out doca_gpi_cap_get_max_* before doca_gpi_set_*"
    weight: 2
    pass_when: |
      The agent explicitly says the user must call the cap
      queries — doca_gpi_cap_get_max_channel_num,
      doca_gpi_cap_get_max_rdma_queue_per_channel_num, and
      doca_gpi_cap_get_max_rdma_queue_size — against the
      active device before choosing values for the matching
      doca_gpi_set_*. The agent must frame the cap query as
      the runtime authority and refuse to quote a literal
      sizing number from memory. A response that quotes a
      specific channel count, queue count, or queue size
      from memory without naming the cap query fails. A
      response that omits the cap-query family entirely
      fails.

  - id: "single_work_request_smoke_before_volume"
    label: "Recommends a single-work-request smoke before driving full RDMA write rate"
    weight: 1
    pass_when: |
      The agent recommends a single-work-request smoke
      (one RDMA write of any size, one completion observed
      on the CUDA-side surface, one verified effect on the
      remote peer) as the first functional test, before
      bulk writes at full rate. A response that jumps from
      doca_ctx_start() / kernel launch to "now drive full
      line rate" without an explicit single-work-request
      smoke fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_gpi_* API symbols or GPU-side device functions"
    weight: 2
    pass_when: |
      Every doca_gpi_* symbol the agent mentions is either
      in the verified public surface this skill documents
      (doca_gpi_create / destroy / as_ctx; doca_gpi_set_*
      sizing family; doca_gpi_cap_get_max_* family;
      doca_gpi_bind_memory / bind_memory_get_descriptor;
      doca_gpi_channel_get_handle / get_gpu_handle;
      doca_gpi_channel_get_rdma_queue_descriptor /
      connect_rdma_queue; doca_gpi_set_gid_index) OR
      explicitly framed as pseudocode with the agent
      telling the user to confirm the symbol against the
      installed header (doca_gpi.h). A response that
      invents symbols like doca_gpi_post_write(),
      doca_gpi_easy_init(), or that quotes a CUDA-side
      device function from memory without naming
      doca-gpunetio as the owning skill, fails — that is
      the baseline-agent hallucination failure mode the
      bundle exists to prevent.

  - id: "version_overlay_named"
    label: "Quotes pkg-config --modversion doca-gpi AND surfaces the CUDA Toolkit version as a second axis"
    weight: 1
    pass_when: |
      The agent surfaces TWO version axes: (a) the DOCA-
      side version via `pkg-config --modversion doca-gpi`
      (confirmed against `doca_caps --version`) before
      claiming a capability is available, AND (b) the CUDA
      Toolkit version as a second compatibility axis
      because the GPU-side code is `nvcc`-compiled against
      the DOCA GPU NetIO device-side header set on its own
      version schedule. The agent should also name that
      the device-side cap query is the runtime authority
      on top of both, and that the DOCA ↔ CUDA pairing
      lookup goes through the release notes via
      doca-public-knowledge-map rather than agent-memory
      recall. A response that quotes a CUDA-version pin
      from memory, or that treats the DOCA-side `.pc`
      version as the only axis, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from GPU-resident initiator to DPA-resident initiator and identifies what stays the same vs changes"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it generalizes from the GPU-resident RDMA-
      write initiator to a DPA-resident initiator use case,
      and identifies which parts STAY THE SAME (the
      *concept* of an accelerator-initiated one-sided RDMA
      flow; the stability-mix versioning discipline; the
      layered separation between the higher-level RDMA
      library, the accelerator programming model, and the
      surface that drives the queue; the single-work-
      request smoke before scale-up) versus which CHANGE
      (the library shifts from doca-gpi to doca-rdmi for
      the DPA-resident case; the accelerator programming
      skill shifts from doca-gpunetio / CUDA to doca-dpa
      / DPACC-compiler; the GPU-side channel handle
      shifts to the DPA handle returned by
      doca_rdmi_*_get_dpa_handle; the cap-query family
      shifts from doca_gpi_cap_get_* to the equivalent
      checks against the installed RDMI headers; the
      CUDA Toolkit second-version axis is replaced by the
      DOCA DPA toolchain version axis). A response that
      walks only the doca-gpi case and is silent on
      generalization fails this criterion.
