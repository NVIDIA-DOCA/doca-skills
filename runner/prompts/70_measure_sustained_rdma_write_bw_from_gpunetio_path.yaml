id: "70_measure_sustained_rdma_write_bw_from_gpunetio_path"
name: "Measure sustained RDMA-WRITE bandwidth from the DOCA GPUNetIO path and identify the binding constraint — class-shaped"
description: |
  Class-shaped tool-invocation prompt for the GPUNetIO-flavored
  `ib_write_bw` benchmark shipped at
  `doca/tools/gpunetio_ib_write_bw/`. The HEADLINE is the
  class ("measure sustained RDMA-WRITE bandwidth from the
  GPUNetIO path and decide whether the workload is bound by
  GPU compute occupancy, NIC issue rate, link saturation, or
  PCIe crossover"); the worked example is a single (GPU model
  × NIC model × workload class) the agent picks. The bundle
  MUST teach the agent to (a) surface the runtime-surface
  choice (GPUNetIO vs GPI vs CPU-initiated `perftest`) BEFORE
  defaulting to GPUNetIO, (b) name the GPU-NIC pairing as a
  hardware precondition, (c) decompose the reported BW into a
  named binding constraint (occupancy / NIC rate / link
  saturation / pairing) — NOT just quote the number, (d)
  refuse to invent flag strings / GPUNetIO symbols / BW
  literals, and (e) call out `nvidia_peermem` as the
  GPUDirect-style env precondition.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how
  to drive this benchmark class against ANY GPU + NIC pair
  the user's install supports. The bundle proves this by
  asking the agent to walk the class shape end-to-end on one
  worked example, then generalize to a DIFFERENT pair and
  identify what stays the same vs what changes.

  A baseline agent without skills typically: silently defaults
  to GPUNetIO when the user mentions "GPU networking"; treats
  the GPU-NIC pairing as a tunable rather than a precondition;
  quotes a sustained BW number without naming the binding
  constraint; invents a `--bw-mode`, `--message-size`, or
  `--iterations` flag that does not appear in the shipped
  `main.c`; assumes the tool is pre-built under
  `/opt/mellanox/doca/` (it is NOT — it must be built from
  source under `doca/tools/gpunetio_ib_write_bw/`); confuses
  the tool with the upstream CPU-initiated `perftest`
  `ib_write_bw`; skips `nvidia_peermem` as a precondition;
  ignores the CUDA Toolkit version axis.

prompt: |
  I have two hosts wired together with a high-speed IB
  fabric. Each host has one NVIDIA GPU and one ConnectX
  NIC, DOCA is installed on both, and `nvidia_peermem` is
  (or should be) loaded. I want to measure the SUSTAINED
  RDMA WRITE bandwidth I can drive **from a CUDA kernel
  through the DOCA GPUNetIO surface**, so I can decide
  whether the GPUNetIO path is the right runtime surface
  for a streaming-from-GPU workload class my team is
  building. Please walk me through:

  1. Which DOCA tool is the right answer here, and where
     does it ship — pre-built binary under
     `/opt/mellanox/doca/tools/` or source tree I have to
     build? If I have to build it, where is the source
     tree and what's the build pattern? (Do not invent a
     literal `meson` target name you cannot verify against
     the shipped `meson.build`.)
  2. Before I commit to the GPUNetIO surface, what
     alternative runtime surfaces can measure the "same
     physical RDMA WRITE bandwidth"? Name them and tell me
     when each is the right answer. I do not want a silent
     default to GPUNetIO just because I have GPUs.
  3. The GPU + NIC on each host — what hardware-topology
     precondition do I have to satisfy for this measurement
     to be meaningful? If my GPU and NIC sit on different
     NUMA nodes with no NVLink bridge, can I still use this
     benchmark or should I fix the platform first?
  4. There is a kernel-module precondition specific to
     GPUDirect-style buffer registration. What is it,
     where do I check it, and what happens if it is not
     loaded?
  5. The runtime flow — what is the client/server pattern
     for this tool? How do the two halves agree on the
     RDMA queue and the remote memory descriptor before the
     server-side CUDA kernel starts driving WRITEs? Name
     only the flag families documented in the shipped
     `main.c` (device name, GPU PCIe address, GID index,
     server IP on the client side).
  6. When the binary prints sustained throughput, what
     additional context do I need before I can quote it?
     In particular: if I see 120 Gbit/s on a 200 Gbit/s
     link, how do I know whether I am bound by GPU compute
     occupancy, NIC issue rate, link saturation, or a
     wrong GPU-NIC pairing? Walk me through the
     decomposition.
  7. Measurement soundness — what do I check before
     quoting any number? In particular: how do I confirm
     the system was at idle, how do I confirm the warm-up
     was applied, and what do I do when three back-to-back
     runs give different numbers?
  8. Versioning — what DOCA + CUDA Toolkit + CUDA driver
     combinations does this tool tolerate, and where do I
     read each version pin from?
  9. If I want this throughput number to survive a
     regression hunt later (after a NIC firmware burn,
     after a DOCA upgrade, after a kernel boot parameter
     change for IOMMU mode), what do I have to capture
     alongside the number?
  10. After answering for my GPU + NIC pair, briefly tell
      me what would carry over to a DIFFERENT pair (e.g.
      you walked H100 + ConnectX-7, generalize to A100 +
      ConnectX-6, or vice versa). Which parts of your
      answer stay the same and which change?

context:
  audience: "intermediate"
  intent: "measure_sustained_gpu_initiated_rdma_write_bw"
  prior_knowledge: "knows what a GPU and an IB NIC are, has DOCA installed on both hosts, knows CUDA at a basic level, has not used doca-gpunetio as a programming surface before, has used perftest ib_write_bw before in the CPU-initiated form"
  baseline_artifact: "doca-gpunetio-ib-write-bw"
  changed_skill_in_pr: "tools/doca-gpunetio-ib-write-bw"
  expected_skill_co_load:
    - "doca-gpunetio-ib-write-bw"
    - "doca-gpunetio"
    - "doca-gpi"
    - "doca-rdma"
    - "doca-verbs"
    - "doca-version"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-debug"
    - "doca-hardware-safety"
    - "doca-gpunetio-ib-write-lat"
    - "doca-gpi-ib-write-lat"

criteria:
  - id: "names_gpunetio_ib_write_bw_and_locates_it_correctly"
    label: "Names doca-gpunetio-ib-write-bw AND clarifies it is built from source under doca/tools/gpunetio_ib_write_bw/"
    weight: 3
    pass_when: |
      The agent's answer to question 1 names the
      GPUNetIO-flavored ib_write_bw benchmark shipped under
      `doca/tools/gpunetio_ib_write_bw/` AND tells the
      user this tool is built from source via `meson` —
      NOT a pre-built binary under
      `/opt/mellanox/doca/tools/`. The agent must point the
      user at the shipped `client/` + `server/` subtrees
      and the per-subtree `meson.build` files, and must
      name the pkg-config modules
      (`doca-gpunetio`, `doca-rdma`, `doca-common`) without
      inventing a literal `meson` target name it cannot
      verify against the source. A response that assumes
      the tool is pre-built, OR that conflates it with the
      upstream CPU-initiated `perftest` `ib_write_bw`,
      fails.

  - id: "surfaces_runtime_surface_choice_before_committing_to_gpunetio"
    label: "Surfaces the GPUNetIO vs GPI vs CPU-initiated runtime-surface choice BEFORE recommending GPUNetIO"
    weight: 3
    pass_when: |
      The agent's answer to question 2 names AT LEAST
      THREE runtime surfaces that can measure the same
      physical RDMA WRITE BW: (a) DOCA GPUNetIO (this
      tool), (b) DOCA GPI (the lower-level GPU-initiated
      surface — note the bundle ships a GPI ib_write_lat
      tool not a BW tool; the agent must surface this
      asymmetry honestly), (c) the classic CPU-initiated
      `perftest` `ib_write_bw` (out of scope for this
      bundle but the right comparison for GPU-init vs
      CPU-init). The agent must frame these as a DECISION
      the user makes BEFORE committing. A response that
      silently defaults to GPUNetIO because the user said
      "GPU", OR that names only GPUNetIO without the
      alternatives, OR that pretends the GPI surface ships
      a BW tool when it does not, fails.

  - id: "gpu_nic_pairing_as_precondition"
    label: "Applies the GPU-NIC pairing as a hardware-topology precondition"
    weight: 3
    pass_when: |
      The agent's answer to question 3 frames the GPU-NIC
      pairing as a hardware-topology PRECONDITION (the GPU
      and the IB device must sit under the same PCIe root
      complex OR be bridged by an NVLink path the platform
      documents) and tells the user that if the pair is on
      different NUMA nodes with no NVLink bridge, the FIX
      is platform-side, not benchmark-side. The agent should
      surface that a wrong pairing still completes the
      benchmark but the BW reflects PCIe-crossover overhead
      rather than the GPUNetIO path's property. A response
      that treats the pairing as a tunable, fails.

  - id: "calls_out_nvidia_peermem_env_precondition"
    label: "Calls out nvidia_peermem as the GPUDirect-style env precondition"
    weight: 2
    pass_when: |
      The agent's answer to question 4 names
      `nvidia_peermem` (the kernel module that enables
      GPUDirect-style memory registration between the GPU
      and the IB NIC) as the env precondition for binding
      GPU memory to DOCA — without it, the doca-gpu
      context cannot register GPU-resident buffers and the
      benchmark cannot bring up the WR path. The agent
      should tell the user how to check it (`lsmod |
      grep nvidia_peermem`) and route to
      [`doca-setup`](doca-skills/skills/doca-setup/SKILL.md)
      for the load path. A response that omits the kernel
      module, OR that paraphrases it as "some GPU driver",
      OR that invents a different module name, fails.

  - id: "does_not_invent_runtime_flags"
    label: "Does NOT invent runtime flags beyond what the shipped main.c documents"
    weight: 3
    pass_when: |
      In response to question 5 the agent names ONLY the
      flag families that match the shipped `main.c` ARGP
      registration (`-d <ibdev>` / `--device`, `--gpu
      <pcie-addr>`, `-c <server-ip>` for client mode,
      `--gid-index <int>` as optional) and tells the user
      to confirm the exact spelling against `--help` on
      the installed binary. A response that fabricates a
      flag like `--message-size=64K`, `--iterations=10000`,
      `--bw-mode`, `--queue-depth`, or `--threads-per-core`
      WITHOUT explicitly framing it as pseudocode the user
      must confirm against `--help`, fails — that is the
      canonical hallucination failure mode.

  - id: "decomposes_throughput_into_binding_constraint"
    label: "Decomposes the reported throughput into a named binding constraint"
    weight: 3
    pass_when: |
      In response to question 6 the agent walks the FOUR
      binding-constraint hypotheses explicitly: (a) link
      saturation (BW sits near the link's documented
      capacity; tuning does not move it), (b) NIC issue
      rate (BW is below link capacity but the message-size
      sweep flattens — the device hits its WR-submission
      ceiling), (c) GPU compute occupancy (BW grows with
      CUDA kernel concurrency up to a point, then
      plateaus — `nvidia-smi dmon` shows the SM under-
      utilized), (d) PCIe crossover from a wrong GPU-NIC
      pairing (BW is well below all three above and does
      not respond to either knob). The agent must tell the
      user the named binding constraint goes ALONGSIDE the
      number when quoting; a number with no decomposition
      is ambiguous. A response that names only one or two
      hypotheses, OR that collapses them all into "BW",
      fails.

  - id: "measurement_soundness_steady_state_warm_up_at_idle"
    label: "Calls out steady-state / warm-up / system-at-idle as soundness signals"
    weight: 2
    pass_when: |
      In response to question 7 the agent addresses ALL
      THREE soundness signals: (a) steady-state must be
      reached (short runs report transient numbers; the
      agent must lengthen the run before quoting steady-
      state), (b) warm-up exists for a reason (cold caches
      and cold pipelines on the CUDA side produce
      below-steady-state numbers), (c) the system must be
      at idle (no background traffic on the IB link, no
      concurrent CUDA workloads). The agent must tell the
      user that swing > X% between runs is itself a signal
      to iterate, not to average. A response that names
      only one of the three, OR that treats warm-up as
      overhead to skip, fails.

  - id: "version_overlay_doca_cuda_toolkit_cuda_driver"
    label: "Surfaces DOCA + CUDA Toolkit + CUDA driver as three version axes"
    weight: 2
    pass_when: |
      In response to question 8 the agent surfaces (a) the
      DOCA-side version via `pkg-config --modversion
      doca-gpunetio` (confirmed against `doca_caps
      --version`), (b) the CUDA Toolkit version (`nvcc
      --version`) as a second axis because the
      `client/kernel.cu` is compiled by `nvcc`, and (c)
      the CUDA driver as a third axis the agent surfaces
      but does not own — GPUDirect-style buffer
      registration requires the CUDA driver to match the
      toolkit. The agent must route through doca-version
      for the four-way match rule. A response that quotes
      a DOCA version literal from memory, says "latest",
      or ignores the CUDA driver axis, fails.

  - id: "regression_hunt_tuple_capture"
    label: "Captures the multi-axis tuple alongside the BW for regression hunts"
    weight: 2
    pass_when: |
      In response to question 9 the agent names the
      multi-axis tuple required for a regression-hunt-
      quality baseline: (1) the DOCA version + CUDA
      Toolkit + CUDA driver versions, (2) the GPU model
      and its PCIe address on each side, (3) the NIC
      model and its PCIe address on each side, (4) the
      topology answer (root complex / NVLink path), (5)
      the NIC firmware level, (6) the kernel boot
      parameters that affect GPUDirect (IOMMU mode,
      hugepages), (7) the exact client and server
      invocations, AND (8) the NAMED BINDING CONSTRAINT
      identified in the decomposition. A response that
      captures only the number, or that ignores the
      binding-constraint axis, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from the worked GPU + NIC pair to a DIFFERENT pair"
    weight: 3
    pass_when: |
      In response to question 10 the agent explicitly
      generalizes from the worked GPU + NIC pair to AT
      LEAST ONE OTHER pair, and identifies which parts
      STAY THE SAME (the GPU-NIC pairing precondition;
      the `nvidia_peermem` precondition; the
      client/server pattern; the throughput-decomposition
      taxonomy; the steady-state / warm-up / at-idle
      rule; the version overlay; the tuple-capture rule)
      vs which CHANGE (the link's expected ceiling for
      that pair; the GPU's SM count and therefore the
      occupancy hypothesis's plateau point; the NIC's
      documented WR-submission rate and therefore the
      NIC-issue-rate hypothesis's plateau point; the
      NUMA / PCIe topology that satisfies the pairing
      precondition; possibly the firmware level the
      regression tuple has to capture). A response that
      walks only the chosen pair and is silent on
      generalization fails — by AUTHORING.md § 1a, the
      bundle is teaching the CLASS.
