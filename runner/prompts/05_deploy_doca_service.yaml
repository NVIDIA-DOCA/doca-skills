id: "05_deploy_doca_service"
name: "Deploy a DOCA service \u2014 class-shaped"
description: |
  Class-shaped service-deployment prompt. The HEADLINE is the class
  ("deploy a DOCA service"); the worked example is DOCA Management
  Service (DMS), because that is the DOCA service currently covered
  by skills/services/doca-dms in the bundle.

  Per AUTHORING.md \u00a7 1a, the bundle MUST teach the agent how to
  deploy ANY DOCA service, not just DMS. The bundle proves this by
  asking the agent to walk the deploy schema the skill provides:
  identify the service kind, find the official container image on NGC,
  determine the BlueField-host placement, surface the contract
  (capabilities / safety / observability), and call out the verify
  command. The same schema applies to BlueMan, Telemetry, Firefly,
  Flow-Inspector, HBN, etc.

  A baseline agent without skills typically: invents a docker run
  invocation with a guessed image tag, omits the BlueField-host split
  question, and skips the safety / observability section entirely.

prompt: |
  I need to deploy DOCA Management Service on a system with a
  BlueField-3 DPU. Walk me through the deploy: what is DMS, where
  does it run, where do I get the container image, and how do I
  verify it came up healthy?

  After that, briefly tell me which parts of your answer would change
  for a DIFFERENT DOCA service (e.g. DOCA Telemetry, DOCA BlueMan, or
  DOCA Firefly) and which parts are the same.

context:
  audience: "intermediate"
  intent: "deploy_service"
  prior_knowledge: "knows what a DPU is, has a BlueField-3 plus host"
  # Class-shaped probe targeting the doca-dms skill, but the
  # `generalizes_beyond_worked_example` criterion below requires the
  # answer to also work for other DOCA services.
  baseline_artifact: "doca-dms"
  changed_skill_in_pr: null
  expected_skill_co_load:
    - "doca-dms"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "names_service_kind"
    label: "Defines DMS in 1-3 sentences before issuing any command"
    weight: 1
    pass_when: |
      The agent names what DOCA Management Service is (BlueField-side
      device-management agent surfacing host-side control via a REST
      API / gRPC interface) before diving into deploy commands. A
      pure docker-run dump with no definition fails.

  - id: "names_dpu_host_split"
    label: "Calls out the BlueField vs. host split explicitly"
    weight: 1
    pass_when: |
      The agent states that DMS runs on the BlueField (DPU) side and
      that the host talks to it across the PCIe link / management
      network. A response that treats DMS as a host-only or DPU-only
      thing without naming the split fails.

  - id: "official_image_source"
    label: "Points at the official NGC catalog page for the image"
    weight: 1
    pass_when: |
      The agent references the NGC catalog
      (catalog.ngc.nvidia.com/orgs/nvidia/teams/doca or the
      equivalent docs.nvidia.com/doca page for DMS) as the
      authoritative place to pick the image tag. A response that
      invents an image string like
      nvcr.io/nvidia/doca/doca-management-service:latest without
      citing where that came from fails.

  - id: "verify_health_command"
    label: "Includes a concrete verify-it-came-up-healthy command"
    weight: 1
    pass_when: |
      The agent provides a concrete post-deploy verification step:
      a curl / grpc-cli probe of the DMS endpoint, or the official
      "show service status" command from the DMS doc page. A response
      that ends with `docker run -d ...` and treats absence of an
      error as success fails.

  - id: "cites_safety_or_observability"
    label: "Names the safety policy OR observability surface"
    weight: 1
    pass_when: |
      The agent surfaces at least one of (a) the safety policy that
      governs DMS (which mutations require BlueField reboot, which
      are read-only) OR (b) the observability surface (where DMS
      logs go, which metrics it exports). A pure happy-path
      walk-through with no safety / observability framing fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from DMS to other DOCA services"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the prompt:
      it names at least ONE OTHER DOCA service (Telemetry, BlueMan,
      Firefly, Flow-Inspector, HBN, Argus, ...) and identifies which
      parts of the deploy procedure stay the same (NGC image source,
      BlueField-host split as the deciding question, doca-setup
      prerequisite, verify-health step) versus which change
      (configuration surface, port numbers, what "healthy" looks
      like). A response that walks only DMS and is silent on
      generalization fails this criterion.
