id: "22_add_stateful_connection_tracking_to_flow"
name: "Add stateful connection tracking on top of a DOCA Flow pipeline — class-shaped"
description: |
  Class-shaped prompt for adding stateful connection tracking
  on top of an existing DOCA Flow pipeline, using the
  `doca-flow-ct` companion library that EXTENDS `doca-flow`
  with conntrack-style 5-tuple flow tracking, aging timers,
  and NAT-aware actions (SNAT / DNAT) in hardware. The
  HEADLINE is the class ("add stateful connection tracking on
  top of a DOCA Flow pipeline"); the worked example is taking
  an already-up doca-flow port + pipe configuration and
  layering doca-flow-ct on top so connection state is tracked
  in hardware for a 5-tuple firewall rule (allow established,
  drop new), because that is the newly-covered sub-feature
  folded into skills/libs/doca-flow as the `## flow-ct`
  H2 anchor (see `doca-flow CAPABILITIES.md ## flow-ct` and
  `doca-flow TASKS.md ## flow-ct`).

  Per AUTHORING.md § 1a, the bundle MUST teach the agent the
  shape of *adding a companion library on top of an existing
  base library without rebuilding the base*. The bundle proves
  this by asking the agent to walk: the layering rule FIRST
  (doca-flow must already be set up; doca-flow-ct attaches a
  context on top, not in place of), capability discovery on
  the CT axis (max concurrent flows, aging-timer range, NAT
  variants), the DOCA Core lifecycle for the per-port
  `doca_flow_ct` context built on top of the doca-flow port
  lifecycle, the 5-tuple match shape (src IP, dst IP, src
  port, dst port, protocol; plus VRF / VNI for overlays), and
  a single-flow CT smoke (add one CT entry, send one matching
  packet, observe the counter and state transitions) BEFORE
  scaling to a bulk add. The same SHAPE generalizes to one
  other companion-library pattern in the bundle (`doca-pcc` on
  `doca-rdma`, or `doca-gpunetio` on `doca-eth`); the
  per-companion details differ.

  A baseline agent without skills typically: treats
  `doca-flow-ct` as a standalone library disconnected from
  doca-flow and recommends rebuilding the doca-flow setup from
  scratch to add CT; assumes a global CT context instead of
  one per doca-flow port; invents CT API symbols beyond the
  public surface (e.g. `doca_flow_ct_enable()`,
  `doca_flow_ct_set_firewall_rule()`); skips capability
  discovery for max concurrent flows and aging-timer range
  entirely; conflates the hardware-accelerated CT path with
  Linux kernel conntrack and recommends the wrong artifact;
  picks an aging timer that is either too short (spurious
  connection drops) or too long (table-memory waste) without
  consulting the device's advertised range; jumps from "create
  a CT context" straight to a bulk CT entry add without a
  single-flow smoke; and never generalizes from the
  flow-ct-on-flow companion pattern to other companion-library
  patterns in the DOCA family.

prompt: |
  I have a host with a BlueField DPU plugged in over PCIe,
  DOCA already installed on the host, and a working DOCA Flow
  setup on the BlueField port I care about — the port is up,
  I have one stateless match-and-forward pipe created and
  validated, and traffic is flowing through it correctly. Now
  I want to add stateful connection tracking on top so I can
  express a per-connection firewall rule on a 5-tuple:
  "allow packets that belong to an established connection,
  drop everything else." I do NOT want to rebuild my existing
  doca-flow setup from scratch — I want to add CT on top of
  what I already have.

  Walk me through the setup: which DOCA library I add (and
  how it relates to the DOCA Flow library I'm already using —
  am I replacing my Flow setup, layering on top of it, or
  something else?), what I have to check on the DOCA + device
  side BEFORE writing any CT code (capability queries against
  the active doca_devinfo for the CT axis — max concurrent
  flows my workload will need, the aging-timer range the
  device supports, the NAT variants the device supports even
  though my firewall use case doesn't need NAT yet, in case I
  add it later), the DOCA Core lifecycle I have to follow when
  creating the per-CT-instance context on top of my already-up
  DOCA Flow port (without breaking the Flow setup I already
  have), the 5-tuple match shape CT entries actually use, and
  what single-flow smoke test you'd recommend BEFORE I bulk-add
  CT entries for my real rule set. Make sure your answer
  starts from "your DOCA Flow setup is already working and
  stays working" — if you tell me to rebuild it from scratch
  to add CT, you've misunderstood the layering.

  After that, briefly tell me which parts of your answer would
  carry over to a DIFFERENT companion-library pattern in DOCA
  — for example DOCA PCC layered on top of DOCA RDMA (running
  a custom congestion control algorithm on top of an existing
  RDMA / RoCE data plane), or DOCA GPUNetIO layered on top of
  DOCA Ethernet (driving a GPU-initiated packet I/O surface on
  top of an existing Ethernet queue setup) — and which parts
  would change.

context:
  audience: "intermediate"
  intent: "add_stateful_layer_on_top_of_existing_dataplane"
  prior_knowledge: "knows C / C++ at the application level, has DOCA installed, has done at least one DOCA Flow build before and has a working stateless Flow port + pipe on the target BlueField port, has not used DOCA Flow CT specifically before, has a working understanding of 5-tuple firewall rules in general but has not expressed one as a CT entry before"
  baseline_artifact: "doca-flow"
  changed_skill_in_pr: "libs/doca-flow"
  expected_skill_co_load:
    - "doca-flow"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "layering_rule_acknowledged"
    label: "Acknowledges that DOCA Flow must be set up FIRST and that doca-flow-ct extends it (not replaces it)"
    weight: 2
    pass_when: |
      The agent's FIRST conceptual move is to surface that
      doca-flow-ct is a COMPANION library that EXTENDS DOCA
      Flow: the user's existing doca-flow port and pipe stay
      in place, and the CT layer attaches a per-port
      `doca_flow_ct` context on top of the already-up doca-flow
      port and wraps existing pipes with CT semantics. The
      agent states explicitly that doca-flow-ct does NOT
      replace doca-flow — the base layer keeps running and the
      companion layer adds capability on top. The CT material
      is folded into the doca-flow skill itself as the
      `## flow-ct` H2 anchor (see `doca-flow CAPABILITIES.md
      ## flow-ct`), not a separate skill. A response that
      treats CT as a standalone library disconnected from
      doca-flow fails. A response that recommends a different
      library (e.g. Linux kernel conntrack as the answer to a
      hardware-CT question, or "use doca-flow alone" for what
      is clearly a stateful workload) without first explaining
      the layering also fails.

  - id: "does_not_rebuild_flow_setup"
    label: "Does NOT recommend rebuilding the existing doca-flow setup from scratch to add CT"
    weight: 2
    pass_when: |
      The agent explicitly preserves the user's existing
      doca-flow port and pipe configuration and layers CT on
      top WITHOUT prescribing a from-scratch rewrite of the
      Flow setup. The agent's modify workflow (if it covers
      one) starts from the user's already-working doca-flow
      objects, not from a blank slate. A response that says
      "start by tearing down your existing Flow port" or "the
      cleanest way is to recreate the pipe from scratch with
      CT enabled" fails this criterion. A response that
      proposes to re-implement the user's stateless pipe as a
      brand-new CT-aware pipe (rather than wrapping the
      existing one) also fails — the layering rule (per
      `doca-flow CAPABILITIES.md ## flow-ct`) is the whole
      point of a companion library.

  - id: "ct_cap_query_against_devinfo"
    label: "Calls `doca_flow_ct_cap_*` capability queries against the active doca_devinfo on every relevant axis"
    weight: 2
    pass_when: |
      The agent says the user MUST run `doca_flow_ct_cap_*`
      queries against the active doca_devinfo BEFORE assuming
      a CT design will fit the device, AND surfaces that
      capability is a MULTI-AXIS question — at minimum the
      max-concurrent-flows axis (the device's ceiling on
      simultaneous tracked entries) AND the aging-timer range
      axis (min / max / granularity the device accepts) AND
      the supported NAT variants axis (SNAT, DNAT, both —
      named even though the user's immediate firewall use
      case doesn't need NAT yet, because the user explicitly
      mentioned possible future NAT in the prompt and each
      variant is its own axis). A response that quotes only
      one axis (typically the flow ceiling) and silently
      assumes the rest fails. A response that does not
      mention `doca_flow_ct_cap_*` (or an equivalent
      capability query against doca_devinfo for the CT axis)
      at all fails. A response that names only "aging" or
      only "max flows" without acknowledging the multi-axis
      shape fails.

  - id: "core_lifecycle_on_top_of_flow_port"
    label: "Walks the DOCA Core lifecycle for the `doca_flow_ct` context layered ON TOP of the doca-flow port lifecycle"
    weight: 2
    pass_when: |
      The agent walks the lifecycle in order: confirm the
      doca-flow port is already created AND started (this is
      a precondition, not a step the CT setup performs);
      create the `doca_flow_ct` Core context against that
      already-started doca-flow port; configure the
      aging-timer + NAT-variant settings within the
      cap-advertised ranges; start the `doca_flow_ct` via
      `doca_ctx_start()` (the moment the CT plane becomes
      live on the port); add CT entries on the wrapped
      pipe(s); tear down in REVERSE order (stop the
      `doca_flow_ct` → destroy the `doca_flow_ct` → only
      THEN touch the doca-flow port teardown, which is owned
      by the doca-flow lifecycle). The agent surfaces that
      one `doca_flow_ct` is needed per tracked doca-flow port
      (no "global CT context"). A response that omits the
      precondition that the doca-flow port is already
      running, or that treats `doca_flow_ct` create as
      equivalent to start, or that tears down in forward
      order, or that proposes one CT context for multiple
      ports, fails this criterion.

  - id: "five_tuple_match_named"
    label: "Names the 5-tuple CT match shape (src IP, dst IP, src port, dst port, protocol; plus VRF / VNI for overlays)"
    weight: 2
    pass_when: |
      The agent explicitly names the 5-tuple shape CT entries
      use to identify a tracked connection: source IP,
      destination IP, source port, destination port, and IP
      protocol number — and notes that VRF / VNI is added on
      top of the 5-tuple when the user's traffic is over an
      overlay (VXLAN / GENEVE / …). The agent ties the
      5-tuple to the user's firewall intent (the "allow
      established, drop new" rule is expressed by tracking
      each connection identified by its 5-tuple, then
      gating action by the connection's state). A response
      that omits one of the five tuple fields (e.g. forgets
      the protocol, or treats source-port as optional)
      fails. A response that proposes matching on a
      less-than-5-tuple shape (e.g. "just match on source
      IP") without surfacing that this is not actually CT
      and routing back to stateless doca-flow fails.

  - id: "single_flow_smoke_before_bulk"
    label: "Recommends a single-flow CT smoke (one entry, one matching packet, observe counter + state) BEFORE bulk-adding CT entries"
    weight: 1
    pass_when: |
      The agent recommends adding ONE CT entry on a controlled
      5-tuple as the FIRST functional test, sending ONE
      matching packet end-to-end, and confirming both the
      per-CT-entry counter increments AND the per-connection
      state transitions reported on the entry match the user's
      expectation — BEFORE attempting any bulk add. The agent
      surfaces that a single-flow smoke is the cheapest place
      to identify 5-tuple-shape bugs, layering-rule violations,
      aging-timer misconfigurations, or capability-axis
      mismatches before they show up as N-entry failures in
      production. A response that jumps from `doca_ctx_start()`
      on the `doca_flow_ct` straight to bulk-adding the
      production firewall rule set, or that fails to name the
      single-flow smoke as the first functional test, fails
      this criterion.

  - id: "no_hallucinated_ct_api"
    label: "Does not invent `doca_flow_ct_*` API symbols beyond the public surface"
    weight: 1
    pass_when: |
      Every `doca_flow_ct_*` / `doca_flow_*` / `doca_ctx_*` /
      `doca_pe_*` / `doca_dev*` symbol the agent mentions is
      one that the skill documents as part of the public
      surface (`doca_flow_ct` as the per-port CT Core context,
      `doca_flow_ct_cap_*` family for capability discovery,
      `doca_ctx_start` / `doca_ctx_stop` for the universal
      Core lifecycle, `doca_pe_progress` for the progress
      engine, `doca_dev` / `doca_devinfo`), OR it is
      explicitly framed as pseudocode / sketch / function-name
      placeholder. A response that invents API names like
      `doca_flow_ct_enable()`,
      `doca_flow_ct_set_firewall_rule()`,
      `doca_flow_ct_quick_init()`,
      `doca_flow_ct_attach_pipe()`, or
      `doca_flow_ct_block_new_connections()` without framing
      them as illustrative placeholders fails — that is the
      baseline-agent hallucination failure mode the bundle
      exists to prevent. A response that frames the in-flight
      CT entry add + state-aware action surface in prose
      (without committing to specific invented function names)
      passes this criterion.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from doca-flow-ct on doca-flow to a second DOCA companion-library pattern"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names at least ONE OTHER DOCA companion-
      library pattern — `doca-pcc` layered on top of `doca-rdma`
      (custom congestion control on top of an existing RDMA /
      RoCE data plane) OR `doca-gpunetio` layered on top of
      `doca-eth` (GPU-initiated packet I/O on top of an
      existing Ethernet queue setup) — and identifies which
      parts of the workflow STAY THE SAME (the companion adds
      capability on top of the base library without replacing
      it; the lifecycle of the companion's context is layered
      on top of the base's lifecycle and torn down in reverse;
      capability discovery on the new feature axes is
      required before promising any feature on the device;
      a single-flow / single-operation smoke before scale-up
      is the right first functional test; the companion's
      version is paired with the base's version per the
      version-compatibility rule) versus which parts CHANGE
      (the specific shape of the augmentation differs — CT is
      a STATEFUL augmentation of an inherently STATELESS
      dataplane that runs in the SAME logical context, whereas
      PCC is a control-plane augmentation that splits across
      host and DPA processor and GPUNetIO is a queue-surface
      augmentation that splits across host and GPU; the
      capability axes differ per companion — CT axes are max
      concurrent flows / aging / NAT / overlay while PCC axes
      are DPA presence / firmware custom-PCC slot / DOCA-DPACC
      version pair; the per-companion error-taxonomy overlay
      differs even though the cross-library `DOCA_ERROR_*`
      taxonomy is shared). A response that walks only the CT
      example and is silent on the generalization fails. A
      response that claims "all companion libraries are the
      same" and merges their surfaces, or that names a
      non-companion pattern (e.g. comparing CT to a totally
      unrelated DOCA library that is not a companion of
      anything) instead of an actual companion-library
      pattern, fails this criterion.
