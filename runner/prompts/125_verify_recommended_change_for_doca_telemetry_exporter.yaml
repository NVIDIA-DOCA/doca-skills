id: "125_verify_recommended_change_for_doca_telemetry_exporter"
name: "Verify a recommended change to telemetry exporter (lib)"
description: |
  Per-artifact verification-axis smoke prompt for the libs/doca-telemetry-exporter skill,
  auto-generated by /tmp/gen_verify_prompts.py to push per-artifact prompt
  coverage from 1 -> 2 for the May-2026 reviewer-feedback wave. The
  variant-C bundle must route the agent through libs/doca-telemetry-exporter/SKILL.md ->
  CAPABILITIES.md -> TASKS.md AND emit the universal verification
  contract from AGENTS.md ## The universal verification contract
  (5 steps: env precondition, cap query, smoke before bulk, contract
  surface, observability). The variant-A baseline typically skips the
  contract entirely and emits unverified function names or pkg-config
  invocations -- which is the failure mode this prompt is designed to
  expose at scale, per-artifact.

prompt: |
  I have a working setup using the DOCA telemetry exporter lib. A teammate
  recommended a change to my code -- they say it will make my use of
  telemetry exporter faster / safer / more correct. Before I apply the change to
  production, walk me through how to verify their recommendation is
  actually right for my install and my hardware. Be specific to
  telemetry exporter, do not give me a generic answer.

context:
  audience: "intermediate"
  intent: "verify_recommended_change"
  prior_knowledge: "already has a working DOCA telemetry exporter setup"
  changed_skill_in_pr: "doca-telemetry-exporter"
  baseline_artifact: "doca-telemetry-exporter"

criteria:
  - id: "cites_universal_verification_contract"
    label: "Cites the universal verification contract from AGENTS.md (5 steps)"
    weight: 2
    pass_when: |
      The agent applies the 5-step universal verification contract from
      AGENTS.md ## The universal verification contract: env precondition,
      capability query, smoke before bulk, contract surface, observability.
      A response that gives only one or two of the five steps fails.

  - id: "routes_through_doca_telemetry_exporter_skill"
    label: "Routes through the doca-telemetry-exporter skill dir, not generic DOCA prose"
    weight: 1
    pass_when: |
      The agent names libs/doca-telemetry-exporter/SKILL.md (or CAPABILITIES.md / TASKS.md)
      as where it is pulling the workflow from, and the workflow it cites
      matches what the doca-telemetry-exporter skill actually documents. Generic
      "use pkg-config and run a smoke test" answers that could have been
      written without the doca-telemetry-exporter skill fail.

  - id: "calls_capability_query_for_doca_telemetry_exporter"
    label: "Issues a capability query specific to telemetry exporter before recommending the change"
    weight: 1
    pass_when: |
      The agent runs a doca-telemetry-exporter-specific capability query (doca_caps,
      doca_<lib>_cap_*, doca_*_get_supported_*, etc.) against the live
      device before claiming the recommendation is safe to apply. A
      response that asserts the change is correct without a cap query
      fails.

  - id: "smoke_before_bulk_for_doca_telemetry_exporter"
    label: "Smokes the change on the smallest possible scope before scaling"
    weight: 1
    pass_when: |
      The agent recommends running the change against a single
      representor / single queue / single pipe / single resource of the
      smallest legal telemetry exporter unit-of-damage first, observing the result,
      and only then widening scope. A response that recommends applying
      the change to the full production scope in one shot fails.

  - id: "no_invented_doca_telemetry_exporter_symbols"
    label: "Does not invent telemetry exporter function names or pkg-config invocations"
    weight: 1
    pass_when: |
      The agent's response does NOT contain any doca-telemetry-exporter-related symbol
      (function name, struct, enum, pkg-config module, link flag) that
      is not actually shipped by the doca-telemetry-exporter library. A response that
      emits, e.g., a `doca_doca_telemetry_exporter_easy_init()` or
      `-ldoca-telemetry-exporter-common` invented for the answer fails.
