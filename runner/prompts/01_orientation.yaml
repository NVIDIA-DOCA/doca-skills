id: "01_orientation"
name: "Beginner orientation"
description: |
  Fresh DOCA user with no prior knowledge asks for a starting point.
  This prompt tests whether the bundle delivers a usable orientation
  flow, including no-hardware-fallback awareness and authoritative
  docs URLs.

prompt: |
  I'm new with DOCA. Can you guide me — how do I start?

context:
  audience: "beginner"
  intent: "orientation"
  prior_knowledge: "none"
  # No specific lib / service / tool change attribution for orientation.
  # This prompt always runs against all 3 agent variants.
  changed_skill_in_pr: null

# 6 binary criteria — same shape as the local A/B that produced
# the headline DEMO-POC.html scoreboard. Each criterion is independently
# scorable from the agent's text response.
criteria:
  - id: "defines_doca"
    label: "Defines what DOCA is in plain language"
    weight: 1
    pass_when: |
      The agent states what DOCA is (data-center / DPU / acceleration
      framework etc.) in 1-3 sentences before diving into commands. A
      pure command dump with no definition fails this criterion.

  - id: "names_target_hardware"
    label: "Names BlueField / ConnectX as the target hardware"
    weight: 1
    pass_when: |
      The agent names BlueField and / or ConnectX as the device DOCA
      runs on, even if briefly. A response that talks about DOCA in the
      abstract without naming the hardware fails.

  - id: "no_hardware_fallback"
    label: "Mentions a no-hardware fallback (NGC container or equivalent)"
    weight: 1
    pass_when: |
      The agent points the user to the NGC DOCA container
      (nvcr.io/nvidia/doca/doca) or an equivalent path the user can
      take WITHOUT owning a BlueField. A response that assumes the user
      has the hardware fails this criterion.

  - id: "cites_docs_url"
    label: "Cites at least one docs.nvidia.com URL"
    weight: 1
    pass_when: |
      The agent includes at least one full URL on the
      docs.nvidia.com/doca/sdk/ subtree. Marketing pages on
      developer.nvidia.com count as a half — present, but soft.

  - id: "concrete_first_action"
    label: "Provides a concrete first command or first action"
    weight: 1
    pass_when: |
      The agent's response includes a command the user can paste
      verbatim and run, OR a concrete first action (read this page,
      pull this container, run this CLI). A pure conceptual answer
      with no actionable next step fails.

  - id: "no_unverified_versions"
    label: "Does not promise specific tags / versions without verifying"
    weight: 1
    pass_when: |
      Whenever the agent names a specific DOCA version, NGC tag, or
      release number, it includes a verification command (pkg-config
      --modversion doca-common, doca_caps --version, or "check the
      NGC catalog for the current tag"). A response that confidently
      states "use 3.3.0" without a verification step fails.
