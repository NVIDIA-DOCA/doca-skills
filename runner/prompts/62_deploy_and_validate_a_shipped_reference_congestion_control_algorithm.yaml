id: "62_deploy_and_validate_a_shipped_reference_congestion_control_algorithm"
name: "Deploy and validate a vendor-shipped reference congestion control algorithm on a target processor port, and decide keep / tune / replace — class-shaped"
description: |
  Class-shaped prompt for deploying and validating a VENDOR-
  SHIPPED REFERENCE congestion-control algorithm on a target-
  processor port that already carries RDMA / RoCE traffic,
  and then making the explicit operational decision to KEEP
  the shipped algorithm as the baseline, TUNE its documented
  parameters, or REPLACE it with a user-written custom
  algorithm. The HEADLINE is the class ("deploy and validate
  a shipped reference congestion control algorithm and
  decide keep / tune / replace"); the worked example is the
  DOCA Programmable Congestion Control reference algorithm
  (Zero-Touch RoCE RTT CC), running on the BlueField-3 DPA
  processor under the DOCA PCC host-side framework, because
  that is the newly-covered library in
  skills/libs/doca-pcc-ztr-rttcc-algo.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent the
  shape of *taking a vendor-shipped reference algorithm,
  confirming it is shaping the production data plane it is
  supposed to shape, and deciding whether the shipped
  defaults are good enough OR whether the user must commit
  engineering effort to a custom replacement*. The bundle
  proves this by asking the agent to walk: env preconditions
  inherited from the host-side framework (firmware custom-
  PCC slot enable, matched DOCA + DPACC, DPA-capable
  BlueField generation, RoCE-v2 traffic actually flowing on
  the attached port), the THREE-ARTIFACT TRIANGLE the user
  must keep straight (the shipped algorithm library, the
  host-side framework that loads it, the read-only counter
  CLI that observes it), the integration-edit checklist the
  algorithm's own README documents on the shipped DOCA PCC
  application source, the algorithm's documented parameter
  surface and how to apply tunables via the framework's
  set-algo-params path without rebuilding the DPA-side
  image, the algorithm's documented counter surface and how
  to inspect it via the read-only counter CLI to confirm
  shaping is occurring under load, and the explicit DECISION
  RULE (keep the shipped defaults / tune via the documented
  parameter surface / commit to a custom algorithm written
  against the host-side framework) so the user does not
  drift into customization without a measured reason. The
  same SHAPE generalizes to any vendor-shipped reference
  workload that runs on a programmable target processor and
  modulates an existing data plane; the per-target details
  differ.

  A baseline agent without skills typically: conflates the
  algorithm library, the host-side framework, and the
  counter CLI ("just install doca-pcc-ztr-rttcc-algo and
  it'll work"); invents algorithm-side parameter
  identifiers, counter names, and variant labels from
  generic congestion-control knowledge; skips the
  README-documented in-place edits on the shipped DOCA PCC
  application and tries to write a parallel application
  from scratch; diagnoses "the algorithm loaded but the
  flows look unchanged" as an algorithm bug instead of as
  an observability / traffic-presence / parameter-posture
  problem; recommends a custom algorithm before confirming
  the shipped one cannot meet the requirement with its
  documented tunables; assumes parameter writes can be
  done by direct DPA-side memory pokes instead of through
  the framework's range-checked set-algo-params path;
  forgets the variant choice is a DPACC build-time decision
  and pretends it can flip at runtime; and never names the
  three-artifact triangle that is the most common first-
  touch error class for this whole feature.

prompt: |
  I have a host attached to a BlueField-3 DPU over PCIe,
  DOCA already installed on the host, the DPACC compiler
  installed alongside DOCA at a version that matches DOCA,
  the BlueField firmware-level custom-PCC slot already
  enabled, and a production RoCE-v2 workload from a GPU
  cluster flowing through the BlueField port I care about
  (so the data plane I want to shape already exists and is
  under real load). I want to deploy the DOCA-SHIPPED
  REFERENCE Programmable Congestion Control algorithm — the
  Zero-Touch RoCE RTT CC algorithm — onto that port, confirm
  it is actually modulating the RDMA flows under load, and
  then decide whether to keep it as-is, tune its documented
  parameters, or commit to writing my own custom algorithm.
  I do NOT want a generic *"learn PCC from scratch"* tour;
  I want a deployment + validation + decision walkthrough
  specific to the shipped reference algorithm.

  Walk me through it: which DOCA artifact is THIS algorithm
  on my install (and how it differs from the artifacts I
  could confuse it with — the host-side framework that
  loads any PCC algorithm, and the read-only counter CLI
  that inspects PCC counters at the port), what compiles
  the algorithm and what side it runs on (host vs DPA),
  which preconditions I have to re-verify even though I
  said I already enabled the firmware slot (so I know
  what's a *gate* vs what's an *error path* later), which
  variant of the algorithm the DPA-side source ships and
  which one I'm getting by default, exactly which in-place
  edits I have to make on the shipped DOCA PCC application
  source (under `/opt/mellanox/doca/applications/pcc/`) to
  wire the algorithm into the user-algo / user-init /
  user-set-algo-params callbacks and into the DPACC build
  script and the meson dependency list, what the algorithm's
  init-time *algo slot* choice means and what happens if I
  collide with the rtt-template sample's default slot, what
  single-event smoke I should run FIRST before driving full
  production load through the modified application, then
  the validation step: how I use the counter CLI to
  distinguish *"the algorithm loaded but is not modulating
  my flows"* from *"the algorithm loaded and is shaping
  flows the way the documented behavior model says"*, which
  counter categories I look at first under sustained load,
  and what I look for in the AI / decrement / RTT
  statistics counters to confirm the algorithm is binding
  the workload.

  After that, walk me through the decision: when the data
  says the shipped algorithm is fine and I keep it as the
  zero-config baseline; when the data says I need to TUNE
  one of the documented parameters via the framework's
  set-algo-params path (and tell me how I apply the
  parameter without rebuilding the DPA-side image, and why
  I must NOT poke the parameter array directly); and when
  the data says the shipped algorithm's design — RTT-based
  RoCE-v2 congestion control with the variant I'm running —
  cannot express the latency / fairness / convergence
  behavior my workload needs, in which case I should commit
  to a custom algorithm written against the host-side PCC
  framework. Be explicit about the rollback path before any
  of this is applied to my production port; this is a
  hardware-touching change and I need to know how I revert
  it on a single command.

  Finally, briefly tell me which parts of your answer would
  change if instead of deploying the shipped REFERENCE
  algorithm I wanted to write a CUSTOM congestion-control
  algorithm from scratch against the host-side PCC
  framework, and which parts of the workflow stay the same
  (preconditions, three-artifact triangle, two-side program
  model, counter-CLI validation step, replica-first deploy
  discipline).

context:
  audience: "intermediate"
  intent: "deploy_and_validate_shipped_reference_algorithm_then_decide_keep_tune_replace"
  prior_knowledge: "knows C at the application level; has DOCA installed and DPACC installed at matched versions; has a BlueField-3 with DPA processor exposed and the firmware custom-PCC slot already enabled; has RoCE-v2 traffic actually flowing on the BlueField port to be shaped; has built the shipped DOCA PCC application sample at least once; has not deployed a custom PCC algorithm before; has not previously decided keep / tune / replace on a shipped reference algorithm"
  baseline_artifact: "doca-pcc-ztr-rttcc-algo"
  changed_skill_in_pr: "libs/doca-pcc-ztr-rttcc-algo"
  expected_skill_co_load:
    - "doca-pcc-ztr-rttcc-algo"
    - "doca-pcc"
    - "doca-pcc-counters"
    - "doca-dpa"
    - "doca-version"
    - "doca-rdma"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-hardware-safety"

criteria:
  - id: "three_artifact_triangle_named_first"
    label: "Names the three-artifact triangle (algorithm library, host-side framework, read-only counter CLI) BEFORE prescribing any action"
    weight: 3
    pass_when: |
      The agent's FIRST conceptual move is to surface that
      this feature is THREE distinct DOCA artifacts that the
      user must not conflate: (a) the shipped algorithm
      library `doca-pcc-ztr-rttcc-algo` — one specific
      reference algorithm body — which is what the user
      asked about; (b) the host-side framework `doca-pcc`
      that LOADS any PCC algorithm onto the BlueField DPA
      and owns the host-side per-port lifecycle; (c) the
      read-only diagnostic CLI for PCC counters (the DOCA
      PCC counter tool) that INSPECTS what the running
      algorithm emits. The agent explicitly states all
      three are separate, and that the user's request
      (deploy and validate this shipped algorithm) requires
      ALL THREE in cooperation — the algorithm library to
      supply the body, the host-side framework to load it,
      and the counter CLI to validate it. A response that
      conflates the algorithm library with the framework
      ("just install the algorithm and it loads itself"),
      or that recommends the counter CLI as the way to
      deploy / configure the algorithm, or that mentions
      only one of the three and is silent on the others,
      fails this criterion.

  - id: "shipped_reference_vs_custom_decision_rule"
    label: "Frames the keep / tune / replace decision as a measured rule with explicit thresholds, not a preference"
    weight: 3
    pass_when: |
      The agent gives a CONCRETE decision rule the user can
      apply with their counter data: (a) KEEP the shipped
      algorithm when the counter CLI shows the algorithm is
      receiving CC events, AI / decrement counters are
      moving under load, and the workload's measured
      latency / fairness / convergence behavior meets the
      user's targets; (b) TUNE one of the documented
      parameters (via the framework's set-algo-params path
      that lands in `doca_pcc_dev_set_ztr_rttcc_params`)
      when the algorithm is binding the workload but the
      posture is too conservative or too aggressive for the
      observed congestion signal, surfacing that the
      tunable categories the algorithm exposes are bandwidth
      / rate envelope, additive-increase pacing, congestion
      thresholds, mode toggles, and per-variant blocks; (c)
      REPLACE with a custom algorithm written against the
      host-side framework when the workload's requirements
      (different signal source than RTT, different fairness
      model than the shipped one, different convergence
      behavior) are outside what the reference algorithm
      can express even after tuning. The agent must
      explicitly warn against drifting into a custom
      algorithm "because the default felt wrong" without
      the counter data first. A response that recommends
      writing a custom algorithm without trying the
      shipped defaults and the documented parameter
      surface first, OR that recommends keeping the
      shipped algorithm without the counter-CLI
      validation step, fails.

  - id: "in_place_edits_on_shipped_application"
    label: "Prescribes the README-documented in-place edits on `/opt/mellanox/doca/applications/pcc/` rather than authoring a parallel application"
    weight: 3
    pass_when: |
      The agent walks the EXACT integration-edit checklist
      documented in the shipped algorithm README: (a)
      add `#include "doca_pcc_dev_ztr_rttcc_algo.h"` in the
      DPA-side translation unit; (b) dispatch from
      `doca_pcc_dev_user_algo()` under a chosen algo slot
      to `doca_pcc_dev_ztr_rttcc_algo(algo_ctxt, event,
      attr, results)`; (c) initialize from
      `doca_pcc_dev_user_init()` via
      `doca_pcc_dev_ztr_rttcc_init(algo_idx)`; (d) route
      host-set parameter updates from
      `doca_pcc_dev_user_set_algo_params()` into
      `doca_pcc_dev_set_ztr_rttcc_params(...)`; (e) add
      `-ldoca_pcc_ztr_rttcc_algo_dev` to the DPACC
      `-device-libs` flag in
      `build_device_code.sh`; (f) add
      `app_doca_depends += ['pcc_ztr_rttcc_algo']` to
      `dependencies/meson.build`; (g) rebuild via the
      `meson <BUILD_DIR>
      -D=enable_all_applications=false
      -Denable_pcc=true && ninja -C <BUILD_DIR>` invocation.
      The agent must also surface the algo-slot collision
      with the shipped rtt-template demo (algo slot 0): if
      the user reuses slot 0, the existing rtt-template
      dispatch must be removed. A response that proposes
      authoring a parallel PCC application from scratch
      instead of editing the shipped sample, OR that
      omits the `build_device_code.sh` linker flag, OR
      that omits the `dependencies/meson.build` change,
      OR that does not surface the algo-slot collision
      with the shipped sample, fails.

  - id: "parameter_apply_path_only_through_framework_setparams"
    label: "Parameters MUST be applied via the framework's set-algo-params path, never by direct DPA-side memory writes"
    weight: 2
    pass_when: |
      When the agent walks the TUNE branch of the decision,
      it explicitly states that parameters land via
      `doca_pcc_dev_set_ztr_rttcc_params` from inside
      `doca_pcc_dev_user_set_algo_params()`, that this
      call range-checks each parameter against the
      algorithm's documented limits, and that on failure
      `DOCA_PCC_DEV_STATUS_FAIL` is returned and NO
      parameters are changed. The agent explicitly warns
      against bypassing this path by writing into the
      DPA-side parameter array directly, surfaces that
      doing so would bypass the range-check, and surfaces
      that parameter identifiers must be quoted verbatim
      from the installed DPA-side header set under the
      algorithm's source tree rather than from agent
      memory. A response that proposes "just patch the
      parameter table on the DPA side" or that invents
      parameter identifiers from generic congestion-
      control vocabulary fails this criterion.

  - id: "variant_choice_is_build_time"
    label: "Surfaces that the variant choice (vanilla / path-migration / RX-rate / multipath / window-probeless) is a DPACC build-time decision, not a runtime knob"
    weight: 2
    pass_when: |
      The agent names the variant set the DPA-side source
      ships (vanilla RTT-CC, path-migration mode, RX-rate
      mode, RX-rate + PM, multipath, multipath + credits,
      window-probeless), surfaces that the public symbol
      `doca_pcc_dev_ztr_rttcc_algo` resolves to ONE of them
      at DPACC build time, and explicitly states that
      switching variants is a DPA-side rebuild — the
      variant is not a runtime knob. The agent also
      surfaces that the default variant a fresh build
      gets is the vanilla RTT-CC variant unless the user
      changes the DPACC linkage. A response that treats
      the variant as a runtime parameter set via
      `doca_pcc_dev_set_ztr_rttcc_params`, OR that
      asserts there is only one variant, OR that invents
      a variant outside the set the DPA-side source
      actually ships, fails.

  - id: "counter_cli_validation_step"
    label: "Routes validation through the read-only counter CLI and distinguishes loaded-but-idle from loaded-and-shaping"
    weight: 2
    pass_when: |
      The agent walks a CONCRETE validation flow using the
      read-only PCC counter CLI: list available counters,
      snapshot before sustained load, drive representative
      RoCE-v2 load, snapshot after, diff. The agent
      explicitly names the discriminator: a monotonically
      growing CC-event handle counter combined with stalled
      AI / decrement counters is "algorithm loaded but
      idle" (parameter posture or variant mismatch); CC-
      event handle counter growing AND AI / decrement
      counters moving AND RTT statistics counters /
      rate-envelope counters moving is "algorithm loaded
      and shaping". The agent routes the actual CLI
      invocation (subcommand names, flags) to the counter-
      tool skill rather than quoting them from memory. A
      response that conflates "the algorithm loaded" with
      "the algorithm is shaping flows", OR that proposes
      validating shaping by reading rate counters on the
      host RDMA stack instead of via the PCC counter CLI,
      fails.

  - id: "rollback_path_explicit_before_apply"
    label: "Names the rollback path before any change lands on the production port"
    weight: 2
    pass_when: |
      Before walking the apply step, the agent surfaces a
      concrete rollback path: stopping the host-side
      application that loaded the algorithm — or destroying
      the host-side `doca_pcc` context that loaded it and
      re-attaching the previous one — reverts the port to
      its previous PCC state in a single operation. The
      agent surfaces that this is a hardware-touching
      change because it modulates production RoCE-v2
      flows, and that the replica-first / maintenance-
      window discipline from the bundle-wide hardware-
      safety meta-policy applies. The agent must NOT
      invent a "rollback sub-command" inside the algorithm
      library — the rollback is a framework-level
      destroy + re-attach OR an application stop. A
      response that walks the apply path without naming
      the rollback path first, OR that invents a
      `doca_pcc_ztr_rttcc_rollback()` symbol, OR that
      omits the production-touching hazard, fails.

  - id: "no_hallucinated_algorithm_api"
    label: "Does not invent `doca_pcc_dev_ztr_rttcc_*` symbols, parameter ids, counter names, or variant labels"
    weight: 2
    pass_when: |
      Every `doca_pcc_dev_ztr_rttcc_*` symbol the agent
      mentions is one of the symbols the algorithm's
      public header actually exposes
      (`doca_pcc_dev_ztr_rttcc_init`,
      `doca_pcc_dev_ztr_rttcc_algo`,
      `doca_pcc_dev_set_ztr_rttcc_params`,
      `doca_pcc_dev_ztr_rttcc_get_param_num`,
      `doca_pcc_dev_ztr_rttcc_get_counter_num`,
      `doca_pcc_dev_ztr_rttcc_get_num_of_histograms`) OR
      it is explicitly framed as pseudocode / placeholder
      with the agent telling the user to quote the exact
      symbol from the installed header
      `doca_pcc_dev_ztr_rttcc_algo.h`. Parameter
      identifiers and counter names are routed to the
      installed DPA-side header set under the algorithm's
      source tree (or to the public DOCA PCC programming
      guide on docs.nvidia.com), NOT quoted from agent
      memory. A response that invents
      `doca_pcc_ztr_rttcc_easy_deploy()`,
      `doca_pcc_ztr_rttcc_attach_port()`,
      `doca_pcc_ztr_rttcc_tune_for_workload()`, or
      that quotes a specific parameter identifier or
      counter name as if it were canonical without
      routing it to the installed headers, fails — that
      is the baseline-agent hallucination failure mode the
      bundle exists to prevent.

  - id: "version_overlay_and_dpacc_match"
    label: "Quotes pkg-config --modversion doca-pcc-ztr-rttcc-algo AND surfaces the DOCA-and-DPACC match rule"
    weight: 1
    pass_when: |
      The agent surfaces that the algorithm versions WITH
      DOCA — `pkg-config --modversion doca-pcc-ztr-rttcc-algo`,
      cross-checked with `pkg-config --modversion doca-pcc`
      and `pkg-config --modversion doca-common` and with
      the installed DPACC version — must agree per the
      DOCA Compatibility Policy at
      docs.nvidia.com/doca/sdk/doca-compatibility-policy/.
      The agent must NOT quote a specific version pin from
      memory; the version check is a `pkg-config` /
      `--version` operation against the live install. A
      response that omits the DPACC-match overlay, OR that
      quotes a DOCA version pin from memory, OR that
      treats `pkg-config --modversion doca-pcc-ztr-rttcc-algo`
      alone as sufficient without the DPACC axis, fails.

  - id: "generalizes_to_custom_pcc_algorithm"
    label: "Generalizes from deploying the shipped reference algorithm to writing a custom one against the host-side PCC framework"
    weight: 2
    pass_when: |
      The agent explicitly addresses the final part of the
      prompt: it generalizes from the shipped-reference-
      algorithm path to writing a CUSTOM PCC algorithm
      against the host-side `doca-pcc` framework, and
      identifies which parts STAY THE SAME (the host-side
      framework precondition chain — firmware custom-PCC
      slot, matched DOCA + DPACC, DPA-capable BlueField;
      the three-artifact triangle with the read-only
      counter CLI on the validation side; the two-side-
      program model — host-side control plus DPA-side
      algorithm body compiled by DPACC; the DOCA Core
      lifecycle on the host-side framework's per-port
      context; the counter-CLI validation step under
      sustained load; the replica-first hardware-safety
      discipline) versus which CHANGE (the user authors
      the algorithm body in a DPA-side translation unit
      themselves rather than linking the shipped library;
      the algo-slot wiring is in the user's own
      `doca_pcc_dev_user_algo()` body rather than
      dispatching to `doca_pcc_dev_ztr_rttcc_algo`; the
      parameter and counter surface is whatever the
      user's custom algorithm defines rather than the
      shipped algorithm's; the in-place edits are on the
      user's own application rather than on the shipped
      DOCA PCC application sample; the keep / tune /
      replace decision becomes a continuous evaluation
      against the user's own algorithm rather than
      against the shipped reference). A response that
      walks only the shipped-algorithm case and is silent
      on the generalization fails. A response that
      proposes the user can "modify the shipped library
      in place to make it custom" — instead of authoring
      a separate algorithm body against the framework —
      fails.
