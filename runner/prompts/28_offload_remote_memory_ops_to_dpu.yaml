id: "28_offload_remote_memory_ops_to_dpu"
name: "Offload HPC remote memory operations to the DPU via DOCA UROM — class-shaped"
description: |
  Class-shaped prompt for offloading HPC / UCX / MPI remote
  memory operations (puts, gets, atomics, active messages,
  collective primitives) from the host CPU to the BlueField
  DPU using the host-side `doca-urom` library. The HEADLINE is
  the class ("offload HPC remote memory operations from the
  host CPU to the BlueField DPU via DOCA UROM, freeing host
  CPUs for compute"); the worked example is an MPI application
  on a multi-node cluster that wants to push its all-reduce
  collective onto the BlueField DPUs so host CPUs stop spending
  cycles on communication, because that is the newly-covered
  library in skills/libs/doca-urom.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent the
  shape of *offloading a workload to a DPU through a host
  library that is paired with a DPU-side service*. The bundle
  proves this by asking the agent to walk: env preconditions
  FIRST (especially that the DOCA UROM Service is deployed and
  running on the DPU side — the baseline-agent failure mode
  most often missed), the library / service split (doca-urom is
  the host library, the DOCA UROM Service is a SEPARATE
  artifact on the DPU side, they are a paired contract), the
  capability-query rule against the active doca_devinfo for op
  types / atomics / collectives, the DOCA Core lifecycle for
  the per-`doca_urom` context on the host, the underlying RDMA
  transport substrate (`doca-rdma`) UROM rides on top of, and
  a small put / get round-trip smoke between two nodes BEFORE
  scaling to a full collective pattern. The same SHAPE
  generalizes to raw `doca-rdma`; the per-library details
  differ (UROM has the DPU-side service contract that doca-rdma
  doesn't; UROM targets collective patterns whereas doca-rdma
  is raw point-to-point; UROM frees host CPU whereas doca-rdma
  uses host CPU for posting verbs).

  A baseline agent without skills typically: treats doca-urom
  as if it were standalone and never mentions the paired
  DPU-side UROM Service must be running; diagnoses the
  resulting `DOCA_ERROR_NOT_PERMITTED` as a host-OS permission
  problem instead of a missing DPU-side service; invents
  `doca_urom_*` API symbols for specific operation kinds /
  atomics / collectives from memory instead of routing the
  user to the install's headers and shipped samples; skips the
  cap-query against doca_devinfo for op-type / atomic /
  collective support entirely; conflates the library with the
  DOCA UROM Service and recommends operating the service
  through the library API; forgets that UROM rides on top of
  the `doca-rdma` substrate and misattributes
  `DOCA_ERROR_IO_FAILED` (an underlying RDMA failure) to the
  UROM library; jumps from `doca_ctx_start()` straight to a
  full all-reduce collective without a single put / get smoke
  between two nodes; recommends using doca-urom for a simple
  point-to-point case where raw doca-rdma is cheaper; and
  never generalizes from the UROM-with-DPU-service shape to
  the underlying raw RDMA shape.

prompt: |
  I have a multi-node HPC cluster: each node has a host with a
  BlueField DPU plugged in over PCIe, DOCA already installed on
  the host, and the cluster's inter-node RDMA fabric (RoCE)
  already up and routing between nodes. I'm running an MPI
  application on this cluster and the all-reduce collective is
  eating a lot of host CPU cycles I'd much rather spend on
  compute. I want to offload the remote memory operations
  underlying that all-reduce onto the BlueField DPUs via DOCA
  UROM so the host CPUs are freed for compute and the DPUs do
  the communication work.

  Walk me through the setup: which DOCA library I use on the
  HOST side (and how it relates to any similarly-named DOCA
  artifact I might confuse it with — there's something called
  the "DOCA UROM Service" I keep seeing referenced, is that
  the same thing or different?), what I have to check BEFORE
  writing any host-side `doca_urom_*` code (including any
  DPU-side service-state checks I need to do before the host
  library will even be able to offload — please be explicit
  about whether this is an env / service problem or a code
  problem on the host), which capability queries I have to run
  against the active doca_devinfo for the operation families I
  care about (puts / gets / atomics / collective primitives),
  the DOCA Core lifecycle I have to follow when creating the
  per-`doca_urom` context on the host, how `doca-urom` relates
  to the underlying RDMA transport — does it replace
  `doca-rdma`, or layer on top of it, or something else? — and
  what single small smoke test you'd recommend BEFORE I scale
  to the full all-reduce collective pattern across all the
  nodes in my cluster.

  After that, briefly tell me which parts of your answer would
  change if I instead wanted to use raw `doca-rdma` directly
  (i.e. post the RDMA verbs from the host CPU myself) for a
  simple point-to-point case between two nodes, and which
  parts would stay the same. I'm asking because I want to
  understand when DOCA UROM is the right tool versus when raw
  `doca-rdma` is.

context:
  audience: "intermediate"
  intent: "offload_remote_memory_ops_to_dpu"
  prior_knowledge: "knows what a DPU is, has a multi-node BlueField + host cluster with RoCE already up, has done at least one MPI / UCX application build before, knows what all-reduce / put / get / atomic operations are conceptually but has not used the DOCA UROM API, has not deployed the DOCA UROM Service on the DPU side before"
  baseline_artifact: "doca-urom"
  changed_skill_in_pr: "libs/doca-urom"
  expected_skill_co_load:
    - "doca-urom"
    - "doca-rdma"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "dpu_service_running_check_first"
    label: "Confirms the DPU-side DOCA UROM Service is deployed and running BEFORE any host-side code change"
    weight: 2
    pass_when: |
      The agent's FIRST conceptual move is to surface that the
      DOCA UROM Service must be deployed and running on the
      target BlueField BEFORE any host-side `doca_urom_*` code
      is meaningful. The agent states that the host-side
      library cannot offload to a service that is not there,
      and that this is a service-side env precondition (route
      to the public DOCA UROM Service guide), NOT a host-side
      code problem. A response that walks straight to
      `doca_urom_*` host API calls without first naming the
      DPU-side service-running precondition fails this
      criterion. A response that mentions the service only as
      an afterthought after walking through host-side code
      also fails — the service-running check must come FIRST.

  - id: "library_vs_service_split"
    label: "Distinguishes the doca-urom LIBRARY (host-side enqueue) from the DOCA UROM SERVICE (DPU-side executor)"
    weight: 2
    pass_when: |
      The agent explicitly names `doca-urom` as the HOST-side C
      library the user's MPI / UCX / HPC code links against to
      ENQUEUE remote memory operations, AND explicitly names
      the DOCA UROM Service as a SEPARATE DPU-side artifact
      (a long-running daemon / container on the BlueField Arm
      side) that EXECUTES the enqueued operations. The agent
      states that the two are a paired contract: host
      enqueues, DPU executes; both must be present at
      compatible versions before the first enqueue succeeds. A
      response that treats doca-urom as a single artifact and
      does not surface the library / service split fails. A
      response that confuses which side is which (e.g. claims
      the library runs on the DPU, or that the service is part
      of the library) fails. A response that recommends
      operating / deploying the service through the host-side
      library API also fails — service deployment goes
      through the public DOCA UROM Service guide, not through
      `doca_urom_*` calls.

  - id: "cap_query_against_devinfo"
    label: "Calls out `doca_urom_cap_*` against the active doca_devinfo for op-type / atomic / collective support BEFORE assuming features"
    weight: 2
    pass_when: |
      The agent says the user MUST run `doca_urom_cap_*`
      queries against the active doca_devinfo BEFORE assuming
      a particular operation family (puts, gets, atomic
      variants, active messages, collective primitives) is
      supported on this BlueField + this DOCA install + this
      DPU-side UROM Service version, AND surfaces that
      capability is a multi-axis question — at minimum the
      operation-family axis (which kinds are supported at all)
      AND the per-variant axis (which specific atomic op /
      which specific collective primitive). The agent must
      also note that the cap-query answers the LIBRARY +
      DEVICE axis, but the DPU-side UROM Service version is
      an INDEPENDENT axis that can disagree (host library
      says supported but the running service is at a version
      that doesn't expose that variant — surfaces as runtime
      `DOCA_ERROR_NOT_SUPPORTED`). A response that quotes a
      specific operation symbol name from memory without
      naming the cap query fails. A response that does not
      mention `doca_urom_cap_*` (or an equivalent capability
      query against doca_devinfo) at all fails. A response
      that names only "operation family supported" without
      acknowledging the per-variant and the DPU-service axes
      fails.

  - id: "core_lifecycle_walked"
    label: "Walks the DOCA Core lifecycle for the per-`doca_urom`-instance context on the host"
    weight: 2
    pass_when: |
      The agent walks the lifecycle in order on the host side:
      create the `doca_urom` Core context against the
      `doca_dev` mapping to the target BlueField (the one
      running the DOCA UROM Service); configure the context
      (capability discovery results applied, memory descriptors
      registered, any queue / payload sizing set); start the
      `doca_urom` via `doca_ctx_start()` (the moment the host
      can begin enqueueing operations); enqueue operations and
      drive the host-side `doca_pe_progress` loop to harvest
      completions; tear down in REVERSE order (stop the
      `doca_urom` → destroy the `doca_urom` → close the
      `doca_dev`). The agent surfaces that one `doca_urom` is
      needed per target BlueField (no "global UROM context"
      that spans multiple BlueFields). A response that omits
      the host-side PE-progress requirement, that treats
      `doca_urom` create as equivalent to start, that tears
      down in forward order, or that proposes one `doca_urom`
      context for multiple BlueFields, fails this criterion.

  - id: "rdma_substrate_named"
    label: "Names doca-rdma as the underlying RDMA transport substrate UROM rides on top of (not a replacement)"
    weight: 2
    pass_when: |
      The agent explicitly names `doca-rdma` (or the equivalent
      underlying RDMA / RoCE / IB transport surface) as the
      substrate the BlueField uses to actually move bytes once
      UROM has offloaded a remote memory operation, AND
      surfaces that UROM does NOT replace RDMA — it adds the
      DPU-offload contract on top so the host CPU does not
      have to post the verbs itself. The agent must surface
      that a failing RDMA fabric (link down, RoCE / IB config
      skew between nodes) will surface as `DOCA_ERROR_IO_FAILED`
      at the UROM API and the right diagnostic is at the RDMA
      substrate layer, not in the UROM library. A response
      that claims UROM replaces doca-rdma fails. A response
      that does not mention any underlying RDMA / substrate
      surface at all (treating UROM as if it had its own
      transport) fails. A response that recommends
      reimplementing RDMA-layer concerns inside the UROM
      consumer to mask a substrate problem also fails.

  - id: "small_smoke_before_collective"
    label: "Recommends a single put / get round-trip between two nodes BEFORE scaling to the full collective pattern"
    weight: 1
    pass_when: |
      The agent recommends one small put + one small get
      round-trip between TWO nodes as the FIRST functional
      test — verifying the host-side completion event fires
      AND the peer-side memory contains the expected bytes —
      BEFORE scaling to the user's full all-reduce collective
      pattern across the cluster. The agent surfaces that a
      single-pair smoke is the cheapest place to identify
      service-side, version-axis, RDMA-substrate, or
      memory-descriptor gaps before any HPC stack effort is
      wasted on a full collective. A response that jumps from
      `doca_ctx_start()` straight to a full collective
      pattern, or that fails to name the single-pair put /
      get smoke as the first functional test, fails this
      criterion. A response that proposes a smoke on a SINGLE
      node (no peer) also fails — UROM needs a peer for the
      operation to mean anything, and a single-node smoke
      cannot identify substrate / version-pair gaps.

  - id: "no_hallucinated_urom_api"
    label: "Does not invent `doca_urom_*` API symbols beyond the public surface"
    weight: 1
    pass_when: |
      Every `doca_urom_*` / `doca_ctx_*` / `doca_pe_*` /
      `doca_dev*` symbol the agent mentions is one that the
      skill documents as part of the public surface (`doca_urom`
      as the per-instance Core context, `doca_urom_cap_*`
      family for capability discovery, `doca_ctx_start` /
      `doca_ctx_stop` for the universal Core lifecycle,
      `doca_pe_progress` for the progress engine, `doca_dev` /
      `doca_devinfo`), OR it is explicitly framed as
      pseudocode / sketch / function-name placeholder, OR the
      agent routes the user to the install's headers and
      shipped samples (under
      `/opt/mellanox/doca/infrastructure/include/` and
      `/opt/mellanox/doca/samples/doca_urom/`) for the
      install-bound exact symbol names. A response that
      invents API names like `doca_urom_offload_all_reduce()`,
      `doca_urom_quick_init()`, `doca_urom_put_easy()`,
      `doca_urom_collective_register()`, or
      `doca_urom_start_service()` (especially the last —
      starting the SERVICE through the LIBRARY API is exactly
      the library / service confusion the bundle exists to
      prevent) without framing them as illustrative
      placeholders fails — that is the baseline-agent
      hallucination failure mode the bundle exists to prevent.
      A response that frames the enqueue + progress + observe
      surface in prose (without committing to specific
      invented function names) passes this criterion.

  - id: "generalizes_to_raw_rdma"
    label: "Generalizes from doca-urom (with DPU-side service) to raw doca-rdma (point-to-point, host-CPU-posted)"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names raw `doca-rdma` as the right artifact
      for the simple point-to-point case where the host CPU
      is not the bottleneck, AND identifies which parts of
      the workflow STAY THE SAME (the DOCA Core context
      lifecycle on the host side; the capability-query rule
      against the active doca_devinfo for which task / op
      types are supported; the underlying RDMA transport
      substrate — both go over the same RDMA fabric; the
      single-pair smoke before scaling; the version
      compatibility four-way match per the DOCA Compatibility
      Policy) versus which parts CHANGE (doca-urom has a
      paired DPU-side SERVICE contract — doca-rdma does NOT
      need any DPU-side service running; doca-urom targets
      collective / HPC patterns where host CPU is the
      bottleneck — doca-rdma is raw point-to-point and the
      host CPU posts each verb itself; doca-urom FREES the
      host CPU by offloading work to the BlueField DPU —
      doca-rdma USES the host CPU for posting verbs; the
      capability-query family differs by library
      (`doca_urom_cap_*` vs `doca_rdma_cap_*`); the
      operation-family vocabulary differs (UROM speaks
      puts / gets / atomics / active messages / collective
      primitives at the offload contract, RDMA speaks
      Send / Receive / Read / Write / Atomic at the verb
      level)). A response that walks only UROM and is silent
      on the generalization fails. A response that claims
      doca-urom and doca-rdma are the same artifact, or that
      recommends doca-urom for the simple point-to-point case
      where doca-rdma is cheaper, or that recommends raw
      doca-rdma for the HPC collective case where the host
      CPU is the bottleneck and the user explicitly wants
      offload, fails this criterion.
