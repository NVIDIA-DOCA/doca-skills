id: "23_wire_doca_argp_into_app"
name: "Wire DOCA-standard argument parsing into a sample or new app — class-shaped"
description: |
  Class-shaped argument-parsing prompt. The HEADLINE is the class
  ("wire DOCA-standard argument parsing into a sample or new
  app"); the worked example is adding a new `--my-flag` parameter
  to an existing DOCA sample (specifically `doca_dma/dma_copy/`)
  because that is the newly-covered library in
  skills/libs/doca-argp.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  wire DOCA-standard argument parsing into ANY DOCA sample
  (DMA, Comch, RDMA, Flow, Eth, Compress, SHA, …) — not just the
  worked example. The bundle proves this by asking the agent to
  walk: recognize doca-argp is the right tool, name the
  register-before-start lifecycle, plug the new param in
  alongside the existing standard ones, preserve the standard
  `--device` / `--rep-list` / `--sdk-log-level` / `--json-config`
  surface, recommend a `--help` + argv + JSON-config smoke test.
  The same SHAPE applies to every DOCA sample's CLI surface
  because every shipped sample uses doca-argp + a DOCA Core
  context + cleanup-on-exit + DOCA_LOG for output.

  A baseline agent without skills typically: reaches for `getopt`
  / `argparse` / hand-rolled parsing instead of recognizing
  doca-argp owns the standard CLI surface, registers params
  after `doca_argp_start` (BAD_STATE), silently drops the
  standard `--device` / `--representor` / `--sdk-log-level` /
  `--json-config` flags by re-implementing parsing from scratch,
  invents API names like `doca_argp_easy_add()` or
  `doca_argp_quick_parse()`, and skips the JSON-config-file
  smoke that proves operators can drive the modified sample
  from a config file.

prompt: |
  I have a host with DOCA installed. I want to add a new
  `--my-flag` parameter (an integer; default 0; the sample's
  main loop should pick it up via the user-config struct) to the
  existing DOCA DMA Copy sample at
  /opt/mellanox/doca/samples/doca_dma/dma_copy/. The sample
  already accepts the standard DOCA CLI flags (--device,
  --representor, --rep-list, --sdk-log-level, --json-config)
  and I do not want any of those to break — operators on my
  team already know that CLI from other DOCA samples.

  Walk me through the modification: which arg-parsing layer I
  should reuse (and why I should NOT swap it for getopt or
  argparse), the lifecycle order I have to follow when
  registering the new flag, how my new flag plugs in alongside
  the existing standard ones without overriding them, and what
  I should smoke-test to prove both the new flag and the
  standard surface still work — including driving the modified
  sample from a --json-config file so operators have that option
  too.

  After that, briefly tell me which parts of your answer would
  change if I were modifying a DIFFERENT DOCA sample (e.g. a
  Comch sample, an RDMA sample, a Flow sample) instead of a DMA
  sample, and what the constant "shape of a DOCA sample" looks
  like across all of them (the arg-parsing layer, the Core
  context, the cleanup-on-exit pattern, the DOCA_LOG output).

context:
  audience: "intermediate"
  intent: "modify_sample_cli"
  prior_knowledge: "has DOCA installed, has read or modified at least one DOCA sample, knows what getopt / argparse are conceptually but not how DOCA standardizes CLI across its samples"
  baseline_artifact: "doca-argp"
  changed_skill_in_pr: "libs/doca-argp"
  expected_skill_co_load:
    - "doca-argp"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "recognizes_doca_argp_is_the_tool"
    label: "Recognizes doca-argp is the right tool; does not recommend getopt / argparse instead"
    weight: 2
    pass_when: |
      The agent explicitly says the modification must reuse the
      existing doca-argp layer in the sample's *_main.c, and
      explicitly does NOT recommend swapping it for getopt,
      argparse, or any hand-rolled parsing. The agent gives at
      least one reason this matters: standard CLI surface
      consistency across samples, --json-config integration
      coming for free, or the error-taxonomy ladder
      (BAD_STATE / INVALID_VALUE / NOT_FOUND / IO_FAILED) that
      only fires under doca-argp. A response that suggests
      "you could also just use getopt for simplicity", or that
      writes a custom argv parser without mentioning doca-argp,
      fails.

  - id: "register_before_start_lifecycle"
    label: "Names the register-before-start lifecycle order"
    weight: 2
    pass_when: |
      The agent states the lifecycle order explicitly:
      doca_argp_init FIRST, then doca_argp_param_create →
      doca_argp_param_set_* → doca_argp_register_param for the
      new flag, then doca_argp_start(argc, argv) ONCE, then
      doca_argp_destroy on every exit path. The agent calls
      out that registering after doca_argp_start returns
      DOCA_ERROR_BAD_STATE and that doca_argp_start runs once
      per process. A response that walks from doca_argp_init
      straight to doca_argp_start without naming the
      register-in-between step, or that registers inside the
      value-callback of another param, fails.

  - id: "new_param_plugs_in_alongside_standard"
    label: "Shows the new param plugging in alongside the existing standard ones"
    weight: 2
    pass_when: |
      The agent shows (in prose or pseudocode clearly labeled as
      such) that the new --my-flag registration is ADDED to the
      sample's existing doca_argp_* calls, not in place of
      them. The agent names the parameter type (int, matching
      the prompt), the long name (--my-flag), and the
      value-callback that writes into the user-config struct,
      and explicitly states the long name must not collide
      with the standard surface names. A response that
      rewrites the sample's main() from scratch, or that omits
      the type declaration entirely, fails.

  - id: "preserves_standard_cli_surface"
    label: "Preserves --device / --rep-list / --sdk-log-level / --json-config"
    weight: 2
    pass_when: |
      The agent explicitly states that the standard DOCA CLI
      flags (--device, --representor, --rep-list,
      --sdk-log-level, --json-config) are already registered by
      the sample's existing doca_argp_init + default param
      setup and must NOT be re-registered or replaced by the
      modification. The agent calls out that re-registering a
      standard flag's long name silently overrides it and
      breaks cross-sample muscle memory. A response that
      re-implements --device parsing, or that drops
      --json-config from the modified sample, fails.

  - id: "smoke_test_help_plus_argv_plus_json"
    label: "Recommends --help + argv + JSON-config smoke as the test set"
    weight: 2
    pass_when: |
      The agent recommends THREE smoke tests in order:
      (1) ./<binary> --help shows BOTH the new --my-flag AND
      the standard surface (--device, --representor,
      --rep-list, --sdk-log-level, --json-config);
      (2) ./<binary> --my-flag <int> --device <PCI> parses
      successfully and the value reaches the user-config
      struct; (3) ./<binary> --json-config ./my-config.json
      parses the same configuration when --my-flag is
      expressed as a JSON key. A response that only tests
      --help, or that only tests argv (skipping the
      --json-config smoke), fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_argp_* API symbols"
    weight: 1
    pass_when: |
      Every doca_argp_* (or doca_ctx_*, doca_pe_*) symbol the
      agent mentions is one that actually exists in the public
      DOCA Arg Parser surface (or it is explicitly framed as
      pseudocode / sketch). A response that invents API names
      like doca_argp_easy_add(), doca_argp_quick_parse(), or
      doca_argp_register_flag_simple() fails — that is the
      baseline-agent hallucination failure mode the bundle
      exists to prevent.

  - id: "generalizes_to_any_doca_sample"
    label: "Generalizes from DMA to any DOCA sample; names the constant 'shape of a DOCA sample'"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names at least ONE OTHER DOCA library's sample
      (Comch, RDMA, Flow, Eth, Compress, SHA, …) and identifies
      which parts of the modification stay the same (the
      arg-parsing layer is doca-argp in every sample;
      register-before-start lifecycle; standard CLI surface
      identical across samples; --help / argv / --json-config
      smoke set identical; cleanup-on-exit pattern via
      doca_argp_destroy paired with the Core context destroy;
      DOCA_LOG output channel) versus which change (which
      DOCA library the sample wraps, the per-library param
      callbacks that follow the parsed value into the Core
      context). A response that walks only DMA and is silent
      on generalization, or that fails to name the constant
      shape every DOCA sample shares, fails this criterion.
