id: "131_verify_recommended_change_for_doca_bench_extension"
name: "Verify a recommended change to bench-extension (tool)"
description: |
  Per-artifact verification-axis smoke prompt for the tools/doca-bench-extension skill,
  generated to close the May-2026 per-developer-team coverage gap (the
  remaining shipping artifacts that had no dedicated verification-axis
  prompt). The variant-C bundle must route the agent through
  tools/doca-bench-extension/SKILL.md -> CAPABILITIES.md -> TASKS.md AND emit the
  universal verification contract from AGENTS.md ## The universal
  verification contract (5 steps: env precondition, cap query, smoke
  before bulk, contract surface, observability). The variant-A baseline
  typically skips the contract entirely and emits unverified function
  names or pkg-config invocations -- which is the failure mode this
  prompt is designed to expose at scale, per-artifact.

prompt: |
  I have a working setup using the DOCA bench-extension tool. A teammate
  recommended a change to my code -- they say it will make my use of
  bench-extension faster / safer / more correct. Before I apply the change to
  production, walk me through how to verify their recommendation is
  actually right for my install and my hardware. Be specific to
  bench-extension, do not give me a generic answer.

context:
  audience: "intermediate"
  intent: "verify_recommended_change"
  prior_knowledge: "already has a working DOCA bench-extension setup"
  changed_skill_in_pr: "doca-bench-extension"
  baseline_artifact: "doca-bench-extension"

criteria:
  - id: "cites_universal_verification_contract"
    label: "Cites the universal verification contract from AGENTS.md (5 steps)"
    weight: 2
    pass_when: |
      The agent applies the 5-step universal verification contract from
      AGENTS.md ## The universal verification contract: env precondition,
      capability query, smoke before bulk, contract surface, observability.
      A response that gives only one or two of the five steps fails.

  - id: "routes_through_doca_bench_extension_skill"
    label: "Routes through the doca-bench-extension skill dir, not generic DOCA prose"
    weight: 1
    pass_when: |
      The agent names tools/doca-bench-extension/SKILL.md (or CAPABILITIES.md / TASKS.md)
      as where it is pulling the workflow from, and the workflow it cites
      matches what the doca-bench-extension skill actually documents. Generic
      "use pkg-config and run a smoke test" answers that could have been
      written without the doca-bench-extension skill fail.

  - id: "calls_capability_query_for_doca_bench_extension"
    label: "Issues a capability query specific to bench-extension before recommending the change"
    weight: 1
    pass_when: |
      The agent runs a doca-bench-extension-specific capability query (doca_caps,
      doca_<lib>_cap_*, doca_*_get_supported_*, etc.) against the live
      device before claiming the recommendation is safe to apply. A
      response that asserts the change is correct without a cap query
      fails.

  - id: "smoke_before_bulk_for_doca_bench_extension"
    label: "Smokes the change on the smallest possible scope before scaling"
    weight: 1
    pass_when: |
      The agent recommends running the change against a single
      representor / single queue / single pipe / single resource of the
      smallest legal bench-extension unit-of-damage first, observing the result,
      and only then widening scope. A response that recommends applying
      the change to the full production scope in one shot fails.

  - id: "no_invented_doca_bench_extension_symbols"
    label: "Does not invent bench-extension function names or pkg-config invocations"
    weight: 1
    pass_when: |
      The agent's response does NOT contain any doca-bench-extension-related symbol
      (function name, struct, enum, pkg-config module, link flag) that
      is not actually shipped by the doca-bench-extension library. A response that
      emits, e.g., a `doca_doca_bench_extension_easy_init()` or
      `-ldoca-bench-extension-common` invented for the answer fails.
