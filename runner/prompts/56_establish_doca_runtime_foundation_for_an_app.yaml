id: "56_establish_doca_runtime_foundation_for_an_app"
name: "Establish the doca-common runtime foundation for any DOCA application — class-shaped"
description: |
  Class-shaped foundation-setup prompt. The HEADLINE is the
  class ("establish the doca-common runtime foundation for ANY
  DOCA application"); the worked example walks a brand-new DOCA
  Flow program on BlueField-3, because Flow is one of the
  higher-level libraries every DOCA developer hits first.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  stand up the universal doca-common skeleton BEFORE any
  per-library specialization, regardless of which library the
  user's primary work is in (Flow, RDMA, Eth, DMA, Comch, Rmax,
  SHA, AES-GCM, Erasure-Coding, Compress, DPA, GPUnetIO, PCC,
  STA, …). The bundle proves this by asking the agent to walk:
  pkg-config --modversion doca-common as the install anchor;
  doca_devinfo_create_list → doca_*_cap_* against the active
  devinfo BEFORE quoting any feature; doca_dev_open; (optional)
  representor enumeration on switch-mode BlueField; doca_pe_create
  per worker thread; doca_log_register_source + the two-tier log
  model BEFORE any DOCA_LOG_* emission; per-library
  doca_<library>_create + setters; doca_pe_connect_ctx BEFORE
  doca_ctx_start; the doca_pe_progress drive loop; the
  doca_mmap → doca_buf_inventory → doca_buf zero-copy wiring; the
  drain + teardown order on shutdown. The same SHAPE applies
  regardless of which DOCA library is layered on top; the worked
  example shows Flow, but the agent must explicitly generalize.

  A baseline agent without skills typically: jumps straight to
  doca_flow_port_start without naming the foundation primitives
  (or names them only superficially); invents Common API symbol
  names from generic SDK knowledge; conflates the SDK log tier and
  the app log tier (or omits the two-tier model entirely); forgets
  doca_pe_connect_ctx and then cannot explain why tasks don't
  complete; treats capability discovery as optional ("the docs
  say it's supported, so it must work"); does not generalize from
  Flow to other DOCA libraries (or claims doca-common steps
  differ per library, which they do not); skips the drain-on-
  shutdown step and produces a teardown that crashes far from the
  offending line.

prompt: |
  I'm starting a brand-new DOCA program on a BlueField-3 host
  where DOCA is already installed (I've run `pkg-config
  --modversion doca-common` and got a real version string back,
  so the foundation is there). My primary library for this app
  is DOCA Flow — I want to bring up a Flow port on a representor
  and program a few match-action pipes — but before I open the
  Flow port I want to make sure I have the doca-common
  *foundation* right, because I've seen apps fail at runtime in
  ways that turn out to be Common-layer bugs (tasks that never
  complete, undocumented `DOCA_ERROR_BAD_STATE` returns from
  `doca_ctx_start`, log lines that don't appear at the level I
  asked for).

  Walk me through the doca-common skeleton I need BEFORE I touch
  any `doca_flow_*` call: how I discover the right device and
  its representors, how I gate on device capability before
  trusting the public docs, how I wire `doca_mmap` /
  `doca_buf_inventory` if I'm planning to share buffers across
  libraries, how I bring up the progress engine and make sure
  task completions surface on it, how I wire DOCA Log without
  confusing the SDK tier and the app tier, and the universal
  lifecycle order I have to honor on bring-up and on shutdown.

  Then — this is the important part — generalize: tell me which
  of those steps would STAY THE SAME if my primary library were
  `doca-rdma` or `doca-eth` or `doca-dma` or `doca-comch`
  instead of `doca-flow`, and which (if any) would change. I
  want to be sure the foundation work I do now isn't
  Flow-specific knowledge that I'll have to redo for the next
  library.

  Don't paraphrase symbols — quote `doca_*` API names verbatim
  from the installed Common headers
  (`/opt/mellanox/doca/infrastructure/include/`), and tell me
  HONESTLY when a specific symbol or capability needs a
  cap-query against my active `doca_devinfo` instead of being
  promised by documentation.

context:
  audience: "intermediate"
  intent: "establish_foundation_before_per_library_work"
  prior_knowledge: "knows what a DPU and a representor are, has a BlueField-3 plus host with DOCA installed, has done at least one DOCA build before but has never explicitly walked the doca-common foundation as a discrete layer (always reads the per-library samples top-down and ends up trusting whatever Common wiring the sample happened to use)"
  baseline_artifact: "doca-common"
  changed_skill_in_pr: "libs/doca-common"
  expected_skill_co_load:
    - "doca-common"
    - "doca-flow"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "version_anchor_first"
    label: "Anchors on pkg-config --modversion doca-common as the universal install anchor"
    weight: 2
    pass_when: |
      The agent's FIRST move is to anchor on `pkg-config
      --modversion doca-common` as the universal version anchor
      every doca-common workflow depends on, AND surfaces that
      it must four-way-match `doca_caps --version` and
      `cat /opt/mellanox/doca/applications/VERSION` per the
      cross-cutting version policy in `doca-version`. A response
      that quotes a DOCA version literal from memory, or that
      treats `pkg-config doca-common` as just one of several
      equivalent probes rather than the universal anchor, fails.

  - id: "device_discovery_then_cap_query"
    label: "Walks doca_devinfo_create_list → doca_*_cap_* against the active devinfo BEFORE doca_dev_open"
    weight: 3
    pass_when: |
      The agent walks `doca_devinfo_create_list(&devinfos, &num)`
      → pick the right `doca_devinfo` by PCIe address / IB
      device name / interface name → run the matching
      `doca_*_cap_*` queries (both the generic
      `doca_devinfo_cap_*` family AND the per-library
      `doca_flow_cap_*` family the user will need) against the
      active `doca_devinfo` BEFORE `doca_dev_open`. The agent
      must frame the cap-query as the RUNTIME AUTHORITY (the
      public docs are the promise, the cap-query is the
      reality). A response that opens the device first and then
      assumes capabilities from documentation, or that skips
      the cap-query entirely, fails.

  - id: "progress_engine_drive_loop_named"
    label: "Names doca_pe_create + doca_pe_connect_ctx BEFORE doca_ctx_start + the doca_pe_progress drive loop"
    weight: 3
    pass_when: |
      The agent explicitly states the sequence:
      `doca_pe_create(&pe)` (one PE per worker thread is the
      default), then the per-library `doca_<library>_create`
      and setters, then `doca_pe_connect_ctx(pe, ctx)` BEFORE
      `doca_ctx_start(ctx)`, then `doca_pe_progress(pe)` driven
      on every iteration of the main loop. The agent must call
      out that skipping `doca_pe_connect_ctx` or skipping the
      `doca_pe_progress` drive is the canonical "my tasks submit
      but nothing completes" failure mode. A response that
      omits `doca_pe_connect_ctx`, omits the drive loop, or
      treats progress as automatic, fails.

  - id: "two_tier_log_model_walked"
    label: "Walks the two-tier log model (SDK level vs app level) BEFORE any DOCA_LOG_* emission"
    weight: 2
    pass_when: |
      The agent walks the two-tier model from the doca-common
      log subsystem: SDK tier controls *DOCA library internals*
      (default WARNING; setter `--sdk-log-level` /
      `DOCA_LOG_LEVEL_SDK`); app tier controls *user code
      emissions* (default INFO; setter
      `doca_log_level_set_global_lower_limit` on the app-tier
      registry). The agent must surface that the two are
      INDEPENDENT — they do not share a setter, they do not
      share a default — and that confusing them is the
      number-one first-app log debug failure. The agent must
      also name `doca_log_register_source(<name>, &source_id)`
      as the prerequisite for any `DOCA_LOG_*` emission, with
      the unregistered-source-ID failure mode called out. A
      response that conflates the two tiers, names only one
      setter, or omits the source-register step fails.

  - id: "buffer_lifecycle_named"
    label: "Names the doca_mmap → doca_buf_inventory → doca_buf zero-copy wiring with lifecycle order"
    weight: 2
    pass_when: |
      The agent names the three-object buffer stack
      (`doca_mmap` registers user memory with one or more
      `doca_dev`s; `doca_buf_inventory` carves the registered
      range; `doca_buf` is the per-operation handle) AND the
      lifecycle order: `doca_mmap_create` →
      `doca_mmap_set_memrange` → `doca_mmap_add_dev` →
      `doca_mmap_set_permissions` → `doca_mmap_start` →
      `doca_buf_inventory_create` → `_start` → buffers handed
      out by `doca_buf_inventory_buf_get_by_args`. The agent
      should call out that the same `doca_buf` flows across
      libraries on the same registered memory (the zero-copy
      property). A response that does not mention the buffer
      stack at all, or that conflates `doca_buf` with `doca_mmap`,
      or that omits the lifecycle order, fails.

  - id: "lifecycle_drain_on_shutdown"
    label: "Names doca_ctx_get_num_inflight_tasks / doca_pe_get_num_inflight_tasks drain BEFORE destroy"
    weight: 2
    pass_when: |
      The agent explicitly names the drain-on-shutdown step:
      `doca_ctx_flush_tasks(ctx)` or loop
      `doca_pe_progress(pe)` until
      `doca_ctx_get_num_inflight_tasks(ctx) == 0` (or
      `doca_pe_get_num_inflight_tasks(pe) == 0`) BEFORE
      `doca_ctx_stop` and BEFORE `doca_<library>_destroy`. The
      agent should also call out the reverse-order teardown
      (drain → stop → destroy ctx → buf-inventory stop /
      destroy → mmap stop / destroy → pe destroy → dev close →
      devinfo destroy_list). A response that calls destroy on
      a context while tasks are still in flight, or that omits
      the drain step, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Explicitly generalizes from doca-flow to doca-rdma / doca-eth / doca-dma / doca-comch — names what stays the same"
    weight: 3
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it generalizes from the doca-flow worked example
      to at least two of doca-rdma / doca-eth / doca-dma /
      doca-comch and states clearly that the doca-common
      foundation (device discovery, cap-query, doca_dev_open,
      doca_pe_create / connect_ctx / progress, doca_mmap /
      buf_inventory / buf wiring, ctx lifecycle, log two-tier
      model, drain on shutdown) is IDENTICAL across them — the
      ONLY thing that changes is which per-library
      `doca_<library>_create` is slotted in and which
      `doca_<library>_cap_*` queries are run. The agent must
      NOT claim that the foundation differs per library; that
      is the failure mode this criterion exists to catch. A
      response that walks only the Flow case and is silent on
      generalization, or that claims doca-common steps differ
      per library, fails.

  - id: "no_hallucinated_symbols"
    label: "Does not invent doca_buf_* / doca_ctx_* / doca_dev_* / doca_pe_* / doca_log_* API symbols"
    weight: 2
    pass_when: |
      Every `doca_*` symbol the agent mentions is either in the
      stable Common surface the skill documents (per the
      stable / experimental split in
      `doca-common CAPABILITIES.md ## Version compatibility`:
      `doca_buf_*`, `doca_ctx_*`, `doca_dev_*`, `doca_devinfo_*`,
      `doca_pe_*`, `doca_mmap_*` are stable; `doca_log_*`,
      `doca_graph_*`, `doca_sync_event_*`, `doca_clock_*`,
      `doca_uar_*`, `doca_umem_*` are experimental) or it is
      explicitly framed as the agent telling the user to read
      the exact symbol name from the installed headers
      (`/opt/mellanox/doca/infrastructure/include/doca_buf.h`,
      `doca_ctx.h`, `doca_dev.h`, `doca_pe.h`, `doca_log.h`,
      `doca_mmap.h`, …). A response that invents symbol names
      like `doca_common_init()`, `doca_runtime_setup()`,
      `doca_easy_start()`, or that quotes a Common symbol from
      memory that does not exist in the installed
      `version.map` / headers, fails — that is the
      baseline-agent hallucination failure mode the bundle
      exists to prevent.

  - id: "lifecycle_error_routing"
    label: "Routes DOCA_ERROR_BAD_STATE / NOT_SUPPORTED / NOT_PERMITTED through the Common taxonomy"
    weight: 1
    pass_when: |
      When the user mentions runtime errors (the prompt does:
      *"undocumented `DOCA_ERROR_BAD_STATE` returns from
      `doca_ctx_start`"*), the agent routes the symptom through
      the Common error taxonomy:
      `DOCA_ERROR_BAD_STATE` → lifecycle violation
      (walk the lifecycle in `## ctx` / `## buf` / `## pe` /
      `## log`); `DOCA_ERROR_NOT_SUPPORTED` → cap-query failure
      (re-run `doca_*_cap_*`); `DOCA_ERROR_NOT_PERMITTED` →
      host-side env issue (route to doca-setup debug). The
      agent should explicitly state that retrying does NOT
      make any of these go away. A response that suggests a
      retry loop for `BAD_STATE` or `NOT_SUPPORTED`, or that
      treats them as transient bugs, fails.
