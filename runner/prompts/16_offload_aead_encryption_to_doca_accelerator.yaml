id: "16_offload_aead_encryption_to_doca_accelerator"
name: "Offload AEAD (authenticated encryption with associated data) to a DOCA hardware accelerator — class-shaped"
description: |
  Class-shaped AEAD-accelerator-offload prompt. The HEADLINE is the
  class ("offload AEAD — authenticated encryption with associated
  data — to a DOCA hardware accelerator, treat the auth tag as
  security-critical, and validate before bulk submission"); the
  worked example is DOCA AES-GCM (hardware-accelerated AES-256-GCM
  encryption of a 4 KiB plaintext with 64 B of AAD), because that is
  the newly-covered library in skills/libs/doca-aes-gcm.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  offload ANY DOCA-accelerated operation (SHA, AES-GCM, Compress,
  DMA, …), not just AES-GCM. The bundle proves this by asking the
  agent to walk: env-side preconditions, the cap-query rule for both
  task-type presence AND key-size support, the DOCA Core lifecycle,
  the source/destination mmap permission pair, the AEAD-output
  contract (ciphertext + auth tag on encrypt; tag-verified plaintext
  on decrypt), the validate-against-known-vector smoke before bulk,
  and the security-critical handling of tag-verification failure on
  decrypt. The same SHAPE applies to every DOCA accelerator library;
  the per-library details differ. AES-GCM specifically adds KEY
  HANDLING discipline that SHA / Compress / DMA do not have.

  A baseline agent without skills typically: invents a doca_aes_gcm_*
  API surface from generic OpenSSL EVP knowledge, hardcodes a tag
  length or key length from memory instead of querying
  doca_aes_gcm_cap_is_key_size_supported, recommends doca-aes-gcm
  for a tiny single-message encryption where CPU + AES-NI is faster,
  describes AES-GCM as if it were AES-CTR (ignoring the auth tag),
  treats a decrypt tag-verification failure as a recoverable error
  (silently retrying or consuming the poisoned plaintext), and skips
  the "encrypt + decrypt a published test vector first" smoke before
  bulk input.

prompt: |
  I have a host with a BlueField-3 DPU and DOCA installed. I want to
  AES-256-GCM-encrypt a 4 KiB plaintext with 64 bytes of AAD
  (additional authenticated data — think a protocol header I want
  bound to the ciphertext) using DOCA AES-GCM (the hardware
  accelerator), and I want to do it correctly the first time.

  Walk me through the setup: what I should check on the host BEFORE
  writing any code, which capability queries I have to run against
  the active doca_devinfo before assuming AES-256-GCM is supported
  AND before assuming the device exposes the encrypt task at all,
  the lifecycle order I have to follow to bring the AES-GCM context
  up, the source / destination mmap permission pair I have to set,
  what the AEAD output actually looks like (ciphertext + auth tag —
  NOT just ciphertext), what I should smoke-test FIRST to prove the
  ciphertext and tag are correct before I encrypt the real
  plaintext, and what I have to do on the DECRYPT side if the auth
  tag does not verify (this is a security-critical case — I want to
  make sure I'm not consuming poisoned plaintext).

  After that, briefly tell me which parts of your answer would
  change for a DIFFERENT DOCA accelerator library (e.g. DOCA SHA for
  hardware-accelerated hashing, DOCA Compress for hardware-accelerated
  compression, DOCA DMA for host ↔ DPU memory copy), and which parts
  are the same. In particular, call out that AES-GCM has KEY
  HANDLING concerns the other accelerator libraries don't have.

context:
  audience: "intermediate"
  intent: "offload_aead_encryption"
  prior_knowledge: "knows what a DPU is, has a BlueField-3 plus host, knows what AES-GCM is conceptually (AEAD — confidentiality + integrity in one operation) but not the DOCA AES-GCM API"
  baseline_artifact: "doca-aes-gcm"
  changed_skill_in_pr: "libs/doca-aes-gcm"
  expected_skill_co_load:
    - "doca-aes-gcm"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "env_preconditions_first"
    label: "Verifies DOCA install + devinfo enumerable BEFORE writing any code"
    weight: 1
    pass_when: |
      The agent says the FIRST step is to confirm the env-side
      preconditions: that DOCA is installed (e.g.
      `pkg-config --modversion doca-aes-gcm` resolves), that the
      doca-aes-gcm.pc plus doca-common.pc plus doca_caps --version
      all agree (four-way match via doca-version), and that the
      target device is enumerable as a doca_devinfo (e.g.
      `doca_caps --list-devs`). A response that jumps to
      doca_aes_gcm_* calls without naming these env-side checks
      first fails.

  - id: "capability_query_rule_task_and_key_size"
    label: "Calls out doca_aes_gcm_cap_* for BOTH task presence AND key-size support"
    weight: 2
    pass_when: |
      The agent says the user MUST call BOTH
      doca_aes_gcm_cap_task_encrypt_is_supported(devinfo) (to
      confirm the device exposes the encrypt task at all) AND
      doca_aes_gcm_cap_is_key_size_supported(devinfo, 256) (to
      confirm AES-256-GCM is in the device's accelerator), and
      SHOULD call
      doca_aes_gcm_cap_task_encrypt_get_max_buf_size(devinfo) to
      confirm the 4 KiB plaintext fits in a single submission. A
      response that quotes "AES-256-GCM is supported" or a key
      length from memory without naming the cap query, or that
      checks key-size support but forgets to check task-type
      support (or vice versa), fails.

  - id: "lifecycle_order_correct"
    label: "Walks the DOCA Core context lifecycle in the right order"
    weight: 2
    pass_when: |
      The agent names the lifecycle order create → configure
      (doca_aes_gcm_task_encrypt_set_conf + set source / destination
      mmap permissions) → start → submit task → progress PE → stop
      → destroy, and explicitly states that
      doca_aes_gcm_task_encrypt_set_conf MUST happen before
      doca_ctx_start(). A response that jumps to task submission
      without naming the lifecycle, or that puts task config after
      start, fails.

  - id: "mmap_permission_pair_correct"
    label: "States the source / destination mmap permission pair correctly"
    weight: 2
    pass_when: |
      The agent correctly states that the source (plaintext for
      encrypt) mmap needs DOCA_ACCESS_FLAG_LOCAL_READ_ONLY at
      minimum and the destination (ciphertext + tag for encrypt)
      mmap needs DOCA_ACCESS_FLAG_LOCAL_READ_WRITE, and that BOTH
      must be set via doca_mmap_set_permissions before the first
      task is submitted. A response that conflates the two buffers'
      permissions, makes the source read-write "for simplicity"
      without flagging it as over-broad, or omits the destination
      read-write requirement, fails.

  - id: "aead_semantics_surfaced"
    label: "Surfaces the AEAD output contract — ciphertext + auth tag, not just ciphertext"
    weight: 2
    pass_when: |
      The agent explicitly tells the user that AES-GCM encrypt
      produces TWO outputs — the ciphertext AND an authentication
      tag — and that the user's downstream code must transmit /
      store BOTH (the receiver cannot verify integrity without the
      tag). The agent also surfaces that the AAD passed at encrypt
      is authenticated (covered by the tag) but NOT encrypted, and
      that the same AAD bytes must be passed back at decrypt for
      verification to succeed. A response that describes AES-GCM
      as if it were AES-CTR (single ciphertext output, no tag) or
      that mentions the tag only as an afterthought without
      explaining its role, fails. This is the load-bearing
      AEAD-discipline criterion this prompt exists to enforce.

  - id: "known_vector_smoke_before_bulk"
    label: "Recommends a published AES-GCM test-vector smoke before bulk input"
    weight: 2
    pass_when: |
      The agent recommends encrypting (and, ideally, decrypting) a
      small published AES-GCM test vector (e.g. a NIST GCMVS
      vector, an RFC 5288 AES-GCM example, or any cited
      published-vector source) with a known key + IV + AAD and
      comparing the accelerator's ciphertext + tag byte-for-byte
      against the published expected output, BEFORE encrypting the
      user's 4 KiB plaintext. A response that jumps straight to
      bulk encryption without naming a known-vector smoke, or that
      hand-waves "test it with some data first" without specifying
      a published vector, fails.

  - id: "tag_verification_failure_security_critical"
    label: "Treats decrypt tag-verification failure as security-critical (poisoned output)"
    weight: 2
    pass_when: |
      The agent explicitly tells the user that on the DECRYPT side,
      if the auth tag does NOT verify (DOCA reports this on the
      decrypt task completion — e.g. as DOCA_ERROR_IO_FAILED or an
      equivalent verification-failure status), the plaintext output
      of that task is POISONED and must NOT be consumed. The agent
      MUST say that the right response is to treat the input
      ciphertext as untrusted (it was tampered with or corrupted),
      log a security event, and NOT silently retry the same
      ciphertext (a retry will fail the same way and hides the
      security signal). A response that treats a tag-verification
      failure as a recoverable error, recommends a retry loop on
      it, or suggests consuming the plaintext "anyway to see what
      happened", fails. This is the second load-bearing
      AEAD-discipline criterion.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_aes_gcm_* API symbols or non-GCM AES modes"
    weight: 1
    pass_when: |
      Every doca_aes_gcm_* (or doca_ctx_*, doca_pe_*, doca_mmap_*)
      symbol the agent mentions is one that actually exists in the
      public DOCA AES-GCM surface (or it is explicitly framed as
      pseudocode / sketch), and the agent does NOT invent
      non-GCM-mode entry points (no doca_aes_cbc_*, doca_aes_ctr_*,
      doca_aes_xts_*) — for those modes the answer is CPU +
      OpenSSL, not this library. A response that invents API names
      like doca_aes_gcm_encrypt_easy(), doca_aes_gcm_quick_init(),
      or that names a non-GCM AES mode as if doca-aes-gcm covered
      it, fails — that is the baseline-agent hallucination failure
      mode the bundle exists to prevent.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from AES-GCM to other DOCA accelerator libraries; calls out KEY HANDLING as AES-GCM-specific"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the prompt:
      it names at least ONE OTHER DOCA accelerator library (DOCA
      SHA, DOCA Compress, DOCA DMA, …) and identifies which parts
      of the workflow stay the same (DOCA Core lifecycle order,
      capability-query rule against doca_devinfo, source /
      destination mmap permission discipline, smoke-with-a-known-
      vector before bulk submission) versus which change (the task
      type name per library, the capability-query function name per
      library, the output shape per library — SHA has a digest, not
      a ciphertext+tag pair; Compress has a compressed/decompressed
      buffer; DMA has just a destination copy — and the
      algorithm/key-size-vs-no-enum distinction per library). The
      agent MUST specifically call out that AES-GCM has KEY HANDLING
      concerns (do not log keys, do not commit keys, treat the key
      buffer as sensitive memory) that SHA / Compress / DMA do not
      have, because none of those libraries take a user-supplied
      secret key. A response that walks only AES-GCM and is silent
      on generalization, or that generalizes but misses the
      key-handling distinction, fails this criterion.
