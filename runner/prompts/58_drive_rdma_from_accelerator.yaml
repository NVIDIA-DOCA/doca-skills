id: "58_drive_rdma_from_accelerator"
name: "Initiate one-sided RDMA traffic from an accelerator-resident DOCA application — class-shaped"
description: |
  Class-shaped accelerator-initiated RDMA prompt. The HEADLINE
  is the class ("initiate one-sided RDMA traffic from an
  accelerator-resident DOCA application against a remote
  responder"); the worked example is a DPA kernel posting 1 MB
  RDMA writes from BlueField against a host's pinned memory,
  because doca-rdmi is the focused initiator-side surface for
  that pattern.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how
  to set up ANY accelerator-initiated one-sided RDMA flow that
  doca-rdmi surfaces (DPA-resident sender, DPA-resident bulk
  writer, DPA-resident polling reader, future GPU-resident
  initiator via the sister doca-gpi surface — each one is one
  instance of the same class). The bundle proves this by
  asking the agent to walk: surface selection vs doca-rdma
  FIRST (gate, not error path), the EXPERIMENTAL-tag rule on
  the entire doca-rdmi symbol set, the connection / poster
  object pair plus their lifecycles, the DPA datapath set +
  completion-attach order, the DPA-side handle handoff to
  doca-dpa, the host-side receive-ack loop, and a single-
  completion smoke before going wide. The same SHAPE applies
  to every accelerator-initiated one-sided RDMA flow; the
  per-flow details differ.

  A baseline agent without skills typically: conflates
  doca-rdmi with doca-rdma and recommends doca-rdma symbols
  (`doca_rdma_task_write_*`) for an explicitly accelerator-
  initiated case; treats the EXPERIMENTAL tag as a non-issue
  and recommends the symbol set with no caveat; invents
  doca-rdmi symbol names from generic RDMA knowledge;
  recommends `doca_rdmi_*_get_dpa_handle` BEFORE
  `doca_ctx_start()`; recommends attaching both
  `doca_dpa_completion` and `doca_verbs_cq` to the same
  context; skips the DPA-side launch as a separate concern
  owned by doca-dpa and silently authors a DPA kernel from
  documentation prose; ignores the host-side
  `doca_rdmi_connection_recv_ack` loop and pretends the
  receive window self-drains.

prompt: |
  I have a host with a BlueField-3 DPU and DOCA installed.
  I want my DPU-resident DOCA application — a DPA kernel —
  to post 1 MB RDMA writes against a remote responder's
  pinned host memory, at line rate, with NO host CPU on the
  data path. Eventually this is the data plane of a
  storage-side accelerator, but right now I just want one
  RDMA write to land cleanly on the responder so I know the
  initiator is alive.

  Walk me through it. Specifically:

  1. Which DOCA library should I be using? I know doca-rdma
     exists. I've heard there's a doca-rdmi too. I do NOT
     want you to silently pick for me — tell me which one
     fits an accelerator-initiated one-sided flow and which
     one fits everything else, and why.

  2. Whatever you recommend, tell me HONESTLY about its API
     stability: is the symbol set stable, EXPERIMENTAL, or
     somewhere in between? I do not want to ship code that
     stops compiling next DOCA release.

  3. Walk me through the object model on the host side
     (what objects I create, what I attach to them, when I
     start the context) and the DPA-side handoff (what
     handle I hand to the DPA kernel and when it is valid).

  4. Where does doca-dpa fit in? Where does doca-verbs fit
     in? I want to understand the layering before I start
     wiring things together.

  5. What single-completion smoke would you recommend
     before I push to volume? I do not want to drive 1 MB
     writes at full rate as my first integration test.

  6. After that, briefly tell me which parts of your answer
     would carry over to a GPU-resident initiator instead
     of a DPA-resident one (i.e. how would the picture
     change if the initiator kernel were on the GPU, not
     on the DPA?), and identify which parts stay the same
     vs which change.

context:
  audience: "intermediate"
  intent: "configure_library_context"
  prior_knowledge: "knows what a DPU, a representor, and RDMA are; has a BlueField-3 plus host with DOCA installed; has done at least one DOCA build before but has never used doca-rdmi or the DOCA DPA programming model specifically; does not yet know whether doca-rdmi vs doca-rdma is the right surface for this case"
  baseline_artifact: "doca-rdmi"
  changed_skill_in_pr: "libs/doca-rdmi"
  expected_skill_co_load:
    - "doca-rdmi"
    - "doca-rdma"
    - "doca-dpa"
    - "doca-gpi"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-debug"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-hardware-safety"

criteria:
  - id: "doca_rdmi_vs_doca_rdma_selection_called_out"
    label: "Selects doca-rdmi over doca-rdma for the accelerator-initiated one-sided case, with a stated rule"
    weight: 3
    pass_when: |
      The agent's FIRST move is to pick between doca-rdmi
      and doca-rdma — explicitly, with a stated rule. The
      correct pick for this prompt is doca-rdmi, BECAUSE
      the initiator is on the accelerator side (a DPA
      kernel) and the operation is one-sided. The agent
      must also surface that doca-rdma is the right answer
      for host-CPU-initiated and / or two-sided flows. A
      response that recommends doca-rdma for the DPA
      initiator without naming the selection rule, or that
      recommends doca-rdmi without naming the rule that
      doca-rdma is preferred elsewhere, fails. A response
      that silently picks one library and never compares
      the two also fails.

  - id: "experimental_tag_surfaced_honestly"
    label: "Surfaces that every doca_rdmi_* symbol is currently EXPERIMENTAL"
    weight: 3
    pass_when: |
      The agent explicitly surfaces that every public
      doca_rdmi_* symbol is currently tagged EXPERIMENTAL
      in the installed DOCA, AND that the API can change
      shape between releases, AND that the runtime
      authority is the installed headers, not the public
      docs. A response that recommends doca_rdmi_* symbols
      without any stability caveat fails. A response that
      claims doca-rdmi is GA / stable / production-stable
      fails. A response that says "experimental" but
      doesn't tell the user what that implies for
      versioning their own code fails.

  - id: "object_model_connection_and_poster"
    label: "Names the connection + poster object pair and the DOCA Core context lifecycle on each"
    weight: 2
    pass_when: |
      The agent names the two host-side objects —
      doca_rdmi_connection (the connection-state object,
      created on a doca_verbs_context and a doca_dev_rep)
      and doca_rdmi_poster (the poster-side object that
      issues RDMA work requests) — and walks the DOCA Core
      context lifecycle (create → configure → start → use
      → stop → destroy) on each, calling out that the
      configure step (init_receive on the connection;
      *_attach on either) MUST land before doca_ctx_start().
      A response that names only one of the two objects
      where both are needed (the prompt's "post writes
      AND receive responses" wording requires both) fails.
      A response that conflates the two objects into one
      "rdmi context" fails. A response that walks
      lifecycle in the wrong order fails.

  - id: "dpa_datapath_set_and_completion_attach_order"
    label: "Calls out doca_ctx_set_datapath_on_dpa + dpa_completion_attach BEFORE doca_ctx_start"
    weight: 2
    pass_when: |
      The agent explicitly states that, for an
      accelerator-resident initiator, the application must
      (a) call doca_ctx_set_datapath_on_dpa() on the
      connection / poster context BEFORE doca_ctx_start(),
      AND (b) call doca_rdmi_*_dpa_completion_attach()
      with a doca_dpa_completion BEFORE doca_ctx_start(),
      AND (c) call doca_rdmi_*_get_dpa_handle() AFTER
      doca_ctx_start() (not before). A response that
      recommends `_get_dpa_handle` before `_ctx_start`
      fails (this is a DOCA_ERROR_BAD_STATE waiting to
      happen). A response that attaches a doca_verbs_cq
      for the host-side completion path while
      simultaneously claiming the DPA kernel polls
      completions fails — the completion source is
      single-attach.

  - id: "doca_dpa_and_doca_verbs_layering_named"
    label: "Names doca-dpa (DPA programming) and doca-verbs (low-level verbs) as separate skills doca-rdmi layers on"
    weight: 2
    pass_when: |
      The agent explicitly states that doca-rdmi is
      LAYERED on doca-verbs (the underlying QP / CQ / PD
      primitives) AND that the DPA-side execution model
      is owned by doca-dpa — three separate concerns with
      three separate skills. The agent must route the
      user to doca-dpa for the DPA-side launch /
      programming model rather than authoring a DPA
      kernel from documentation prose. A response that
      conflates RDMI with verbs, OR that authors DPA
      kernel code inline, OR that pretends RDMI handles
      the DPA programming model itself, fails.

  - id: "host_side_recv_ack_loop_named"
    label: "Names the host-side doca_rdmi_connection_recv_ack loop as load-bearing"
    weight: 1
    pass_when: |
      The agent explicitly states that the host side must
      drive doca_rdmi_connection_recv_ack(conn, N) to
      release the N receive work requests the DPA kernel
      consumed, and that under-acking causes the receive
      window to back up silently (no error return). A
      response that pretends the receive window
      self-drains, or that omits the host-side ack loop
      entirely, fails.

  - id: "single_completion_smoke_before_volume"
    label: "Recommends a single-completion smoke before driving full RDMA write rate"
    weight: 1
    pass_when: |
      The agent recommends a single-completion smoke
      (one RDMA write of any size, one completion event
      on the configured completion surface) as the first
      functional test, before any 1 MB writes at full
      rate. A response that jumps from doca_ctx_start()
      to "now drive full line rate" without an explicit
      single-completion smoke fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_rdmi_* API symbols or DPA-side handles"
    weight: 2
    pass_when: |
      Every doca_rdmi_* symbol the agent mentions is
      either in the verified public surface this skill
      documents (doca_rdmi_connection_create / destroy /
      as_ctx / init_receive / set_input / dpa_completion_attach
      / cq_attach / get_dpa_handle / get_qpn / get_app_rq_info
      / recv_ack / set_qp_create_out / set_qp_modify_out /
      set_qp_query_out; doca_rdmi_poster_create / destroy /
      as_ctx / set_input / dpa_completion_attach / cq_attach
      / get_dpa_handle / post) OR explicitly framed as
      pseudocode with the agent telling the user to confirm
      the symbol against the installed headers
      (doca_rdmi_connection.h, doca_rdmi_poster.h, and the
      device-side doca_rdmi_dev_*.h set). A response that
      invents symbols like doca_rdmi_write(),
      doca_rdmi_connect_easy(), or that quotes a function
      name from memory without naming the verification
      surface, fails — that is the baseline-agent
      hallucination failure mode the bundle exists to
      prevent.

  - id: "version_overlay_named"
    label: "Quotes pkg-config --modversion doca-rdmi AND the four-way match across doca-common / doca-verbs / doca-dpa / doca-rdmi"
    weight: 1
    pass_when: |
      The agent surfaces the version-discovery rule:
      `pkg-config --modversion doca-rdmi` is the build-
      time anchor; AND `doca-common`, `doca-verbs`,
      `doca-dpa`, and `doca-rdmi` must all report the
      same DOCA semver per the four-way match in
      doca-version. A response that quotes a DOCA version
      pin from memory, or that promises a feature without
      naming either the version anchor or the
      EXPERIMENTAL-tag re-check, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from DPA-resident initiator to GPU-resident initiator and identifies what stays the same vs changes"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of
      the prompt: it generalizes from the DPA-resident
      RDMA-write initiator to a GPU-resident initiator
      use case, and identifies which parts STAY THE SAME
      (the *concept* of an accelerator-initiated one-
      sided RDMA flow; the EXPERIMENTAL-tag versioning
      discipline; the layered separation between the
      higher-level RDMA library, the underlying verbs
      surface, and the accelerator programming model; the
      single-completion smoke before scale-up) versus
      which CHANGE (the library shifts from doca-rdmi to
      doca-gpi for the GPU-resident case; the accelerator
      programming skill shifts from doca-dpa to
      doca-gpunetio / CUDA; the completion-source surface
      shifts from doca_dpa_completion to the GPU-side
      channel handle returned by
      doca_gpi_channel_get_gpu_handle; the host-side
      receive-ack discipline is RDMI-specific and does
      not have a one-to-one analog in the GPI surface).
      A response that walks only the doca-rdmi case and
      is silent on generalization fails this criterion.
