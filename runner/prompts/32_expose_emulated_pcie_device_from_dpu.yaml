id: "32_expose_emulated_pcie_device_from_dpu"
name: "Expose a custom emulated PCIe device from the DPU to the host — class-shaped"
description: |
  Class-shaped prompt for exposing a CUSTOM emulated PCIe
  device from the BlueField DPU to the host, using the
  umbrella DOCA Device Emulation library on the DPU side
  (with one of its three sub-libraries — PCI Generic,
  virtio-net, virtio-fs — picked deliberately for the user's
  intent) so the host sees a real-looking PCIe device that
  binds its standard kernel driver. The HEADLINE is the
  class ("expose a custom emulated PCIe device from the DPU
  to the host"); the worked example is exposing a virtio-net
  emulated device from the BlueField so the host sees a
  virtio NIC backed by custom DPU-side code, because that is
  the newly-covered library in
  skills/libs/doca-devemu.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent the
  shape of *exposing a user-supplied custom PCIe device class
  from the DPU to the host through the umbrella Device
  Emulation library, picking the right sub-library first*.
  The bundle proves this by asking the agent to walk:
  sub-library selection FIRST (PCI Generic vs virtio-net vs
  virtio-fs — refuse to write any code before pinning one);
  env preconditions including the firmware-level emulation
  type enable (this is NOT a casual setting and is the
  precondition baseline agents most often miss); distinguish
  the LIBRARY from the packaged SERVICES (DOCA SNAP Service
  / DOCA Virtio-net Service) that build on top of it; the
  per-sub-library capability discovery against the active
  doca_devinfo; the DOCA Core lifecycle for the per-
  sub-library context; a small smoke (one emulated device
  appears in host `lspci`, host's standard kernel driver
  binds, basic operation works) before scaling. The same
  umbrella SHAPE generalizes to other sub-libraries (e.g.
  "I asked about virtio-net but now I need PCI Generic too")
  — what stays the same (umbrella lifecycle, firmware-slot
  dep, host driver dep, cap-query rule, smoke-before-scale)
  versus what changes (per-sub-library API surface, host
  driver class, virtio-negotiation vs raw-PCIe semantics).

  A baseline agent without skills typically: starts writing
  code without pinning which sub-library; conflates the
  `doca-devemu` library with the packaged DOCA SNAP
  Service or DOCA Virtio-net Service and recommends the
  wrong artifact; invents `doca_devemu_*` API symbols beyond
  the public surface; skips the firmware-level emulation-type
  slot check entirely (the baseline-agent failure mode that
  turns into a confusing `DOCA_ERROR_NOT_PERMITTED` later);
  diagnoses that error as a DPU-OS permission problem
  instead of a firmware-side fix; assumes one set of
  capability values transfers between sub-libraries; jumps
  straight to a multi-device or sophisticated-backend
  deployment without a single-emulated-device smoke; and
  never generalizes from the picked sub-library to the
  umbrella-shape rules that govern the other sub-libraries.

prompt: |
  I have a host with a BlueField-3 DPU plugged in over PCIe,
  DOCA already installed on both the host and the DPU, and
  the standard upstream virtio drivers shipping in my host
  kernel. I want to use DOCA to expose a CUSTOM emulated
  PCIe device from the DPU to the host — specifically, a
  virtio-net network device backed by my own DPU-side
  packet-processing code, so the host sees a virtio NIC and
  binds its upstream virtio_net driver to it. I am NOT
  trying to use the packaged DOCA Virtio-net Service or the
  DOCA SNAP Service; I want the underlying library so I can
  write the backend myself.

  Walk me through the setup: which DOCA library on the DPU
  side I use to drive this (and how it differs from the
  packaged services I might confuse it with), which
  sub-library specifically inside that umbrella I need for
  the virtio-net case and how that decision would change if
  my intent were different, what I have to check BEFORE
  writing any DPU code (env preconditions on the DPU side
  AND on the BlueField side, including any firmware-level
  enable I need to flip before the library will let me
  create an emulated device of this type, plus the host-side
  kernel driver dep), the per-sub-library capability queries
  I have to run against the active doca_devinfo, the DOCA
  Core lifecycle I have to follow when creating the per-
  sub-library context and wiring its doorbell / DMA
  primitives, what I should smoke-test FIRST from the host
  side before deploying a sophisticated backend or scaling
  to many emulated devices, and how I'll know the deployed
  emulated device is actually visible to the host kernel
  driver and the basic operation pattern is working end-to-
  end (vs. the device appearing in `lspci` but the kernel
  driver failing to bind, or binding but the backend not
  reacting).

  After that, briefly tell me which parts of your answer
  would change if instead of a virtio-net emulated device I
  later wanted a PCI Generic emulated device (raw PCIe
  surface, no virtio class), and which parts of the
  workflow stay the same.

context:
  audience: "intermediate"
  intent: "expose_emulated_pcie_device_from_dpu"
  prior_knowledge: "knows C / C++ at the application level, has DOCA installed on both host and DPU, knows what a BlueField is, has the upstream virtio kernel drivers in the host kernel, has not used the DOCA Device Emulation library before, has not built an emulated PCIe device before but understands that PCIe device emulation is privileged and firmware-gated"
  baseline_artifact: "doca-devemu"
  changed_skill_in_pr: "libs/doca-devemu"
  expected_skill_co_load:
    - "doca-devemu"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "asks_sub_library_first"
    label: "Asks which sub-library (PCI Generic / virtio-net / virtio-fs) the user needs as the FIRST move"
    weight: 2
    pass_when: |
      The agent's FIRST conceptual move on the API side is
      to surface that DOCA Device Emulation is an UMBRELLA
      library covering three public sub-libraries — PCI
      Generic (raw PCIe device emulation), virtio-net
      (emulated virtio NIC), virtio-fs (emulated virtio
      filesystem) — and that the user must pin the
      sub-library before anything else (the right
      sub-library determines the API surface, the
      `pkg-config` module, the capability-query family, the
      sample-tree subdirectory, and the firmware-level
      enablement axis). The agent then explicitly identifies
      the user's stated virtio-net intent as the virtio-net
      sub-library. A response that treats Device Emulation
      as a single uniform library, or that begins writing
      code without naming the sub-library, fails this
      criterion.

  - id: "refuses_to_code_before_sub_library_pinned"
    label: "Does NOT start writing API code before the sub-library is pinned"
    weight: 2
    pass_when: |
      The agent does not draft any `doca_devemu_*` calls,
      header includes, `pkg-config` module names, or build
      manifest content for a sub-library that has not been
      pinned for the user's intent. If the agent demonstrates
      code or commands, those are for the virtio-net
      sub-library the user's intent pinned (or are clearly
      framed as illustrative pseudocode pending sub-library
      confirmation). A response that drafts code against an
      ambiguous "Device Emulation" surface, that quotes
      symbols or `pkg-config` modules without naming which
      sub-library they belong to, or that walks through the
      lifecycle before pinning the sub-library, fails this
      criterion.

  - id: "firmware_slot_named_as_precondition"
    label: "Names the BlueField firmware-level emulation-type slot as a precondition (not a casual setting)"
    weight: 2
    pass_when: |
      The agent surfaces the BlueField firmware-level enable
      for the chosen sub-library's emulation type as a
      precondition the user MUST verify BEFORE writing any
      DPU code, AND frames it as a firmware-side flip — NOT
      a host-OS or DPU-OS permission setting and NOT a
      host-side or DPU-side library call. The agent
      explicitly notes that this is not a casual setting and
      typically requires a BlueField reset after the slot is
      flipped before the new state takes effect, and that a
      disabled slot will look like a permission bug
      (`DOCA_ERROR_NOT_PERMITTED`) at the
      `doca_devemu_<sub>_*` API surface. A response that
      omits the firmware-side slot check entirely fails. A
      response that diagnoses an eventual NOT_PERMITTED as a
      DPU-OS group-membership / sudo problem first, instead
      of the firmware-side enable first, fails.

  - id: "library_vs_packaged_services_distinguished"
    label: "Distinguishes the library from the packaged services (DOCA Virtio-net Service / DOCA SNAP Service) that build on top"
    weight: 2
    pass_when: |
      The agent explicitly distinguishes the
      `doca-devemu` library (the building block
      the user writes their own backend against) from the
      packaged DOCA services that are built ON TOP of it —
      at minimum the DOCA Virtio-net Service (packaged
      virtio-net daemon) and the DOCA SNAP Service
      (packaged NVMe / virtio-blk storage daemon). The
      agent identifies the library as the right artifact
      for the user's stated intent of writing their own
      backend, AND identifies the packaged services as
      different artifacts the user would adopt if they
      wanted a packaged solution without writing a backend.
      A response that conflates the library with either
      service, that recommends a packaged service as the
      way to "write a custom backend", or that fails to
      surface that the services exist as alternative
      packaged options, fails this criterion.

  - id: "cap_query_against_devinfo_per_sub_library"
    label: "Calls the per-sub-library `doca_devemu_<sub>_cap_*` query against the active doca_devinfo"
    weight: 2
    pass_when: |
      The agent says the user MUST run the
      `doca_devemu_<sub>_cap_*` query family for the pinned
      sub-library (for the worked virtio-net case, the
      `doca_devemu_virtio_cap_*` family narrowed to the
      virtio-net surface) against the active doca_devinfo
      for the BlueField device, BEFORE assuming a feature
      bit, queue size, or device characteristic is
      available. The agent surfaces that this is a
      per-sub-library family, not a shared umbrella cap-
      query — values do not transfer between sub-libraries.
      A response that quotes capability numbers from memory,
      that omits the cap-query against doca_devinfo entirely,
      or that asserts one cap-query family covers all
      sub-libraries, fails this criterion.

  - id: "core_lifecycle_walked"
    label: "Walks the DOCA Core lifecycle for the per-sub-library Device Emulation context"
    weight: 2
    pass_when: |
      The agent walks the lifecycle in order: create the
      per-sub-library Core context (for the worked
      virtio-net case, the virtio-net emulated-device
      context) against the chosen `doca_dev` that maps to a
      BlueField with the matching emulation type enabled in
      firmware; configure the doorbell / DMA primitives
      that bridge host kernel driver activity to DPU-side
      backend code; start the context via `doca_ctx_start`
      (the moment the emulated PCIe device becomes visible
      to the host); drive the DPU-side `doca_pe_progress`
      loop so doorbell reactions and DMA completions flow;
      tear down in REVERSE order (detach the host kernel
      driver / unload the host kernel module → stop the
      per-sub-library context → destroy emulated devices →
      destroy the per-sub-library context → close the
      `doca_dev`). A response that omits the doorbell / DMA
      wiring step, that treats `doca_ctx_start` as
      sufficient by itself without progressing the PE, or
      that tears down in forward order, fails this
      criterion.

  - id: "smoke_before_scale"
    label: "Recommends a single-emulated-device smoke (host enumerates the device, kernel driver binds, basic op works) BEFORE scaling"
    weight: 1
    pass_when: |
      The agent recommends standing up ONE emulated device
      in the chosen sub-library as the FIRST functional test
      and confirming three signals end-to-end: the host's
      `lspci` shows the emulated device after
      `doca_ctx_start()`; the matching standard kernel
      driver on the host binds cleanly to it (no
      feature-negotiation error in host `dmesg`); a basic
      operation appropriate to the sub-library works (e.g.
      a single packet through the virtio NIC for the worked
      virtio-net case). The agent surfaces that a smoke
      failure is the cheapest place to identify env-side /
      firmware-side / sub-library-selection / host-kernel-
      driver gaps, BEFORE deploying a sophisticated backend
      or scaling to many emulated devices. A response that
      jumps straight to a sophisticated backend, or that
      fails to name the single-device smoke as the first
      functional test, fails this criterion.

  - id: "no_hallucinated_devemu_api"
    label: "Does not invent `doca_devemu_*` API symbols beyond the public surface"
    weight: 1
    pass_when: |
      Every `doca_devemu_*` / `doca_ctx_*` / `doca_pe_*` /
      `doca_dev*` symbol the agent commits to is one that
      actually exists in the public DOCA Device Emulation +
      DOCA Core surface (e.g. the `doca_devemu_pci_cap_*`,
      `doca_devemu_virtio_cap_*`, `doca_devemu_virtio_fs_cap_*`
      families against `doca_devinfo`; `doca_ctx_start`,
      `doca_ctx_stop`; `doca_pe_progress`; `doca_dev`,
      `doca_devinfo`), OR it is explicitly framed as
      pseudocode / sketch / function-name placeholder. A
      response that invents API names like
      `doca_devemu_easy_init()`,
      `doca_devemu_virtio_net_quick_start()`, or
      `doca_devemu_create_pcie_device()` without framing
      them as illustrative placeholders fails — that is the
      baseline-agent hallucination failure mode the bundle
      exists to prevent. A response that frames the
      configure → wire doorbell / DMA → start → progress →
      stop → destroy surface in prose (without committing
      to specific invented function names) passes this
      criterion.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from virtio-net to another sub-library (e.g. PCI Generic) — same umbrella shape, different per-sub-library specifics"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names PCI Generic (or virtio-fs) as the
      other sub-library a user might switch to, AND
      identifies which parts of the workflow STAY THE SAME
      (the umbrella lifecycle on the DPU side; the
      firmware-level emulation-type slot dependency — the
      BlueField firmware must enable whichever sub-library
      the user picks; the host-side kernel driver
      dependency — the host kernel must ship a matching
      driver for whichever device class the picked
      sub-library exposes; the per-sub-library capability-
      query rule against the active doca_devinfo; the
      smoke-before-scale rule; the library-vs-packaged-
      service distinction) versus which parts CHANGE (the
      sub-library API surface — `doca_devemu_pci_*` vs
      `doca_devemu_virtio_*` vs `doca_devemu_virtio_fs_*`;
      the `pkg-config` module name per sub-library; the
      sample-tree subdirectory the user starts from; the
      host driver class the host binds — generic PCIe
      driver model for PCI Generic vs upstream virtio
      drivers for virtio-net / virtio-fs; the semantics of
      what host-driver-to-DPU coordination looks like —
      virtio feature negotiation + virtio queues for the
      virtio sub-libraries vs raw PCIe register / BAR /
      interrupt contract for PCI Generic). A response that
      walks only virtio-net and is silent on the
      generalization fails. A response that names a
      non-Device-Emulation library (e.g. doca-flow,
      doca-comch, doca-dma) as the second example, or that
      claims all sub-libraries share a single API surface
      and merges them, fails this criterion.
