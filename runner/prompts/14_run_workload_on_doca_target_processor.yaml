id: "14_run_workload_on_doca_target_processor"
name: "Run a workload on a DOCA target processor (DPU's DPA / GPU) — class-shaped"
description: |
  Class-shaped prompt for running a user workload on a DOCA
  "target processor" — i.e. a non-CPU programmable processor
  DOCA exposes through a paired host-side library + a separate
  in-target toolchain. The HEADLINE is the class ("run a
  workload on a DOCA target processor — DPU's DPA, or GPU
  through GPUNetIO — from a host program"); the worked example
  is DOCA DPA (host-side `doca-dpa` library loads a DPA kernel
  compiled by DPACC onto the BlueField DPA processor and
  launches it), because that is the newly-covered library in
  skills/libs/doca-dpa.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  run ANY workload on a DOCA target processor. The bundle proves
  this by asking the agent to walk: env preconditions FIRST,
  the two-side-program model (host-side control program + the
  in-target kernel are TWO distinct translation units coupled by
  a launch-argument shape), the paired in-target toolchain
  (DPACC for DPA, the CUDA toolkit for GPUNetIO), dual-axis
  capability discovery (DOCA cap-query against doca_devinfo PLUS
  the target processor actually being present and exposed on
  this hardware generation), the DOCA Core lifecycle, the
  asynchronous launch + dedicated completion mechanism, and a
  single-kernel-launch smoke BEFORE scaling. The same SHAPE
  applies to every DOCA-into-target-processor integration; the
  per-target details differ (target processor, kernel-language
  toolchain, allocation primitives, completion mechanism,
  driver-layer dependency).

  A baseline agent without skills typically: conflates the
  host-side DOCA DPA library with the DPA-side libraries
  (`doca-dpa-comms`, `doca-dpa-verbs`) that run INSIDE the DPA
  kernel; invents doca_dpa_* API symbols beyond the public
  surface; forgets the DPACC compiler is a required build
  component for the DPA-side translation unit; skips the
  capability query against doca_devinfo and assumes every
  BlueField has a DPA processor exposed; treats the kernel
  launch as synchronous from the host's point of view; jumps
  straight to a high-throughput streaming design without a
  single-kernel-launch smoke; and never generalizes the answer
  from DPA to GPUNetIO as the sibling DOCA-into-target-processor
  library.

prompt: |
  I have a host with a BlueField DPU plugged in over PCIe, DOCA
  already installed on the host, and the DPACC compiler
  installed alongside DOCA. I want to run a small piece of
  control-plane compute on the DPA processor inside the
  BlueField — a kernel that runs a short counter loop on the
  DPA and reports the final count back to the host when it
  finishes. Down the road I might scale this to a streaming
  workload with many launches per second, but a single launch
  reporting one completion is the priority right now.

  Walk me through the setup: which DOCA library on the HOST
  side I use to drive the DPA, how it relates to the in-DPA
  code I have to write separately (and what compiles that
  in-DPA code), what I have to check BEFORE writing any host
  or DPA code (env preconditions on the host side AND on the
  BlueField side, including whether this BlueField actually
  exposes its DPA processor to the host), the capability
  queries I have to run against the active doca_devinfo, the
  DOCA Core lifecycle I have to follow when creating the
  per-DPA-instance context and loading my compiled DPA
  application image, how I get arguments from the host into
  the DPA kernel and how the host knows when the kernel is
  done, what I should smoke-test FIRST from the host side
  before scaling to a streaming launch loop, and how I would
  terminate the kernel cleanly so my host program does not
  block on shutdown.

  After that, briefly tell me which parts of your answer would
  change if instead of the DPA I wanted to run my workload on
  a DIFFERENT DOCA target processor — for example a CUDA
  kernel on an NVIDIA GPU through DOCA GPUNetIO — and which
  parts of the workflow stay the same.

context:
  audience: "intermediate"
  intent: "run_workload_on_doca_target_processor"
  prior_knowledge: "knows C / C++ at the application level, has DOCA installed and DPACC installed, knows what a BlueField is, has not used the DOCA DPA host-side library before, has not written a DPA-side kernel before but knows it's a separate translation unit"
  baseline_artifact: "doca-dpa"
  changed_skill_in_pr: "libs/doca-dpa"
  expected_skill_co_load:
    - "doca-dpa"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "two_side_program_model_first"
    label: "Walks the two-side-program model FIRST (host-side control + DPA-side kernel are TWO programs)"
    weight: 2
    pass_when: |
      The agent's FIRST conceptual move is to surface that a
      DPA application is TWO translation units: a host-side
      program (uses doca-dpa to control the DPA) AND a
      DPA-side program (the kernel function bodies, a
      separate translation unit compiled into a binary the
      host executable embeds as the DPA application image).
      The agent states explicitly that these are two distinct
      programs coupled by the kernel function signature and
      the launch-argument shape, and that an agent or user
      who treats the application as one program will get the
      API choices wrong. A response that walks only the host
      side and never names the DPA-side translation unit as a
      separate program fails this criterion. A response that
      proposes the host code "call the DPA kernel directly as
      a function" fails.

  - id: "dpacc_named_as_required_build_component"
    label: "Names the DPACC compiler as the required build component for the DPA-side translation unit"
    weight: 2
    pass_when: |
      The agent explicitly states that the DPA-side translation
      unit is compiled by the DPACC compiler (dpacc), which
      ships alongside DOCA, NOT by the host's system C / C++
      compiler. The agent surfaces dpacc as a load-bearing
      build component that produces the binary the host
      executable embeds and the host-side doca-dpa runtime
      loads. A response that does not name DPACC at all, or
      that names "a C compiler" / "the system compiler" as
      sufficient for the DPA side, fails this criterion. A
      response that places DPACC in the host-side link line
      instead of as the DPA-side build step fails.

  - id: "no_doca_dpa_companion_library_conflation"
    label: "Does NOT conflate doca-dpa (host-side) with doca-dpa-comms / doca-dpa-verbs (DPA-side)"
    weight: 2
    pass_when: |
      The agent recommends doca-dpa as the host-side control
      library (the one the host program links against and
      calls). If the agent mentions doca-dpa-comms or
      doca-dpa-verbs at all, it correctly identifies them as
      DIFFERENT libraries that run INSIDE the DPA kernel (i.e.
      DPA-side libraries called from the DPA-side translation
      unit, not from the host), and does NOT add them to the
      host-side link line. A response that adds doca-dpa-comms
      or doca-dpa-verbs to the host pkg-config / link line, or
      that uses them interchangeably with doca-dpa as if all
      three are the same library, or that recommends them as
      the host-side entry point, fails this criterion.

  - id: "cap_query_against_devinfo"
    label: "Calls a doca_dpa_cap_* capability query against the active doca_devinfo before assuming DPA features are present"
    weight: 2
    pass_when: |
      The agent says the user MUST run a doca_dpa_cap_* query
      against the active doca_devinfo for the target BlueField
      BEFORE assuming the DPA feature(s) the kernel uses are
      available, AND surfaces that BlueField hardware
      generations differ in DPA support — an older generation
      may not expose the DPA processor to the host at all, in
      which case the answer is the hardware, not a software
      upgrade. The agent's recommendation includes BOTH the
      DOCA-version axis (pkg-config --modversion doca-dpa
      agreeing with doca_caps --version and with the installed
      dpacc per the DOCA Compatibility Policy) AND the
      hardware-presence axis (the doca_dev / doca_devinfo
      enumeration shows a BlueField whose DPA the host can
      reach). A response that assumes "all BlueFields have a
      DPA" or that quotes only the version axis fails this
      criterion.

  - id: "core_lifecycle_walked"
    label: "Walks the DOCA Core lifecycle for the doca_dpa context, the loaded DPA application image, and the DPA execution context"
    weight: 2
    pass_when: |
      The agent walks the lifecycle in order: create the
      doca_dpa Core context against the chosen doca_dev; load
      the DPA application image (the DPACC-produced binary)
      into it as a doca_dpa_app; create one or more
      doca_dpa_thread execution contexts on top; start the
      doca_dpa via doca_ctx_start; submit kernel launches via
      doca_dpa_kernel_launch_update_*; observe completions via
      a doca_dpa_completion attached to the launch; tear down
      in REVERSE order (threads first, then app release, then
      doca_dpa destroy). The agent surfaces that the launch is
      ASYNCHRONOUS from the host's point of view and that a
      doca_dpa_completion is required to know when the DPA
      kernel actually finished. A response that omits the
      doca_dpa / doca_dpa_app / doca_dpa_thread layering, or
      that treats the launch as synchronous and skips the
      completion mechanism, or that tears down in forward
      order, fails this criterion.

  - id: "single_kernel_launch_smoke_before_scale"
    label: "Recommends a single-kernel-launch smoke BEFORE scaling to a streaming launch loop"
    weight: 1
    pass_when: |
      The agent recommends launching ONE invocation of the
      DPA kernel and confirming the host observes one
      completion as the FIRST functional test, BEFORE scaling
      to a multi-launch streaming loop or a multi-thread
      design. The agent surfaces that a smoke failure is the
      cheapest place to identify env-side, version-skew, or
      two-side-program-signature gaps. A response that jumps
      straight to a high-throughput streaming design, or that
      fails to name the single-launch smoke as the first
      functional test, fails this criterion.

  - id: "no_hallucinated_dpa_api"
    label: "Does not invent doca_dpa_* / DPACC API symbols beyond the public surface"
    weight: 1
    pass_when: |
      Every doca_dpa_* / dpacc symbol the agent mentions is
      one that actually exists in the public DOCA DPA surface
      (doca_dpa, doca_dpa_app, doca_dpa_thread,
      doca_dpa_kernel_launch_update_*, doca_dpa_completion,
      doca_dpa_cap_*, doca_ctx_start, doca_pe_progress, dpacc)
      or it is explicitly framed as pseudocode / sketch /
      function-name placeholder. A response that invents API
      names like doca_dpa_easy_init(), doca_dpa_run_kernel(),
      doca_dpa_quick_launch(), or doca_dpa_attach_gpu() fails
      — that is the baseline-agent hallucination failure mode
      the bundle exists to prevent.

  - id: "termination_signal_for_dpa_kernel"
    label: "Names how the DPA kernel must terminate cleanly so the host does not block on shutdown"
    weight: 1
    pass_when: |
      The agent surfaces that a DPA kernel which never exits
      pins the DPA processor and the host program blocks on
      doca_ctx_stop / teardown because the in-flight kernel
      never completes. The agent prescribes a termination
      condition the kernel polls (a host-set flag in
      DPA-visible memory, a per-launch one-shot, or whatever
      the sample's exit pattern is) so the kernel exits on
      command. A response that walks the launch + completion
      flow without naming the kernel's exit condition, or that
      proposes killing the host process to stop the DPA
      kernel, fails this criterion.

  - id: "generalizes_to_gpunetio"
    label: "Generalizes from DPA to a second DOCA-into-target-processor integration (GPUNetIO + CUDA)"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names DOCA GPUNetIO (the host-side library
      that drives a CUDA kernel on an NVIDIA GPU) as the
      other DOCA library that runs a workload on a non-CPU
      target processor, AND identifies which parts of the
      workflow STAY THE SAME (paired in-target toolchain
      shape: a host-side DOCA library plus a separate
      in-target translation unit; the env-precondition matrix
      executed FIRST; the DOCA cap-query against the active
      doca_devinfo as one axis of the capability rule; the
      DOCA Core lifecycle on the host side; the dedicated
      completion mechanism for async target-side work; the
      single-kernel-launch smoke before scaling) versus which
      parts CHANGE (the target processor itself — DPA on the
      BlueField vs CUDA-capable GPU; the kernel-language
      toolchain — DPACC for DPA vs the CUDA toolkit / nvcc
      for GPUNetIO; the allocation primitives — DPA-side
      allocator vs cudaMalloc + doca_buf_arr_create_*; the
      in-target persistent pattern shape — DPA kernel on a
      doca_dpa_thread vs CUDA persistent kernel on a CUDA
      device ordinal; the dedicated completion mechanism —
      doca_dpa_completion for DPA vs the GPU-side completion
      via the GPUNetIO RX / TX path; the driver-layer
      dependency — DPA driver layer for DPA vs nvidia_peermem
      + CUDA driver for GPUNetIO). A response that walks
      only DPA and is silent on the generalization, or that
      names a different library (e.g. RDMA, Comch) that does
      NOT run a workload on a non-CPU target processor, fails
      this criterion. A response that says "GPUNetIO and DPA
      are the same" or merges their surfaces fails.
