id: "02_first_app"
name: "First DOCA app from docker"
description: |
  THE HEADLINE PROMPT. In the local A/B that produced
  DEMO-POC.html, the baseline agent scored 1/6 by shipping unverified
  C code (`doca_version()`, `-ldoca_common` — both invented). The
  skills agent scored 6/6 by routing the user to the real on-disk
  sample and refusing to scaffold from documentation prose.
  Any regression on this prompt is the highest-priority CI signal.

prompt: |
  I have docker. Can you help me build my first DOCA Flow app?

context:
  audience: "beginner"
  intent: "first_app"
  prior_knowledge: "knows docker, no DOCA"
  # When a PR touches a specific lib/service/tool, the runner replaces
  # 'Flow' in the prompt above with the changed lib/service/tool name
  # (and runs both: the Flow baseline AND the changed-artifact variant).
  changed_skill_in_pr: "doca-flow"
  baseline_artifact: "doca-flow"

criteria:
  - id: "recognizes_ngc_container"
    label: "Recognizes docker as the NGC-container path (Path 0)"
    weight: 1
    pass_when: |
      The agent identifies the NGC DOCA container as the docker-friendly
      path. A response that proposes building DOCA from source instead
      of pulling the prebuilt container fails this criterion.

  - id: "names_real_ngc_repo"
    label: "Names the actual NGC repo (nvcr.io/nvidia/doca/doca)"
    weight: 1
    pass_when: |
      The agent's `docker pull` recommendation uses the literal string
      `nvcr.io/nvidia/doca/doca`. Made-up repo names (e.g.
      `nvidia/doca`, `doca/sdk`, `nvcr.io/nvidia-doca`) fail.

  - id: "routes_to_real_sample"
    label: "Routes to a real shipped sample, does not scaffold from prose"
    weight: 2
    pass_when: |
      The agent prescribes inspecting the real on-disk samples
      directory (`/opt/mellanox/doca/samples/` inside the container)
      and starting from a sample that ACTUALLY EXISTS there. A
      response that emits a `main.c` / `Makefile` / `Dockerfile`
      written from documentation prose fails. THIS IS THE HEADLINE
      ANTI-HALLUCINATION CRITERION.

  - id: "verifies_install"
    label: "Mentions install verification after the pull"
    weight: 1
    pass_when: |
      After the docker pull step, the agent recommends a verification
      command (e.g. `pkg-config --modversion doca-common` or
      `doca_caps --version`) inside the container before the user
      tries to build anything. A response that proceeds straight to
      build with no verification fails.

  - id: "no_invented_symbols"
    label: "Does not emit unverified DOCA function names or library names"
    weight: 2
    pass_when: |
      The agent's response does NOT contain any of the following
      patterns unless backed by a verification step that the user is
      told to run BEFORE relying on them:
        - `doca_version()` (invented in the round-1 baseline)
        - `-ldoca_common` (invented in the round-1 baseline)
        - any `#include <doca.h>` (the real path is doca/<library>.h)
        - any `pkg-config doca-<X>` where X is not actually shipped
          on the install
      THIS IS THE OTHER HEADLINE ANTI-HALLUCINATION CRITERION.

  - id: "build_vs_runtime"
    label: "Distinguishes container build-half from real-NIC runtime-half"
    weight: 1
    pass_when: |
      The agent flags that the container can build and link a DOCA
      program but that runtime calls (Flow pipe creation, RDMA QP
      ops, etc.) need a real BlueField / ConnectX present. A response
      that promises "your app will work entirely inside docker" fails.
