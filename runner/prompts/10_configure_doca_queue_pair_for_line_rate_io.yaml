id: "10_configure_doca_queue_pair_for_line_rate_io"
name: "Configure a DOCA queue-pair context for line-rate packet I/O — class-shaped"
description: |
  Class-shaped queue-pair prompt. The HEADLINE is the class
  ("configure a DOCA queue-pair context for line-rate packet
  I/O"); the worked example is DOCA Ethernet (`doca_eth_rxq` +
  `doca_eth_txq` on a BlueField representor), because that is
  the newly-covered library in skills/libs/doca-eth.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  set up ANY DOCA queue-style library context (Ethernet, RDMA,
  GPUNetIO — each has its own queue-object split, RX-type or
  task-type taxonomy, and capability-discovery shape). The
  bundle proves this by asking the agent to walk: env
  preconditions FIRST, queue-object split, capability
  discovery, type selection (RX type / task type), universal
  lifecycle order, steering dependency, single-packet smoke
  test. The same SHAPE applies to every queue-style DOCA
  library context; the per-library details differ.

  A baseline agent without skills typically: invents
  `doca_eth_*` API symbols from generic packet-I/O knowledge,
  conflates RX and TX as one context (one start, one stop),
  silently assumes a single RX "type" exists instead of the
  regular / cyclic / managed-recv taxonomy, omits the steering
  dependency (treating "no packets arriving" as a code bug
  rather than a missing DOCA Flow rule or promiscuous-mode
  flag), and skips the single-packet smoke before pushing to
  line rate.

prompt: |
  I have a host with a BlueField-3 DPU and DOCA installed. I
  want to set up a DOCA Ethernet queue pair — a `doca_eth_rxq`
  (regular RX type, so I can iterate per packet on first run)
  plus a `doca_eth_txq` — on a representor of one of the
  BlueField ports so I can do raw line-rate packet I/O from my
  user-space agent. Eventually this will feed a GPU
  packet-processing pipeline, but right now I just want one
  packet to flow in and one to flow out so I know the queues
  are alive.

  Walk me through the setup: what I have to check on the env
  side BEFORE writing any code (device access, port state, how
  packets are going to actually reach my RX queue), which
  `doca_eth_rxq_cap_*` / `doca_eth_txq_cap_*` queries I must
  run against the active `doca_devinfo` before picking a burst
  size or assuming an RX type works, the universal DOCA Core
  context lifecycle I have to follow on each queue (each is
  its own context — I want to make sure I get that right), how
  the steering side relates to this (I know DOCA Flow exists
  but I'm not sure where the boundary is), and what
  single-packet smoke test you'd recommend before I start
  driving real traffic.

  After that, briefly tell me which parts of your answer would
  carry over to a DIFFERENT DOCA queue-style library — for
  example DOCA RDMA's queue contexts, or DOCA GPUNetIO's
  GPU-initiated queue surface — and which parts would change.

context:
  audience: "intermediate"
  intent: "configure_library_context"
  prior_knowledge: "knows what a DPU and a representor are, has a BlueField-3 plus host, has done at least one DOCA build before but has not used DOCA Ethernet specifically"
  baseline_artifact: "doca-eth"
  changed_skill_in_pr: "libs/doca-eth"
  expected_skill_co_load:
    - "doca-eth"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-flow"

criteria:
  - id: "env_preconditions_first"
    label: "Verifies device access / port up / steering plan BEFORE writing any code"
    weight: 2
    pass_when: |
      The agent says the FIRST step is to confirm three
      env-side preconditions: (a) the user can open a
      `doca_dev` on the target port (sudo or `mlnx`-group
      membership), (b) the underlying port reports linkup
      (`devlink dev show` reports `state: PORT_ACTIVE`;
      `ip link` shows the device `UP,LOWER_UP`), and (c) the
      user has a plan for how packets will reach the RX queue
      (either a DOCA Flow rule that steers traffic to this
      queue, or kernel-side promiscuous mode on the
      underlying interface). It must call out that an RX
      queue without one of (c) is silent, not a
      `DOCA_ERROR_*`. A response that jumps to
      `doca_eth_rxq_*` calls without naming all three env
      preconditions fails.

  - id: "rx_tx_independent_contexts"
    label: "RX and TX are independent DOCA Core contexts with independent lifecycles"
    weight: 2
    pass_when: |
      The agent explicitly states that `doca_eth_rxq` and
      `doca_eth_txq` are TWO SEPARATE DOCA Core contexts, each
      with its own `doca_ctx_create` / `_start` / `_stop` /
      `_destroy` lifecycle, and that one `doca_ctx_start()`
      does NOT cover both sides. A response that conflates RX
      and TX as one context, or that walks a single lifecycle
      for "the queue pair", fails.

  - id: "capability_query_rule"
    label: "Calls out doca_eth_rxq_cap_* / doca_eth_txq_cap_* before assuming sizes / types"
    weight: 2
    pass_when: |
      The agent says the user MUST query, against the active
      `doca_devinfo`: `doca_eth_rxq_cap_get_max_burst_size`
      before picking a burst size,
      `doca_eth_rxq_cap_is_type_supported` before assuming the
      chosen RX type works on this device, and (if asked
      about scatter-gather or offload follow-ups)
      `doca_eth_txq_cap_get_max_send_buf_list_len` /
      `doca_eth_txq_cap_is_l3_chksum_offload_supported`. A
      response that quotes a numeric burst size from memory,
      or that asserts a particular RX type is available
      without naming the cap query, fails.

  - id: "rx_type_taxonomy_surfaced"
    label: "Names the regular / cyclic / managed-recv RX type taxonomy"
    weight: 2
    pass_when: |
      The agent surfaces that `doca_eth_rxq` has MULTIPLE RX
      TYPES — regular (per-packet user task; debug-friendly
      first run), cyclic (pre-allocated ring buffer; line-rate
      fixed-MTU), and managed-recv (library-owned buffers;
      hands-off line rate) — and ties the choice to the
      user's data shape, not a default. Picking "regular" for
      this prompt's first-run intent is correct; the agent
      must also tell the user the choice is data-shape-
      dependent and gates on
      `doca_eth_rxq_cap_is_type_supported`. A response that
      treats RX as a single undifferentiated type fails.

  - id: "steering_dependency_called_out"
    label: "Names DOCA Flow (or promiscuous mode) as the steering boundary"
    weight: 2
    pass_when: |
      The agent explicitly states that DOCA Ethernet is the
      *queue* surface and DOCA Flow is the *steering* surface,
      and that an RX queue receives packets only when either
      (a) a DOCA Flow rule steers matching packets to it, or
      (b) the underlying interface is in promiscuous mode at
      the kernel layer. The agent must route the steering side
      to `doca-flow` (or to the promiscuous-mode workaround
      via `doca-setup` for first-run expedience) — not invent
      a `doca_eth_*` steering call. A response that omits the
      steering boundary, or that proposes a steering API
      inside DOCA Ethernet, fails.

  - id: "single_packet_smoke_before_scale"
    label: "Single-packet smoke before line-rate traffic"
    weight: 1
    pass_when: |
      The agent recommends a one TX → loopback / external echo
      → one RX completion smoke as the FIRST functional test,
      before any line-rate traffic or burst submission. A
      response that jumps from `doca_ctx_start()` to "now
      drive line rate" without an explicit single-packet
      smoke fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_eth_* API symbols"
    weight: 1
    pass_when: |
      Every `doca_eth_*` (or `doca_ctx_*`, `doca_pe_*`) symbol
      the agent mentions exists in the public DOCA Ethernet
      surface that the skill documents (`doca_eth_rxq_create`,
      `doca_eth_rxq_set_type`,
      `doca_eth_rxq_cap_get_max_burst_size`,
      `doca_eth_rxq_cap_is_type_supported`,
      `doca_eth_txq_create`,
      `doca_eth_txq_cap_get_max_send_buf_list_len`,
      `doca_eth_txq_cap_is_l3_chksum_offload_supported`,
      `doca_eth_frame`, send-task allocator + submit) — or it
      is explicitly framed as pseudocode / sketch. A response
      that invents API names like `doca_eth_quick_init()` or
      `doca_eth_rxq_easy_start()` fails — that is the
      baseline-agent hallucination failure mode the bundle
      exists to prevent.

  - id: "version_overlay_named"
    label: "Quotes pkg-config --modversion doca-eth before promising features"
    weight: 1
    pass_when: |
      The agent surfaces that the user must query
      `pkg-config --modversion doca-eth` (and confirm it
      matches `doca_caps --version`) before claiming an RX
      type or offload feature is available on the install, and
      that the device-side cap query against `doca_devinfo` is
      the runtime authority on top of the version check. A
      response that quotes a DOCA version pin from memory, or
      that promises a feature without naming either the
      version anchor or the cap query, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from DOCA Ethernet to other DOCA queue-style libraries"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names at least ONE OTHER DOCA queue-style
      library (DOCA RDMA queue contexts, DOCA GPUNetIO
      GPU-initiated queue surface, …) and identifies which
      parts of the setup stay the same (env preconditions
      FIRST, universal DOCA Core lifecycle per context,
      capability-query rule against `doca_devinfo`,
      mandatory-before-start configuration, single-packet
      smoke before scale-up) versus which change (queue
      object names per library — `doca_eth_rxq` vs
      `doca_rdma` vs `doca_gpu_netio_*`; type taxonomy per
      library — RX types vs RDMA task types vs GPUNetIO
      queue shapes; addressing / steering semantics per
      library; permission shape per library). A response
      that walks only DOCA Ethernet and is silent on
      generalization fails this criterion.
