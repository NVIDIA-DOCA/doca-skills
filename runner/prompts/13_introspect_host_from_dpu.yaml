id: "13_introspect_host_from_dpu"
name: "Introspect host state from the DPU side (agent-less observation) — class-shaped"
description: |
  Class-shaped DPU-side host-introspection prompt. The HEADLINE is
  the class ("introspect host state from the DPU side, agent-less,
  with no host-side install"); the worked example is DOCA App Shield
  (enumerate every running Linux process from the BlueField Arm side
  with no agent on the host), because that is the newly-covered
  library in skills/libs/doca-apsh.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to set
  up ANY DPU-resident observation context (App Shield, conceptually
  the telemetry / telemetry-exporter shape, future introspection
  libraries — each carries the same DPU-side asymmetry, the same
  cap-query rule, and the same "the host runs nothing" stance).
  The bundle proves this by asking the agent to walk: side rule
  FIRST, host-side prerequisite (kernel symbol map) BEFORE any
  code, cap-query against doca_devinfo, DOCA Core lifecycle order,
  NOT_FOUND-is-a-normal-answer rule, known-target smoke before
  broad scans. The same SHAPE applies to every DPU-resident
  observation library; the per-library details differ.

  A baseline agent without skills typically: invents a doca_apsh_*
  API surface from generic OS-introspection knowledge, recommends
  installing something on the host (the very thing App Shield is
  designed to avoid), is silent on the host kernel symbol map
  prerequisite, treats DOCA_ERROR_NOT_FOUND from a per-target
  enumerator as a bug rather than a normal "absent right now"
  answer, and jumps straight to a broad process scan without an
  enumerate-one-known-target smoke first.

prompt: |
  I have a host with a BlueField-3 DPU and DOCA installed. The host
  is running an unmodified Linux kernel and I want to enumerate
  every running process on it from the BlueField Arm side using
  DOCA App Shield, as the first step of a small agent-less host
  security monitor. I do NOT want to install anything on the host
  itself — that's the whole point of using App Shield.

  Walk me through the setup: which side I write and run the code
  on, what I have to check BEFORE writing any code (in particular
  any host-side artifact I need on the DPU side), which capability
  queries I have to run against the active doca_devinfo, the
  DOCA Core lifecycle order I have to follow to bring a
  doca_apsh_system up against the host, what I should smoke-test
  FIRST to prove the introspection path is correct before I do the
  broad process scan, and how I should interpret DOCA_ERROR_NOT_FOUND
  when I ask for a process that does not happen to be running on the
  host right now.

  After that, briefly tell me which parts of your answer would
  change for a DIFFERENT DPU-resident observation pattern (for
  example another DOCA introspection-style library, or the
  DPU-resident telemetry / telemetry-exporter shape conceptually),
  and which parts are the same.

context:
  audience: "intermediate"
  intent: "introspect_host_from_dpu"
  prior_knowledge: "knows what a DPU is, has a BlueField-3 plus host, knows what agent-less host security monitoring means conceptually but not the DOCA App Shield API"
  baseline_artifact: "doca-apsh"
  changed_skill_in_pr: "libs/doca-apsh"
  expected_skill_co_load:
    - "doca-apsh"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "dpu_side_asymmetry_first"
    label: "Walks the DPU-side / host-side asymmetry FIRST, before any code"
    weight: 2
    pass_when: |
      The agent explicitly states, as the FIRST step, that all
      doca_apsh_* code runs on the BlueField Arm (DPU) side and
      the host runs nothing for App Shield. A response that walks
      the user toward host-side install of an agent, host-side
      doca_apsh_* calls, or that is silent on the side rule and
      jumps straight to API calls, fails. The asymmetry is the
      load-bearing rule for App Shield and the agent must surface
      it before recommending any specific call.

  - id: "kernel_symbol_map_prerequisite"
    label: "Names the host kernel symbol map as a hard prereq BEFORE any code change"
    weight: 2
    pass_when: |
      The agent states, BEFORE any code-level recommendation, that
      a host-OS-version-matching kernel symbol map (the "VMA / OS
      symbols" file, sometimes shipped as a PDB / kernel-symbol
      blob) must be present on the DPU side and loaded into the
      doca_apsh_system before doca_ctx_start(), and that the map
      is host-OS-version-specific (a map baked for a previous host
      kernel will silently stop working after a host kernel
      upgrade). A response that is silent on the symbol map, that
      mentions it only after walking the lifecycle, or that treats
      it as optional, fails.

  - id: "capability_query_rule"
    label: "Calls out doca_apsh_cap_* against the active doca_devinfo before assuming a target works"
    weight: 2
    pass_when: |
      The agent says the user MUST call doca_apsh_cap_* (the
      App Shield capability-query family) against the active
      doca_devinfo on the DPU side BEFORE assuming a particular
      introspection target (e.g. process enumeration) is supported
      on this host OS / kernel version against this DOCA install.
      A response that asserts "App Shield enumerates processes" as
      a universal fact without naming the cap-query gate against
      doca_devinfo, or that omits the cap query entirely, fails.

  - id: "lifecycle_order_correct"
    label: "Walks the DOCA Core lifecycle order for doca_apsh_system"
    weight: 2
    pass_when: |
      The agent names the lifecycle order create doca_apsh_system →
      configure (host PCIe path + host OS type + load kernel symbol
      map) → doca_ctx_start() → enumerate (processes / modules /
      libraries / threads) → doca_ctx_stop() → destroy, and
      explicitly states that the configure-time inputs (PCIe path,
      OS type, symbol map) MUST be set before doca_ctx_start(). A
      response that jumps to enumerators without naming the
      lifecycle, or that puts configuration after start, fails.

  - id: "not_found_is_normal_answer"
    label: "Treats DOCA_ERROR_NOT_FOUND as a normal answer, not an error"
    weight: 2
    pass_when: |
      The agent states that DOCA_ERROR_NOT_FOUND returned from a
      per-target enumerator (e.g. asking for a process by name /
      PID that does not happen to be running right now) is a
      NORMAL per-snapshot answer that the requested target does
      not exist on the host at the moment of the query, NOT a
      failure to be retried. A response that treats NOT_FOUND as
      an error condition, that recommends a retry loop on
      NOT_FOUND, or that fails to distinguish "absent right now"
      from "the call failed", fails — this is the canonical
      App Shield first-app misinterpretation the bundle exists to
      prevent.

  - id: "known_target_smoke_before_broad_scan"
    label: "Recommends enumerating one known-running target as a smoke before broad scan"
    weight: 2
    pass_when: |
      The agent recommends asking App Shield for ONE target the
      user can independently confirm is on the host (e.g. init /
      systemd by name on a Linux host) as the FIRST functional
      test, BEFORE doing the broad enumerate-every-process scan.
      A successful enumerate-one confirms privilege + symbol-map +
      PCIe path are all correct; the broad scan inherits that
      confidence. A response that jumps straight to "now enumerate
      every process" without naming the known-target smoke fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_apsh_* API symbols"
    weight: 1
    pass_when: |
      Every doca_apsh_* (or doca_ctx_*, doca_pe_*) symbol the
      agent mentions is one that actually exists in the public
      DOCA App Shield surface (object names like doca_apsh_system,
      doca_apsh_proc, doca_apsh_module, doca_apsh_lib,
      doca_apsh_thread, and the doca_apsh_cap_* query family), or
      it is explicitly framed as pseudocode / sketch. A response
      that invents API names like doca_apsh_easy_init(),
      doca_apsh_quick_scan(), or doca_apsh_subscribe_events()
      fails — that is the baseline-agent hallucination failure
      mode the bundle exists to prevent.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from App Shield to other DPU-resident observation patterns"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names at least ONE OTHER DPU-resident
      observation pattern (another DOCA introspection-style
      library, or the DPU-resident telemetry / telemetry-exporter
      conceptual shape — e.g. doca-telemetry / doca-telemetry-
      exporter as collection / publishing analogs) and identifies
      which parts of the workflow stay the same (DPU-side / host-
      side asymmetry, DOCA Core lifecycle order, capability-query
      rule against doca_devinfo, smoke-with-a-known-target before
      broad scan, structured-log first observation) versus which
      change (the per-library object family, the per-library
      prerequisite — App Shield needs a kernel symbol map,
      telemetry needs a schema registry — and the per-library
      semantics of "absent right now"). A response that walks
      only App Shield and is silent on generalization fails this
      criterion.
