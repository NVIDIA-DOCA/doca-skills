id: "109_verify_recommended_change_for_doca_gpunetio_ib_write_bw"
name: "Verify a recommended change to gpunetio ib write bw (tool)"
description: |
  Per-artifact verification-axis smoke prompt for the tools/doca-gpunetio-ib-write-bw skill,
  auto-generated by /tmp/gen_verify_prompts.py to push per-artifact prompt
  coverage from 1 -> 2 for the May-2026 reviewer-feedback wave. The
  variant-C bundle must route the agent through tools/doca-gpunetio-ib-write-bw/SKILL.md ->
  CAPABILITIES.md -> TASKS.md AND emit the universal verification
  contract from AGENTS.md ### The universal verification contract
  (5 steps: env precondition, cap query, smoke before bulk, contract
  surface, observability). The variant-A baseline typically skips the
  contract entirely and emits unverified function names or pkg-config
  invocations -- which is the failure mode this prompt is designed to
  expose at scale, per-artifact.

prompt: |
  I have a working setup using the DOCA gpunetio ib write bw tool. A teammate
  recommended a change to my code -- they say it will make my use of
  gpunetio ib write bw faster / safer / more correct. Before I apply the change to
  production, walk me through how to verify their recommendation is
  actually right for my install and my hardware. Be specific to
  gpunetio ib write bw, do not give me a generic answer.

context:
  audience: "intermediate"
  intent: "verify_recommended_change"
  prior_knowledge: "already has a working DOCA gpunetio ib write bw setup"
  changed_skill_in_pr: "doca-gpunetio-ib-write-bw"
  baseline_artifact: "doca-gpunetio-ib-write-bw"

criteria:
  - id: "cites_universal_verification_contract"
    label: "Cites the universal verification contract from AGENTS.md (5 steps)"
    weight: 2
    pass_when: |
      The agent applies the 5-step universal verification contract from
      AGENTS.md ### The universal verification contract: env precondition,
      capability query, smoke before bulk, contract surface, observability.
      A response that gives only one or two of the five steps fails.

  - id: "routes_through_doca_gpunetio_ib_write_bw_skill"
    label: "Routes through the doca-gpunetio-ib-write-bw skill dir, not generic DOCA prose"
    weight: 1
    pass_when: |
      The agent names tools/doca-gpunetio-ib-write-bw/SKILL.md (or CAPABILITIES.md / TASKS.md)
      as where it is pulling the workflow from, and the workflow it cites
      matches what the doca-gpunetio-ib-write-bw skill actually documents. Generic
      "use pkg-config and run a smoke test" answers that could have been
      written without the doca-gpunetio-ib-write-bw skill fail.

  - id: "calls_capability_query_for_doca_gpunetio_ib_write_bw"
    label: "Issues a capability query specific to gpunetio ib write bw before recommending the change"
    weight: 1
    pass_when: |
      The agent runs a doca-gpunetio-ib-write-bw-specific capability query (doca_caps,
      doca_<lib>_cap_*, doca_*_get_supported_*, etc.) against the live
      device before claiming the recommendation is safe to apply. A
      response that asserts the change is correct without a cap query
      fails.

  - id: "smoke_before_bulk_for_doca_gpunetio_ib_write_bw"
    label: "Smokes the change on the smallest possible scope before scaling"
    weight: 1
    pass_when: |
      The agent recommends running the change against a single
      representor / single queue / single pipe / single resource of the
      smallest legal gpunetio ib write bw unit-of-damage first, observing the result,
      and only then widening scope. A response that recommends applying
      the change to the full production scope in one shot fails.

  - id: "no_invented_doca_gpunetio_ib_write_bw_symbols"
    label: "Does not invent gpunetio ib write bw function names or pkg-config invocations"
    weight: 1
    pass_when: |
      The agent's response does NOT contain any doca-gpunetio-ib-write-bw-related symbol
      (function name, struct, enum, pkg-config module, link flag) that
      is not actually shipped by the doca-gpunetio-ib-write-bw library. A response that
      emits, e.g., a `doca_doca_gpunetio_ib_write_bw_easy_init()` or
      `-ldoca-gpunetio-ib-write-bw-common` invented for the answer fails.
