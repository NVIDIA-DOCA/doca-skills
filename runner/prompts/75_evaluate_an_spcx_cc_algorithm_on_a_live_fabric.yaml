id: "75_evaluate_an_spcx_cc_algorithm_on_a_live_fabric"
name: "Evaluate an SPCX-authored congestion-control algorithm on a live RDMA fabric — class-shaped"
description: |
  Class-shaped SPCX evaluation + roll-forward prompt. The
  HEADLINE is the class ("evaluate an SPCX-authored
  congestion-control algorithm on a live RDMA fabric and
  decide whether it's safe to roll forward to production");
  the worked example is a user-authored SPCX algorithm
  loaded on a non-prod BlueField-3 pair, evaluated under
  injected contention, with the user asking whether they
  can roll it to production.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how
  to evaluate ANY SPCX-class algorithm — user-authored or
  shipped-reference (e.g. the zero-touch RTT-based algorithm
  via `doca-pcc-ztr-rttcc-algo`) — on ANY RDMA / RoCE
  fabric, and gate the production roll-forward decision on
  evidence + bounded blast radius + factory-PCC rollback +
  OOB + maintenance window. The bundle proves this by
  asking the agent to walk: the SPCX-vs-PCC-vs-factory-
  firmware decision tree FIRST (gate, not default), the
  authoring vs consumption split, the role + probe-packet
  format decision, the live-link / contention precondition
  (load-bearing — *"a CC algorithm has no signal under no
  contention"*), the replica-first-on-a-hardware-matched-
  replica rule, the bundle-wide hardware-safety meta-
  policy's roll-forward gates, and an explicit refusal when
  any gate fails. The same SHAPE applies to every SPCX
  evaluation; the per-algorithm details differ.

  A baseline agent without skills typically: jumps to
  loading the algorithm on production because it "works"
  on a single replica run; treats SPCX as identical to
  `doca-pcc` and silently ignores the newer-surface
  tradeoff; evaluates on an idle link and declares the
  algorithm safe because nothing went wrong; invents
  parameter names, role tokens, probe-packet format
  tokens, or metric names; misses that the firmware
  custom-PCC slot is a hardware-touching precondition;
  recommends a production cutover without naming the
  factory-PCC rollback path; recommends rolling out fleet-
  wide at first cutover; conflates the SPCX harness with
  the algorithm body.

prompt: |
  I have a non-prod BlueField-3 pair on a small RDMA /
  RoCE fabric, with DOCA installed on both sides. I just
  built a custom SPCX congestion-control algorithm using
  DPACC against the matching DOCA version on my host. I
  want to evaluate it with `doca_spcx_cc` and figure out
  whether I can roll it forward to my production fabric
  (a much larger BlueField-3 deployment carrying
  customer-visible RoCE traffic).

  Walk me through this end-to-end. Specifically:

  1. Before I touch the harness — help me decide between
     SPCX, `doca-pcc`, and just configuring the factory
     PCC algorithm in firmware. What's the tradeoff?
     Don't just assume SPCX because I asked for it; tell
     me what SPCX gives me that the other two don't, and
     what it costs.
  2. Walk me through the prerequisites. I have DOCA on
     both BlueFields, but I haven't checked the firmware-
     level custom-PCC slot state and I haven't confirmed
     that SPCX is actually available on my install.
  3. Help me set up a contention-positive evaluation on
     the non-prod pair. Be EXPLICIT about the live-link /
     contention rule — I do not want to declare success
     because nothing went wrong on an idle link.
  4. Once I have a clean run on the non-prod pair, what's
     the gate before I touch the production fabric? Walk
     me through the bundle's hardware-safety meta-policy
     here — I know production CC is high-stakes but I
     want to know HOW high-stakes and what concrete gates
     I need.
  5. Tell me what the rollback path looks like if the
     algorithm misbehaves in production. I want to
     understand the rollback BEFORE I cut over, not
     after.
  6. If at any point I tell you that the firmware
     custom-PCC slot is disabled on my BlueFields, OR
     that my non-prod fabric has no way to generate the
     contention pattern my algorithm is designed for, OR
     that I cannot guarantee an out-of-band management
     path during the production cutover, tell me
     HONESTLY whether I should still proceed. Don't
     paper over those preconditions.

  Briefly tell me which parts of your answer would
  CHANGE if I were evaluating the documented shipped
  reference zero-touch RTT-based algorithm (the one in
  `doca-pcc-ztr-rttcc-algo`) instead of a user-authored
  algorithm — name what stays the same and what's
  different. Be explicit about which `--*` flags, role
  tokens, probe-packet format tokens, or metric names
  I'd be inventing if I followed your answer literally
  without first reading `doca_spcx_cc --help` and the
  public DOCA SPCX page.

context:
  audience: "advanced"
  intent: "evaluate_cc_algorithm_for_production"
  prior_knowledge: "knows what a DPU and a BlueField are, has a non-prod BlueField-3 pair on a small RoCE fabric + a production BlueField-3 fleet on a larger RoCE fabric, has DOCA installed on both, has built at least one DPA-side algorithm via DPACC before, has used `doca-pcc` once but has never used `doca_spcx_cc` and has not yet checked the firmware custom-PCC slot state"
  baseline_artifact: "doca-spcx-cc"
  changed_skill_in_pr: "tools/doca-spcx-cc"
  expected_skill_co_load:
    - "doca-spcx-cc"
    - "doca-pcc"
    - "doca-pcc-ztr-rttcc-algo"
    - "doca-pcc-counters"
    - "doca-dpa"
    - "doca-rdma"
    - "doca-hardware-safety"
    - "doca-version"
    - "doca-setup"
    - "doca-debug"
    - "doca-public-knowledge-map"

criteria:
  - id: "spcx_vs_pcc_vs_factory_decision_tree"
    label: "Walks the SPCX vs doca-pcc vs factory firmware decision tree before configuring the harness"
    weight: 3
    pass_when: |
      The agent's FIRST step is to walk the three-way
      decision tree explicitly: factory PCC (firmware-
      resident default, no host-side code) vs
      `doca-pcc` (stable, established programmable-CC
      surface) vs `doca_spcx_cc` / SPCX (newer, more
      flexible extension, potentially preview / limited
      HW on some installs). The agent must name the
      tradeoff for SPCX — newer surface, install-
      specific availability — and tell the user to
      confirm SPCX is actually exposed on their install
      via `doca_spcx_cc --help` succeeding and the
      public DOCA SPCX guide naming their BlueField +
      DOCA combination. A response that commits to SPCX
      without naming the three-way tradeoff fails.

  - id: "firmware_custom_pcc_slot_precondition"
    label: "Names the firmware custom-PCC slot as a hardware-touching precondition and routes via hardware-safety"
    weight: 2
    pass_when: |
      The agent surfaces the firmware-level custom-PCC
      slot as a required precondition — without it
      enabled, the SPCX session fails at the firmware-
      precondition layer of the error taxonomy. The
      agent must also recognise that enabling the slot
      via `mlxconfig`-class configuration is a
      hardware-touching change and route it through
      the bundle-wide hardware-safety meta-policy
      (pre-flight inventory, OOB confirmation, cold
      power cycle commit rule), NOT propose it as a
      trivial `mlxconfig` invocation. A response that
      omits the slot precondition, or that proposes
      flipping it without naming the hardware-safety
      meta-policy, fails.

  - id: "live_link_contention_rule_load_bearing"
    label: "Surfaces the live-link / contention rule as the load-bearing safety invariant"
    weight: 3
    pass_when: |
      The agent explicitly states that a CC algorithm
      has NO observable signal without actual
      contention on the fabric, and that an idle-link
      or contention-absent run is uninformative by
      construction. The agent's evaluation plan
      requires generating contention that matches the
      algorithm's design (e.g. RTT variation for an
      RTT-based algorithm; ECN-marking traffic for an
      ECN-based algorithm) and confirming via
      `doca-pcc-counters` snapshots and `doca-rdma`
      metrics that the link is in fact congested
      before drawing any conclusion. A response that
      proposes declaring the algorithm safe based on
      "nothing went wrong on a quiet link" fails.

  - id: "replica_first_hardware_matched"
    label: "Requires replica-first on a hardware-matched replica before production cutover"
    weight: 2
    pass_when: |
      The agent requires the algorithm to be evaluated
      on a non-prod replica that matches production on
      BlueField generation, firmware level, host
      kernel, and fabric topology class, with a
      contention pattern that matches the algorithm's
      design — per the bundle-wide hardware-safety
      replica-first rule cross-linked from
      `doca-hardware-safety`. The agent must NOT
      propose skipping the replica because the change
      is "small" or because the non-prod pair "looks
      like" production without naming the matching
      criteria. A response that proposes a direct
      production cutover, or that treats a non-
      hardware-matched replica as a substitute, fails.

  - id: "bounded_blast_radius_rollout"
    label: "Requires bounded blast radius for the production cutover, not fleet-wide at first"
    weight: 2
    pass_when: |
      The agent's production rollout plan is incremental:
      one BlueField pair first, then a small bounded
      set, then progressively larger bounded sets, with
      the observability gate proven and the rollback
      rehearsed at each step. The agent must NOT
      recommend loading the SPCX algorithm fleet-wide
      at first production cutover. A response that
      proposes a single fleet-wide cutover fails.

  - id: "factory_pcc_rollback_documented"
    label: "Names the rollback to factory PCC as the always-available escape hatch, documented BEFORE cutover"
    weight: 3
    pass_when: |
      The agent's deployment plan names the rollback
      path EXPLICITLY: revert the loaded SPCX
      algorithm, fall back to the factory PCC behaviour
      in firmware (or to the prior programmable-CC
      algorithm if one was already in place); names
      the gate that triggers it (observability surface
      goes silent, queue depth exceeds threshold,
      host-side status transitions to `Error`, fabric-
      level link instability); confirms the rollback
      is rehearsed on the replica BEFORE production is
      exposed. A response that recommends production
      cutover without a named, rehearsed rollback path
      fails.

  - id: "oob_management_path_called_out"
    label: "Requires OOB management path for the production cutover"
    weight: 1
    pass_when: |
      The agent names that an out-of-band management
      path is mandatory for the production cutover if
      the cutover touches a BlueField the operator is
      managing over the same RDMA link the SPCX
      algorithm is meant to control — per the
      bundle-wide hardware-safety OOB rule cross-
      linked from `doca-hardware-safety`. A response
      that omits OOB, or that promises "SSH over the
      data plane is fine", fails.

  - id: "no_hallucinated_flags_or_tokens"
    label: "Does not invent --* flags, role tokens, probe-packet format tokens, or metric names"
    weight: 2
    pass_when: |
      Every `--*` flag, role token (RP / NP),
      probe-packet format token, algorithm parameter
      name, and metric name the agent mentions is
      either documented by the public DOCA SPCX page
      that the skill routes to, or is explicitly
      framed with the agent telling the user to read
      the exact name from `doca_spcx_cc --help` on
      the installed binary. A response that invents a
      `--quick-evaluate` mode, a `--auto-tune` flag, a
      `SPCX_ROLE_AUTO` token, a `SPCX_TRACE_ALL`
      metric, or that quotes a specific algorithm
      parameter literal from memory, fails.

  - id: "refuse_when_preconditions_missing"
    label: "Honestly refuses to proceed when slot disabled / no contention / no OOB"
    weight: 3
    pass_when: |
      When the prompt's contingency clause (firmware
      slot disabled, no way to generate the
      contention pattern, no OOB path) is addressed,
      the agent tells the user HONESTLY which gates
      fail and refuses to proceed on the gated path,
      naming the escalation route per
      `doca-hardware-safety` no-rollback /
      no-precondition rule. The agent must NOT find
      a creative workaround (e.g. "skip the slot
      flip", "synthesize contention later", "manage
      over the data plane just this once"). A
      response that papers over any of these
      preconditions fails.

  - id: "shipped_reference_vs_authored_split"
    label: "Names what stays the same vs differs when evaluating the shipped reference algorithm instead of a user-authored one"
    weight: 1
    pass_when: |
      The agent explicitly addresses the generalization
      to the documented shipped reference zero-touch
      RTT-based algorithm via `doca-pcc-ztr-rttcc-algo`:
      the operator-side harness (`doca_spcx_cc`) and
      the evaluation discipline stay the same; what
      changes is the algorithm-side documentation,
      parameter set, and version/lineage anchor — the
      shipped reference algorithm has its own skill
      that owns the algorithm semantics. A response
      that is silent on this generalization, or that
      treats the shipped reference algorithm as
      identical to a user-authored algorithm in every
      respect, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from the BlueField-3 RoCE case to other SPCX evaluation classes"
    weight: 2
    pass_when: |
      The agent explicitly addresses the generalization
      across SPCX evaluation shape: the same workflow
      applies to any SPCX-class algorithm (user-
      authored or shipped reference), any BlueField
      generation that supports SPCX, any RDMA / RoCE
      fabric topology, and any contention pattern that
      matches the algorithm's design. The agent must
      name the axes that change per evaluation
      (algorithm, parameter set, BlueField generation,
      firmware level, fabric topology, contention
      pattern) and the axes that stay the same
      (replica-first rule, contention precondition,
      factory-PCC rollback escape hatch, OOB
      requirement, bounded-blast-radius rollout). A
      response that walks only the BlueField-3-RoCE
      worked example and is silent on what generalizes
      fails this criterion.
