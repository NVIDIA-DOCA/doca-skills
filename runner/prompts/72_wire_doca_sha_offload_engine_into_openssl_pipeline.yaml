id: "72_wire_doca_sha_offload_engine_into_openssl_pipeline"
name: "Wire the DOCA SHA Offload OpenSSL engine into an existing OpenSSL-based pipeline and prove the offload actually engages — class-shaped"
description: |
  Class-shaped tool-invocation prompt for the OpenSSL ENGINE
  shipped at `doca/tools/sha_offload_engine/`. The HEADLINE
  is the class ("wire the DOCA SHA-offload OpenSSL engine
  into an existing OpenSSL-based pipeline and validate the
  offload actually engages and is a perf win for the
  pipeline's message-size mix"); the worked example is a
  single (pipeline shape × OpenSSL version × message-size
  mix) the agent picks. The bundle MUST teach the agent to
  (a) surface the engine-vs-doca-sha-library selection rule
  BEFORE recommending the engine, (b) walk the verified
  load mechanics (`openssl engine dynamic -pre LOAD` /
  `ENGINE_load_dynamic`), (c) USE THE SHA-224 NEGATIVE TEST
  AS THE PROOF that offload actually engaged (a successful
  SHA-256 hash is NOT proof — OpenSSL falls back to
  software SHA silently), (d) characterize the message-
  size window where the engine is a perf win, (e) name the
  TWO version axes (DOCA + OpenSSL), and (f) refuse to
  invent OpenSSL flags or engine ctrl-cmds.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent
  how to wire the engine into ANY OpenSSL-based pipeline
  on a host with DOCA SHA. The bundle proves this by
  asking the agent to walk the class shape end-to-end on
  one worked example, then generalize to a DIFFERENT
  pipeline shape and identify what stays the same vs what
  changes.

  A baseline agent without skills typically: silently
  recommends the engine without surfacing the doca-sha
  library alternative; treats a successful `openssl dgst`
  as proof of offload (the canonical silent-fallback
  failure mode); skips the SHA-224 negative test; invents
  OpenSSL flags like `--offload-sha`, `--doca-pci=03:00.0`
  that do not exist; misses the `set_pci_addr` ctrl-cmd's
  exact name (verified in `engine/doca_sha_offload_engine.c`);
  ignores `-engine_impl` as the disable-software-fallback
  flag; ignores `-async_jobs` as the perf-shaping knob;
  pretends the engine offloads SHA-224 or HMAC-SHA (it does
  NOT — only one-shot SHA-1 / SHA-256 / SHA-512); skips
  the OpenSSL version axis; assumes the engine is pre-
  built under `/opt/mellanox/doca/`.

prompt: |
  I run a service that does a lot of SHA hashing. The
  service is already written against OpenSSL — it calls
  the EVP digest API (`EVP_DigestInit_ex` /
  `EVP_DigestUpdate` / `EVP_DigestFinal_ex` against
  `EVP_sha256()`, mostly) and works fine. I have a
  BlueField with DOCA installed; my CTO wants me to
  offload the SHA path onto DOCA SHA to free CPU
  cycles. I would much rather NOT rewrite the
  application against a different SHA API. Please walk
  me through:

  1. Is there a DOCA artifact that lets me offload SHA
     to DOCA WITHOUT rewriting the application against
     a different SHA API? If yes, name it and tell me
     where it ships — pre-built binary under
     `/opt/mellanox/doca/`, or source tree I have to
     build?
  2. Before I commit to this engine, what are the
     alternatives? In particular, when would I be
     better off rewriting the app against doca-sha
     directly vs adopting the engine as-is?
  3. The engine wraps DOCA SHA. What SHA algorithms
     does the engine ACTUALLY support — and what
     happens when my application asks for one it does
     not? My service uses SHA-256 and SHA-512, but a
     small fraction of requests use SHA-224; will
     those work?
  4. Walk me through loading the engine on the
     `openssl` CLI. How do I confirm at load time that
     the engine actually exposes the SHA algorithms it
     should? (Cite the verified load invocation from
     the shipped readme — do not invent flags.)
  5. **This is critical.** Once I deploy this engine,
     how do I PROVE that OpenSSL is actually calling
     DOCA SHA and is NOT silently falling back to its
     software SHA? My CTO will not accept "the openssl
     dgst command succeeded so DOCA SHA must have run".
  6. Programmatic embedding — what's the minimum source
     change I have to make to my application? (Cite
     the verified `ENGINE_load_dynamic` / `ENGINE_by_id`
     / `ENGINE_ctrl_cmd_string` / `ENGINE_init` /
     `ENGINE_set_default_digests` sequence from the
     shipped readme — do not paraphrase the API.)
  7. The engine defaults to a specific PCIe address.
     What is it (from the shipped source), and what do
     I do if my DOCA SHA device lives at a different
     PCIe address?
  8. Message-size matters. My pipeline hashes a mix:
     mostly 8 KB messages (TLS records-sized) with
     some occasional 4 MB messages (file blocks). For
     what message-size range is the engine offload a
     win vs CPU SHA, and how do I measure it on my
     actual hardware? (Cite `openssl speed` patterns
     from the shipped readme; mention `-async_jobs`.)
  9. Versioning — there are TWO version axes here.
     Name both and tell me where to read each pin from.
     Also: my host might be on OpenSSL 1.1.1 or
     OpenSSL 3.x; does the engine load on both?
  10. After walking my pipeline shape (8 KB / 4 MB
      mix with SHA-256 / SHA-512), briefly tell me
      what would change for a DIFFERENT pipeline shape
      — e.g. mostly small messages (1 KB control
      headers) or mostly large messages (sustained
      multi-GB file integrity). Which parts of your
      answer stay the same and which change?

context:
  audience: "intermediate"
  intent: "wire_engine_into_openssl_pipeline"
  prior_knowledge: "knows OpenSSL EVP digest API at a basic level, has used openssl dgst and openssl speed, has DOCA installed on a BlueField host, has not used DOCA SHA before and has not loaded an OpenSSL engine programmatically before"
  baseline_artifact: "doca-sha-offload-engine"
  changed_skill_in_pr: "tools/doca-sha-offload-engine"
  expected_skill_co_load:
    - "doca-sha-offload-engine"
    - "doca-sha"
    - "doca-version"
    - "doca-debug"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-caps"
    - "doca-hardware-safety"

criteria:
  - id: "names_engine_and_locates_it_correctly"
    label: "Names doca-sha-offload-engine AND clarifies where it ships and that it is an OpenSSL ENGINE (not a CLI)"
    weight: 3
    pass_when: |
      The agent's answer to question 1 names the DOCA SHA
      Offload Engine
      (`libdoca_sha_offload_engine.so`) shipped under
      `doca/tools/sha_offload_engine/` AND clarifies it
      is an OpenSSL ENGINE (a shared object loaded by an
      OpenSSL-based application), NOT a CLI of its own.
      The agent must note whether the engine is built
      from source (and surface that on some installs it
      ships pre-built under `${DOCA_DIR}/tools/doca_sha_offload_engine/`
      per the shipped readme). A response that names the
      wrong artifact, OR that confuses the engine with
      `doca-sha` library directly, fails.

  - id: "surfaces_engine_vs_library_selection"
    label: "Surfaces the engine vs doca-sha library selection rule honestly"
    weight: 3
    pass_when: |
      The agent's answer to question 2 explicitly names
      doca-sha as an alternative (calling the library
      directly from new code) AND tells the user when
      each is the right answer: the engine is right
      for existing OpenSSL-based pipelines wanting
      offload with no code change; doca-sha directly is
      right for new pipelines, for fine-grained control
      over the SHA task surface, for true incremental
      hashing across many `EVP_DigestUpdate` calls, or
      for algorithms the engine does not cover. A
      response that silently recommends the engine
      without surfacing doca-sha as a real alternative,
      OR that pretends doca-sha directly is "harder"
      without naming the trade-off, fails.

  - id: "algorithm_coverage_one_shot_sha1_sha256_sha512_only"
    label: "Correctly identifies the algorithm coverage as one-shot SHA-1 / SHA-256 / SHA-512 only — NOT SHA-224"
    weight: 3
    pass_when: |
      The agent's answer to question 3 names exactly
      the three covered algorithms (SHA-1, SHA-256,
      SHA-512), confirms they are one-shot via the
      EVP_Digest interface (per the shipped readme),
      AND tells the user explicitly that SHA-224 is
      NOT in the engine's covered set. The agent must
      explain what happens for SHA-224: without
      `-engine_impl`, OpenSSL silently falls back to
      its software SHA-224 path; with `-engine_impl`,
      the call fails. The agent must call out this
      asymmetry as a deployment concern (the user's
      pipeline must either tolerate SHA-224 going to
      the software path or refuse SHA-224 requests
      explicitly). A response that pretends the engine
      offloads SHA-224, OR that omits the asymmetry,
      fails.

  - id: "engine_load_invocation_verified_not_invented"
    label: "Cites the verified `openssl engine dynamic -pre LOAD` invocation; does NOT invent flags"
    weight: 3
    pass_when: |
      The agent's answer to question 4 cites the verified
      load invocation from the shipped readme:
      `openssl engine dynamic -pre NO_VCHECK:1 -pre
      SO_PATH:<path-to-libdoca_sha_offload_engine.so>
      -pre LOAD -vvv -t -c`. The agent must tell the
      user the expected output (engine name, `[SHA1,
      SHA256, SHA512]` available digests, the
      `set_pci_addr` ctrl-cmd) and what to do if any
      of those is missing. A response that invents
      flags like `--load-engine`, `--engine=doca-sha`,
      `-pre INIT`, OR that paraphrases the `-pre`
      mechanism without naming `SO_PATH` / `LOAD`,
      fails.

  - id: "prove_offload_with_sha224_negative_test"
    label: "Names the SHA-224 negative test (with `-engine_impl`) as the proof that offload actually engaged"
    weight: 3
    pass_when: |
      The agent's answer to question 5 explicitly names
      the SHA-224 negative test as the verification
      pattern: run `openssl dgst -sha224 -engine <path>
      -engine_impl <input>`, expect an error (per the
      shipped readme: `Error setting digest`), and the
      error PROVES OpenSSL actually consulted the
      engine. The agent must explain WHY a successful
      `openssl dgst -sha256` is NOT proof (OpenSSL
      falls back to software SHA silently when the
      engine is not loaded or not registered for that
      digest). The agent should also mention
      `-engine_impl` for the positive direction (it
      disables the software fallback so a successful
      hash proves the engine ran). A response that
      says "the openssl dgst succeeded so DOCA SHA
      ran", OR that omits `-engine_impl`, OR that
      invents a different verification mechanism,
      fails — that is the canonical silent-fallback
      failure mode this skill exists to prevent.

  - id: "programmatic_embedding_verbatim_block"
    label: "Cites the verified ENGINE_load_dynamic block verbatim; does NOT paraphrase the OpenSSL API"
    weight: 2
    pass_when: |
      The agent's answer to question 6 cites the verified
      load sequence from the shipped readme:
      `ENGINE_load_dynamic()` → `ENGINE_by_id(<path>)` →
      `ENGINE_ctrl_cmd_string(e, "set_pci_addr",
      <pci-addr>, 0)` → `ENGINE_init(e)` →
      `ENGINE_set_default_digests(e)`. The agent must
      pair it with the verified unload sequence
      (`ENGINE_unregister_digests` → `ENGINE_finish` →
      `ENGINE_free`). The function names must match the
      OpenSSL ENGINE API verbatim; paraphrasing
      function names (`ENGINE_start`, `engine_init`)
      fails — that is the canonical hallucination
      failure mode.

  - id: "pci_address_default_and_override"
    label: "Names the build-time default PCIe address (03:00.0) AND the run-time `set_pci_addr` override"
    weight: 2
    pass_when: |
      The agent's answer to question 7 names the verified
      build-time default PCIe address `03:00.0` (per the
      shipped source and the `test_cmdline_mode/readme.md`)
      AND the two override mechanisms: (a) edit the
      `-DDOCA_ENGINE_PCI_ADDR=` macro in
      `doca/tools/sha_offload_engine/meson.build` and
      re-build, OR (b) pass `set_pci_addr` at engine
      init time — `-pre "set_pci_addr:<bdf>"` on the
      CLI or `ENGINE_ctrl_cmd_string(e, "set_pci_addr",
      "<bdf>", 0)` programmatically. The agent must
      tell the user to verify the chosen PCIe address
      is a valid DOCA SHA device via `doca_caps
      --list-devs`. A response that omits one of the
      two override mechanisms, OR that invents a
      different ctrl-cmd name (e.g. `set_device`,
      `bind_pci`), fails.

  - id: "message_size_win_characterized_with_openssl_speed"
    label: "Characterizes the message-size window via openssl speed, mentions -async_jobs"
    weight: 2
    pass_when: |
      The agent's answer to question 8 (a) tells the
      user the engine offload adds a round-trip cost
      per digest that dominates at small messages and
      amortizes at large messages, (b) cites the
      `openssl speed -evp <alg> -bytes <N> -elapsed`
      pattern from the shipped readme as the way to
      measure it on the user's actual hardware, (c)
      names `-async_jobs <N>` as the perf-shaping knob
      and explains that it enables asynchronous engine
      batching — without it, the engine often loses to
      CPU SHA at small messages even when it would win
      with it. The agent must refuse to quote a
      crossover point from memory; the measurement
      has to be on the user's hardware. A response
      that quotes a specific crossover (e.g. "the
      engine wins above 16 KB") without grounding it
      in a measurement, OR that omits `-async_jobs`,
      fails.

  - id: "version_axes_doca_and_openssl"
    label: "Names BOTH version axes (DOCA + OpenSSL ≥ 1.1.1) and addresses OpenSSL 3.x"
    weight: 2
    pass_when: |
      The agent's answer to question 9 names BOTH
      version axes: (a) the DOCA-side version via
      `pkg-config --modversion doca-sha` (confirmed
      against `doca_caps --version`) and (b) the
      OpenSSL version via `openssl version` (the
      shipped readme requires OpenSSL ≥ 1.1.1; tested
      on OpenSSL 1.1.1f on Ubuntu 20.04 and OpenSSL
      3.0.2 on Ubuntu 22.04). The agent must tell the
      user that OpenSSL 3.x deprecates the ENGINE API
      in favor of PROVIDERS but still loads ENGINEs
      via the legacy code path — so the engine works
      on OpenSSL 3.x but is a forward-looking
      concern. The agent must route through
      doca-version for the four-way match rule. A
      response that names only one axis, OR that
      claims the engine does not work on OpenSSL 3.x,
      OR that invents a "DOCA SHA Provider" that does
      not exist, fails.

  - id: "generalizes_beyond_worked_pipeline_shape"
    label: "Generalizes from the worked pipeline shape (8 KB / 4 MB) to a DIFFERENT pipeline shape"
    weight: 3
    pass_when: |
      In response to question 10 the agent explicitly
      generalizes from the worked pipeline shape (8 KB
      / 4 MB mix with SHA-256 / SHA-512) to AT LEAST
      ONE OTHER pipeline shape (e.g. mostly 1 KB
      control headers, or mostly multi-GB file
      integrity), and identifies which parts STAY THE
      SAME (the engine load mechanics; the SHA-224
      verification test; the doca-sha vs engine
      selection rule; the build pattern; the two
      version axes; the `set_pci_addr` ctrl-cmd) vs
      which CHANGE (the engine vs CPU win shifts —
      small-message pipelines may not benefit at all
      and may be better served by doca-sha directly
      or by sticking with CPU SHA; large-message
      pipelines may not need `-async_jobs`; the
      pipeline's mix of SHA-224 / HMAC-SHA may force
      a re-think because the engine does not cover
      them). A response that walks only the worked
      shape and is silent on generalization fails —
      by AUTHORING.md § 1a, the bundle is teaching the
      CLASS, not the instance.
