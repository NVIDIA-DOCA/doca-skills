id: "79_no_docker_no_hardware_staged_roadmap"
name: "Reviewer prompt variant — no docker, no hardware, still expects staged roadmap"
description: |
  Adversarial reviewer-feedback variant. Removes the docker hint
  from prompt 78 so the agent cannot lean on "you already have
  docker" to skip Stage 1 framing. The user has nothing and asks
  abstractly. This pressure-tests whether the staged-roadmap
  mandate in AGENTS.md (Beginner-orientation staged-roadmap rule)
  fires even when the prompt doesn't pre-name a tooling path.

prompt: |
  I'm completely new to DOCA. I don't have any BlueField or
  ConnectX hardware right now, and I haven't installed anything yet.
  Where do I start?

context:
  audience: "beginner"
  intent: "orientation_no_tooling"
  prior_knowledge: "none; explicitly says no hardware, nothing installed"
  changed_skill_in_pr: "doca-setup"
  baseline_artifact: "doca-setup"

criteria:
  - id: "opens_with_staged_roadmap"
    label: "Opens with the Stage 1 vs Stage 2 staged roadmap"
    weight: 2
    pass_when: |
      The agent leads with the Stage 1 (container learning) vs
      Stage 2 (hardware runtime) roadmap from doca-setup/TASKS.md
      BEFORE any command. A response that jumps straight to a
      docker pull or a "first install DOCA" instruction without
      framing the two stages fails. THIS IS THE REVIEWER REGRESSION
      GUARD.

  - id: "stage1_no_hardware_path"
    label: "Stage 1 explicitly works without owning BlueField / ConnectX"
    weight: 1
    pass_when: |
      The agent makes it explicit that Stage 1 (container learning)
      can be done with no DOCA hardware at all — on a laptop, dev
      VM, or any x86 box that can run docker. A response that
      assumes the user must have hardware before they start fails.

  - id: "stage2_names_hardware_explicitly"
    label: "Stage 2 names BlueField DPU and / or ConnectX NIC as the hardware"
    weight: 1
    pass_when: |
      The agent names BlueField (DPU) and / or ConnectX (NIC) as
      the hardware the user will eventually need for Stage 2 — not
      just "a NVIDIA NIC" or "DOCA-capable device". A response
      that stays abstract about the hardware fails.

  - id: "ngc_tag_selection_rule"
    label: "Cites the NGC tag selection rule (no guessing) or defers the choice"
    weight: 1
    pass_when: |
      When the agent mentions the NGC DOCA container, it either
      (a) cites the deterministic NGC tag selection rule from
      doca-setup/TASKS.md (or README.md), (b) tells the user to
      copy the current tag from the NGC catalog page, or (c)
      defers to ask the user which DOCA version they want. A
      response that hardcodes a specific tag with no provenance
      fails.

  - id: "cites_docs_url"
    label: "Cites at least one docs.nvidia.com URL for further reading"
    weight: 1
    pass_when: |
      The agent gives at least one full docs.nvidia.com/doca/sdk/
      URL the user can read next. A response that lists no
      authoritative URL fails.

  - id: "no_invented_versions"
    label: "Does not assert a specific DOCA version without provenance"
    weight: 1
    pass_when: |
      The agent does not assert a specific DOCA version number
      ("DOCA 3.3.0", "the latest is 3.4", etc.) without either
      a verification command (pkg-config --modversion doca-common,
      doca_caps --version) OR a "check the NGC catalog page"
      pointer. Same anti-hallucination criterion as prompt 01.
