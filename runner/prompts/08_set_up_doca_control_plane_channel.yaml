id: "08_set_up_doca_control_plane_channel"
name: "Set up a DOCA control-plane channel — class-shaped"
description: |
  Class-shaped control-plane channel prompt. The HEADLINE is the
  class ("set up a DOCA channel for control-plane messaging between
  two coordinated processes"); the worked example is DOCA Comch
  (host process ↔ DPU process), because that is the newly-covered
  library in skills/libs/doca-comch.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to set
  up ANY DOCA channel-style library context (Comch, RDMA, Eth — each
  has its own role-split and capability-discovery shape). The bundle
  proves this by asking the agent to walk: env preconditions FIRST,
  role split, capability discovery, path selection, lifecycle order,
  smoke test. The same SHAPE applies to every channel-style DOCA
  library context; the per-library details differ.

  A baseline agent without skills typically: invents a doca_comch_*
  API surface from generic socket / IPC knowledge, conflates the
  slow-path (send-task) with the fast-path (producer / consumer),
  recommends a code change for what is actually a representor
  visibility problem, and silently assumes the legacy
  doca-comm-channel module name on installs ≥ 2.5.

prompt: |
  I have a host with a BlueField-3 DPU and DOCA installed. I want
  to set up a DOCA Comch channel between a host-side process and a
  DPU-side agent so they can exchange small control messages
  (under 4 KiB each, a few times per second). Down the road I may
  add a bulk-data path for streaming larger payloads, but the
  control-plane is the priority right now.

  Walk me through the setup: which side runs as server and which
  as client, what I have to check BEFORE writing any code, which
  capability queries I have to run against the active doca_devinfo,
  the lifecycle order I have to follow, the connection-state
  callback rule for when I can start submitting messages, and what
  I should smoke-test first to prove the channel is up before I
  add real protocol logic.

  After that, briefly tell me which parts of your answer would
  change if I later want to add the bulk-data fast-path on the same
  channel (producer / consumer), and which parts would change for
  a DIFFERENT DOCA channel-style library (e.g. DOCA RDMA for
  one-sided data movement, or DOCA Eth for raw Ethernet frames).

context:
  audience: "intermediate"
  intent: "configure_library_context"
  prior_knowledge: "knows what a DPU is, has a BlueField-3 plus host, knows what a control-plane channel is conceptually but not the DOCA Comch API"
  baseline_artifact: "doca-comch"
  changed_skill_in_pr: "libs/doca-comch"
  expected_skill_co_load:
    - "doca-comch"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "env_preconditions_first"
    label: "Verifies representor / PCIe visibility BEFORE writing any code"
    weight: 2
    pass_when: |
      The agent says the FIRST step is to confirm the env-side
      preconditions: that the DPU side can see the host
      representor (`ls /sys/class/net/`) and that the host side can
      see the BlueField PCIe address (`lspci | grep Mellanox`), and
      states that a missing representor / PCIe address is an env
      problem to fix via doca-setup, NOT a code problem to fix in
      the Comch program. A response that jumps to doca_comch_*
      calls without naming the env-side check first fails.

  - id: "role_split_correct"
    label: "Names the DPU=server / host=client asymmetric role split"
    weight: 2
    pass_when: |
      The agent explicitly states that DOCA Comch is asymmetric:
      server runs on the DPU (Arm) side, client runs on the host
      (x86 / Arm) side, and there is no symmetric peer-to-peer
      mode. A response that suggests "either side can be server",
      that proposes a peer-to-peer Comch design, or that confuses
      which side is which, fails.

  - id: "capability_query_rule"
    label: "Calls out doca_comch_cap_get_* before assuming sizes / features"
    weight: 2
    pass_when: |
      The agent says the user MUST query
      doca_comch_cap_get_max_msg_size against the active
      doca_devinfo before assuming a message size is supported,
      and (for the fast-path follow-up) MUST query
      doca_comch_cap_consumer_is_supported / _producer_is_supported
      before assuming the fast-path is on the device. A response
      that quotes a numeric msg-size limit from memory, or that
      asserts the fast-path is available without naming the cap
      query, fails.

  - id: "connection_callback_before_submit"
    label: "Connection callback must fire CONNECTED before any submit"
    weight: 2
    pass_when: |
      The agent states that submitting a send-task before the
      connection callback reports CONNECTED returns
      DOCA_ERROR_BAD_STATE, and that the connection callback must
      be registered BEFORE doca_comch_*_create (callbacks
      registered after _create are silently ignored). A response
      that walks straight from doca_ctx_start() to send-task
      submission without naming the connection-state gate fails.

  - id: "slow_vs_fast_path_explicit"
    label: "Explicitly picks slow-path for control plane; fast-path for bulk"
    weight: 2
    pass_when: |
      The agent picks the slow-path (send-task / recv-callback) for
      the control-plane case in the prompt (small messages, low
      rate), and tells the user the fast-path (producer / consumer)
      is the right shape only when bulk-data is added later. A
      response that recommends the fast-path producer / consumer
      for the small-control-message use case, or that fails to
      distinguish the two paths, fails.

  - id: "smoke_test_before_protocol"
    label: "Single-message smoke before protocol logic"
    weight: 1
    pass_when: |
      The agent recommends one slow-path send-task with a small
      payload as the FIRST functional test (verify the recv
      callback fires on the peer with the expected payload),
      before adding any real protocol logic. A response that
      jumps to "now design your protocol" without an explicit
      single-message smoke fails.

  - id: "version_overlay_named"
    label: "Names the 2.5 rename overlay (Comm Channel → Comch)"
    weight: 1
    pass_when: |
      The agent surfaces that the library was renamed in DOCA 2.5
      (DOCA Comm Channel → DOCA Comch; pkg-config module
      doca-comm-channel → doca-comch; URL slug doca-comm-channel →
      DOCA-Comch), and quotes the user's installed version per
      pkg-config --modversion doca-comch before picking which name
      / URL to use. A response that silently assumes one name
      without checking, or that points at the legacy URL on an
      install ≥ 2.5, fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_comch_* API symbols"
    weight: 1
    pass_when: |
      Every doca_comch_* (or doca_ctx_*, doca_pe_*) symbol the
      agent mentions is one that actually exists in the public
      DOCA Comch surface (or it is explicitly framed as pseudocode
      / sketch). A response that invents API names like
      doca_comch_easy_init() or doca_comch_quick_send() fails —
      that is the baseline-agent hallucination failure mode the
      bundle exists to prevent.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from Comch to other DOCA channel-style libraries"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names at least ONE OTHER DOCA channel-style
      library (RDMA, Eth, GPUNetIO, …) and identifies which parts
      of the setup stay the same (env preconditions first,
      role-aware lifecycle, capability-query rule against
      doca_devinfo, mandatory-before-start configuration, smoke
      before stress) versus which change (transport semantics per
      library, role names per library, connection methods per
      library, permission shape per library). A response that
      walks only Comch and is silent on generalization fails this
      criterion.
