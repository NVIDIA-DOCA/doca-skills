id: "11_wire_doca_into_gpu_compute"
name: "Wire a DOCA library into CUDA / GPU device code — class-shaped"
description: |
  Class-shaped prompt for wiring a DOCA library into non-CPU
  compute. The HEADLINE is the class ("wire a DOCA library into
  CUDA / GPU device code so the data plane runs on the GPU instead
  of round-tripping through the host CPU"); the worked example is
  DOCA GPUNetIO (CUDA persistent kernel reads packets directly
  from a `doca_gpu_eth_rxq` layered on a `doca_eth_rxq`), because
  that is the newly-covered library in skills/libs/doca-gpunetio.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  wire ANY DOCA library into a non-CPU compute target (GPUNetIO
  → CUDA on an NVIDIA GPU; DPA → DPA-side kernels on the
  BlueField data-path accelerator). The bundle proves this by
  asking the agent to walk: env preconditions FIRST, paired
  upstream library setup (doca-eth for GPUNetIO), dual-axis
  capability discovery, the persistent-kernel pattern as the
  default usage shape (not kernel-per-packet), single-packet
  smoke before scaling. The same SHAPE applies to every
  non-CPU-compute DOCA integration; the per-target details
  differ (target processor, allocation primitives, persistent-
  kernel vs DPA-kernel pattern).

  A baseline agent without skills typically: invents doca_gpu_*
  API surface from generic CUDA + networking knowledge, proposes
  launching one CUDA kernel per packet (the canonical GPUNetIO
  anti-pattern), forgets to verify nvidia_peermem is loaded,
  conflates the DOCA cap-query axis with the CUDA device-
  capability axis (or only checks one), and silently assumes
  CUDA + DOCA versions are compatible without consulting the
  DOCA Compatibility Policy.

prompt: |
  I have a host with one NVIDIA Ampere GPU, a ConnectX NIC, and
  DOCA already installed. I want a CUDA kernel running on the
  GPU to read packets directly off the NIC — without round-trips
  through the host CPU — and count them per-flow. Down the road
  I may add a TX path to push results back out, but RX-only on
  one GPU is the priority right now.

  Walk me through the setup: what I have to check BEFORE writing
  any CUDA or DOCA code (env preconditions on both the CUDA side
  and the DOCA side), which DOCA library I configure first
  (because GPUNetIO is layered on top of something), the
  capability queries I have to run against the active
  doca_devinfo AND against the CUDA device, the lifecycle order
  I have to follow when creating the per-GPU context and the
  GPU-visible queue handle, the canonical CUDA-kernel pattern
  to use (and the anti-pattern to avoid), what I should
  smoke-test FIRST from the GPU side before scaling to a
  persistent burst loop, and how I would terminate the kernel
  cleanly.

  After that, briefly tell me which parts of your answer would
  change if I later wanted to wire a DOCA library into a
  DIFFERENT non-CPU compute target — for example DOCA DPA for
  DPA-side primitives on the BlueField data-path accelerator —
  and which parts of the workflow stay the same.

context:
  audience: "intermediate"
  intent: "wire_doca_into_non_cpu_compute"
  prior_knowledge: "knows CUDA at the cuda C++ kernel level, has DOCA installed and the CUDA toolkit installed, knows what a representor is, has not used GPUNetIO before"
  baseline_artifact: "doca-gpunetio"
  changed_skill_in_pr: "libs/doca-gpunetio"
  expected_skill_co_load:
    - "doca-gpunetio"
    - "doca-eth"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "env_preconditions_first"
    label: "Verifies CUDA toolkit + DOCA match, nvidia_peermem, CUDA device enumerable BEFORE writing code"
    weight: 2
    pass_when: |
      The agent says the FIRST step is to confirm the env-side
      preconditions on BOTH the CUDA side and the DOCA side:
      that nvcc --version returns a CUDA toolkit version
      compatible with the installed DOCA release per the DOCA
      Compatibility Policy, that lsmod | grep nvidia_peermem
      shows the module loaded (or `sudo modprobe nvidia_peermem`
      to load it), that nvidia-smi -L enumerates the candidate
      GPU, and that pkg-config --modversion doca-gpunetio agrees
      with doca_caps --version. The agent states that a
      mismatch on any of these is an env / version problem to
      fix via doca-setup + doca-version, NOT a code problem to
      fix in the GPUNetIO program. A response that jumps to
      doca_gpu_* calls without naming the env-side check first
      fails.

  - id: "doca_eth_dependency_named"
    label: "Surfaces doca-eth as the mandatory upstream library; configures it first"
    weight: 2
    pass_when: |
      The agent explicitly states that DOCA GPUNetIO is LAYERED
      ON TOP of DOCA Ethernet: the user must have a configured
      doca_eth_rxq (and doca_eth_txq if TX is in scope) BEFORE
      any doca_gpu_* call. The GPU-visible handles
      (doca_gpu_eth_rxq / doca_gpu_eth_txq) are exposed-to-GPU
      handles on the underlying doca-eth queues, not standalone
      queues. A response that proposes "create a GPU queue
      first and the Ethernet queue follows from it", that
      conflates GPUNetIO with doca-eth, or that omits the
      doca-eth dependency entirely fails.

  - id: "dual_capability_axis"
    label: "Names BOTH the DOCA cap-query axis AND the CUDA device-capability axis"
    weight: 2
    pass_when: |
      The agent says the user MUST run BOTH a DOCA-side
      capability query (doca_gpu_eth_rxq_cap_is_supported, or
      the matching txq cap-query, against the active
      doca_devinfo) AND a CUDA-side device-capability query
      (cudaGetDeviceProperties against the candidate CUDA
      device ordinal) before assuming GPUNetIO works on the
      user's GPU. The agent states that either axis being
      "not supported" fails the feature, and that an older
      non-Ampere GPU or missing nvidia_peermem can flip the
      CUDA-side axis even if DOCA is happy. A response that
      quotes only one axis (DOCA cap-query only, or CUDA
      device-props only) fails this criterion.

  - id: "persistent_kernel_pattern_default"
    label: "Recommends the persistent-kernel pattern as the default; calls out kernel-per-packet as the anti-pattern"
    weight: 2
    pass_when: |
      The agent picks the persistent-kernel pattern (one
      long-running CUDA kernel that polls the GPU-visible RX
      queue in a loop and processes packets in-place on the
      GPU) as the canonical first-app shape, AND explicitly
      names launching one CUDA kernel per packet as the
      anti-pattern that defeats the entire reason to use
      GPUNetIO (kernel-launch overhead per packet swamps the
      network savings). A response that recommends launching a
      CUDA kernel per packet, or that fails to distinguish the
      persistent-kernel pattern from kernel-per-packet, fails.

  - id: "smoke_before_scale"
    label: "Single-packet smoke from the GPU side before persistent burst loop"
    weight: 1
    pass_when: |
      The agent recommends that the user send ONE packet from a
      peer and confirm the persistent kernel observes one RX
      completion as the FIRST functional test, BEFORE scaling
      to a 1000-packet burst loop or adding TX. A response
      that jumps straight to a high-throughput burst loop, or
      that fails to name the single-packet smoke as the first
      step, fails.

  - id: "version_overlay_named"
    label: "Surfaces the DOCA-must-match-CUDA overlay per the DOCA Compatibility Policy"
    weight: 1
    pass_when: |
      The agent surfaces that the CUDA toolkit version on the
      host AND the DOCA release must match per the DOCA
      Compatibility Policy (https://docs.nvidia.com/doca/sdk/doca-compatibility-policy/index.html),
      and that mismatched combos fail at link time or runtime
      with DOCA_ERROR_DRIVER from doca_gpu_create. The agent
      quotes both nvcc --version and pkg-config --modversion
      doca-gpunetio against the Compatibility Policy before
      bringing up the per-GPU context. A response that
      silently assumes the two are compatible without
      consulting the policy fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_gpu_* / doca_gpunetio_* API symbols beyond the public surface"
    weight: 1
    pass_when: |
      Every doca_gpu_* / doca_gpunetio_* (or doca_ctx_*,
      doca_pe_*, cuda*) symbol the agent mentions is one that
      actually exists in the public DOCA GPUNetIO surface
      (doca_gpu, doca_gpu_eth_rxq, doca_gpu_eth_txq,
      doca_gpu_eth_rxq_cap_is_supported, doca_buf_arr_create_*,
      cudaGetDeviceProperties, cudaSetDevice, cudaMalloc) or
      it is explicitly framed as pseudocode / sketch. A
      response that invents API names like
      doca_gpu_easy_init(), doca_gpunetio_quick_recv(), or
      doca_gpu_kernel_launch() fails — that is the
      baseline-agent hallucination failure mode the bundle
      exists to prevent.

  - id: "termination_signal_named"
    label: "Names the host-side termination flag the persistent kernel polls"
    weight: 1
    pass_when: |
      The agent surfaces that the persistent CUDA kernel needs
      an explicit termination signal (a host-side flag in
      device memory the kernel polls in its main loop) so that
      doca_ctx_stop and program shutdown do not block forever.
      A response that walks the persistent-kernel pattern
      without naming the termination signal, or that proposes
      killing the host process to stop the kernel, fails.

  - id: "generalizes_to_dpa"
    label: "Generalizes from GPUNetIO+CUDA to a second non-CPU compute integration (DPA)"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names DOCA DPA (DPA-side primitives on the
      BlueField data-path accelerator) as another DOCA library
      that integrates with non-CPU compute, AND identifies
      which parts of the workflow STAY THE SAME (env
      preconditions first, paired upstream library setup, the
      DOCA lifecycle ordering, the cap-query rule against
      doca_devinfo, the smoke-before-scale rule) versus which
      parts CHANGE (the target processor — GPU vs DPA; the
      allocation primitives — cudaMalloc for GPUNetIO vs the
      DPA-side allocator for DPA; the in-target persistent
      pattern — CUDA persistent kernel for GPUNetIO vs a
      DPA-side kernel for DPA; the kernel module dependency —
      nvidia_peermem for GPUNetIO is replaced by the DPA
      driver dependency). A response that walks only GPUNetIO
      and is silent on generalization, or that names a
      different library (e.g. RDMA, Comch) that does NOT
      integrate with non-CPU compute, fails this criterion.
