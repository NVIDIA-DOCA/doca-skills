id: "12_offload_cryptographic_op_to_doca_accelerator"
name: "Offload a cryptographic operation to a DOCA hardware accelerator — class-shaped"
description: |
  Class-shaped crypto-accelerator-offload prompt. The HEADLINE is
  the class ("offload a cryptographic operation to a DOCA hardware
  accelerator and validate it before bulk submission"); the worked
  example is DOCA SHA (hardware-accelerated SHA-256 hashing of a
  1 MiB file with mention of the partial-hash path for inputs
  larger than max_src_buf_size), because that is the newly-covered
  library in skills/libs/doca-sha.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  offload ANY DOCA-accelerated operation (SHA, AES-GCM, Compress,
  DMA, …), not just SHA. The bundle proves this by asking the
  agent to walk: env-side preconditions, the cap-query rule against
  the active doca_devinfo, the DOCA Core lifecycle, the
  source/destination mmap permission pair, the
  validate-against-known-vector smoke before bulk, and the
  one-shot-vs-incremental decision. The same SHAPE applies to
  every DOCA accelerator library; the per-library details differ.

  A baseline agent without skills typically: invents a doca_sha_*
  API surface from generic OpenSSL knowledge, hardcodes a digest
  size from memory instead of querying doca_sha_cap_get_min_dst_buf_size,
  recommends doca-sha for a tiny one-shot hash where CPU is
  faster, conflates one-shot and partial-hash task names, and
  skips the "hash a published test vector first" smoke before
  bulk input.

prompt: |
  I have a host with a BlueField-3 DPU and DOCA installed. I want
  to SHA-256 a 1 MiB file using DOCA SHA (the hardware
  accelerator), as a file-integrity check, and I want to do it
  correctly the first time.

  Walk me through the setup: what I should check on the host
  BEFORE writing any code, which capability queries I have to run
  against the active doca_devinfo before assuming SHA-256 is
  supported and before sizing the source / destination buffers,
  the lifecycle order I have to follow to bring the SHA context
  up, the source / destination mmap permission pair I have to
  set, what I should smoke-test FIRST to prove the digest is
  correct before I hash the real file, and what changes if my
  file is larger than the device's max source buffer size
  (i.e. I have to use the partial / incremental task instead of
  the one-shot task).

  After that, briefly tell me which parts of your answer would
  change for a DIFFERENT DOCA accelerator library (e.g. DOCA DMA
  for host ↔ DPU memory copy, DOCA AES-GCM for authenticated
  encryption, DOCA Compress for hardware-accelerated compression),
  and which parts are the same.

context:
  audience: "intermediate"
  intent: "offload_cryptographic_operation"
  prior_knowledge: "knows what a DPU is, has a BlueField-3 plus host, knows what SHA-256 is conceptually but not the DOCA SHA API"
  baseline_artifact: "doca-sha"
  changed_skill_in_pr: "libs/doca-sha"
  expected_skill_co_load:
    - "doca-sha"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "env_preconditions_first"
    label: "Verifies DOCA install + devinfo enumerable BEFORE writing any code"
    weight: 1
    pass_when: |
      The agent says the FIRST step is to confirm the env-side
      preconditions: that DOCA is installed (e.g.
      `pkg-config --modversion doca-sha` resolves), that the
      doca-sha.pc plus doca-common.pc plus doca_caps --version all
      agree (four-way match via doca-version), and that the
      target device is enumerable as a doca_devinfo (e.g.
      `doca_caps --list-devs`). A response that jumps to
      doca_sha_* calls without naming these env-side checks first
      fails.

  - id: "capability_query_rule"
    label: "Calls out doca_sha_cap_* before assuming algorithm + buffer sizes"
    weight: 2
    pass_when: |
      The agent says the user MUST call
      doca_sha_cap_task_hash_get_supported(devinfo,
      DOCA_SHA_ALGORITHM_SHA256) before assuming SHA-256 is in the
      device's accelerator (this single call folds both the
      task-supported and algorithm-supported axes; the public
      header does not ship a separate _cap_is_algorithm_supported
      symbol), MUST call
      doca_sha_cap_get_min_dst_buf_size(devinfo,
      DOCA_SHA_ALGORITHM_SHA256) to size the destination buffer,
      and MUST call doca_sha_cap_get_max_src_buf_size(devinfo) to
      decide whether the input fits in a one-shot task. A response
      that quotes a digest size (32 bytes for SHA-256) or a max
      input size from memory without naming the cap query, or that
      asserts SHA-256 is universally available without checking,
      fails.

  - id: "lifecycle_order_correct"
    label: "Walks the DOCA Core context lifecycle in the right order"
    weight: 2
    pass_when: |
      The agent names the lifecycle order create → configure
      (doca_sha_task_hash_set_conf + set source / destination mmap
      permissions) → start → submit task → progress PE → stop →
      destroy, and explicitly states that
      doca_sha_task_hash_set_conf MUST happen before
      doca_ctx_start(). A response that jumps to task submission
      without naming the lifecycle, or that puts task config after
      start, fails.

  - id: "mmap_permission_pair_correct"
    label: "States the source / destination mmap permission pair correctly"
    weight: 2
    pass_when: |
      The agent correctly states that the source (input) mmap
      needs DOCA_ACCESS_FLAG_LOCAL_READ_ONLY at minimum and the
      destination (digest) mmap needs
      DOCA_ACCESS_FLAG_LOCAL_READ_WRITE, and that BOTH must be set
      via doca_mmap_set_permissions before the first task is
      submitted. A response that conflates the two buffers'
      permissions, makes the source read-write "for simplicity"
      without flagging it as over-broad, or omits the destination
      read-write requirement, fails.

  - id: "known_vector_smoke_before_bulk"
    label: "Recommends a published test-vector smoke before bulk input"
    weight: 2
    pass_when: |
      The agent recommends hashing a small published test vector
      (e.g. the empty string, "abc", or the million-`a` input
      from the NIST SHA test vectors) and comparing the
      accelerator's digest byte-for-byte against the published
      digest, BEFORE hashing the user's 1 MiB file. A response
      that jumps straight to bulk hashing without naming a
      known-vector smoke fails.

  - id: "one_shot_vs_partial_hash_explicit"
    label: "Names the one-shot vs partial / incremental task split"
    weight: 2
    pass_when: |
      The agent picks the one-shot task (doca_sha_task_hash) for
      the 1 MiB file case (since 1 MiB is normally well below the
      device's max_src_buf_size), and explicitly tells the user
      that doca_sha_task_partial_hash is the right shape when the
      input is larger than doca_sha_cap_get_max_src_buf_size OR
      when the input arrives in chunks. A response that
      recommends partial_hash for the 1 MiB case without checking
      the device's max source buffer size, or that fails to
      distinguish the two tasks, fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_sha_* API symbols or algorithm names"
    weight: 1
    pass_when: |
      Every doca_sha_* (or doca_ctx_*, doca_pe_*, doca_mmap_*)
      symbol the agent mentions is one that actually exists in
      the public DOCA SHA surface (or it is explicitly framed as
      pseudocode / sketch), and the algorithm enums the agent
      names are limited to DOCA_SHA_ALGORITHM_SHA1,
      DOCA_SHA_ALGORITHM_SHA256, DOCA_SHA_ALGORITHM_SHA512 unless
      the cap query is invoked to discover others. A response
      that invents API names like doca_sha_hash_easy(),
      doca_sha_quick_init(), or that names algorithms outside the
      public enum (MD5, SHA-3, Keccak, Blake) without first
      naming the cap-query gate, fails — that is the
      baseline-agent hallucination failure mode the bundle exists
      to prevent.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from SHA to other DOCA accelerator libraries"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names at least ONE OTHER DOCA accelerator
      library (DOCA DMA, DOCA AES-GCM, DOCA Compress, …) and
      identifies which parts of the workflow stay the same (DOCA
      Core lifecycle order, capability-query rule against
      doca_devinfo, source / destination mmap permission
      discipline, smoke-with-a-known-vector before bulk
      submission) versus which change (the task type name per
      library, the capability-query function name per library,
      the permission semantics per library, the
      algorithm-enum-vs-no-enum distinction per library). A
      response that walks only SHA and is silent on
      generalization fails this criterion.
