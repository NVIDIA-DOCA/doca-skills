id: "89_verify_recommended_change_for_doca_comm_channel_admin"
name: "Verify a recommended change to comm channel admin (tool)"
description: |
  Per-artifact verification-axis smoke prompt for the tools/doca-comm-channel-admin skill,
  auto-generated by /tmp/gen_verify_prompts.py to push per-artifact prompt
  coverage from 1 -> 2 for the May-2026 reviewer-feedback wave. The
  variant-C bundle must route the agent through tools/doca-comm-channel-admin/SKILL.md ->
  CAPABILITIES.md -> TASKS.md AND emit the universal verification
  contract from AGENTS.md ## The universal verification contract
  (5 steps: env precondition, cap query, smoke before bulk, contract
  surface, observability). The variant-A baseline typically skips the
  contract entirely and emits unverified function names or pkg-config
  invocations -- which is the failure mode this prompt is designed to
  expose at scale, per-artifact.

prompt: |
  I have a working setup using the DOCA comm channel admin tool. A teammate
  recommended a change to my code -- they say it will make my use of
  comm channel admin faster / safer / more correct. Before I apply the change to
  production, walk me through how to verify their recommendation is
  actually right for my install and my hardware. Be specific to
  comm channel admin, do not give me a generic answer.

context:
  audience: "intermediate"
  intent: "verify_recommended_change"
  prior_knowledge: "already has a working DOCA comm channel admin setup"
  changed_skill_in_pr: "doca-comm-channel-admin"
  baseline_artifact: "doca-comm-channel-admin"

criteria:
  - id: "cites_universal_verification_contract"
    label: "Cites the universal verification contract from AGENTS.md (5 steps)"
    weight: 2
    pass_when: |
      The agent applies the 5-step universal verification contract from
      AGENTS.md ## The universal verification contract: env precondition,
      capability query, smoke before bulk, contract surface, observability.
      A response that gives only one or two of the five steps fails.

  - id: "routes_through_doca_comm_channel_admin_skill"
    label: "Routes through the doca-comm-channel-admin skill dir, not generic DOCA prose"
    weight: 1
    pass_when: |
      The agent names tools/doca-comm-channel-admin/SKILL.md (or CAPABILITIES.md / TASKS.md)
      as where it is pulling the workflow from, and the workflow it cites
      matches what the doca-comm-channel-admin skill actually documents. Generic
      "use pkg-config and run a smoke test" answers that could have been
      written without the doca-comm-channel-admin skill fail.

  - id: "calls_capability_query_for_doca_comm_channel_admin"
    label: "Issues a capability query specific to comm channel admin before recommending the change"
    weight: 1
    pass_when: |
      The agent runs a doca-comm-channel-admin-specific capability query (doca_caps,
      doca_<lib>_cap_*, doca_*_get_supported_*, etc.) against the live
      device before claiming the recommendation is safe to apply. A
      response that asserts the change is correct without a cap query
      fails.

  - id: "smoke_before_bulk_for_doca_comm_channel_admin"
    label: "Smokes the change on the smallest possible scope before scaling"
    weight: 1
    pass_when: |
      The agent recommends running the change against a single
      representor / single queue / single pipe / single resource of the
      smallest legal comm channel admin unit-of-damage first, observing the result,
      and only then widening scope. A response that recommends applying
      the change to the full production scope in one shot fails.

  - id: "no_invented_doca_comm_channel_admin_symbols"
    label: "Does not invent comm channel admin function names or pkg-config invocations"
    weight: 1
    pass_when: |
      The agent's response does NOT contain any doca-comm-channel-admin-related symbol
      (function name, struct, enum, pkg-config module, link flag) that
      is not actually shipped by the doca-comm-channel-admin library. A response that
      emits, e.g., a `doca_doca_comm_channel_admin_easy_init()` or
      `-ldoca-comm-channel-admin-common` invented for the answer fails.
