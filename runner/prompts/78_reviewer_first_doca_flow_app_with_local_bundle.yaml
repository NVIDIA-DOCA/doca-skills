id: "78_reviewer_first_doca_flow_app_with_local_bundle"
name: "Reviewer prompt — new DOCA user, follow local doca-skills bundle"
description: |
  EXTERNAL REVIEWER PROMPT. Verbatim wording the May-2026
  bundle reviewer used to stress-test agent consumption of the
  doca-skills bundle. The reviewer's key feedback was that the
  agent answered correctly but was "too command-first" and should
  open with a staged roadmap (Stage 1 container learning vs Stage 2
  hardware runtime) before any command, plus a deterministic rule
  for picking an NGC tag without guessing.

  This prompt is the regression guard for that feedback: any future
  bundle change that lets the agent skip the staged roadmap, skip
  the NGC tag selection rule, or fall back to the old
  command-first answer shape MUST fail this prompt.

prompt: |
  I am new to DOCA. Guide me to my first DOCA Flow app but follow
  the local doca-skills bundle.

context:
  audience: "beginner"
  intent: "first_app_with_bundle_routing"
  prior_knowledge: "none; explicitly says they want the bundle to drive the answer"
  changed_skill_in_pr: "doca-setup"
  baseline_artifact: "doca-flow"

criteria:
  - id: "opens_with_staged_roadmap"
    label: "Opens with the Stage 1 (container learning) vs Stage 2 (hardware runtime) roadmap"
    weight: 2
    pass_when: |
      The agent leads with the staged roadmap from
      skills/doca-setup/TASKS.md (Stage 1 vs Stage 2) BEFORE issuing
      any docker / pkg-config / build command. A response that
      jumps straight to "docker pull nvcr.io/nvidia/doca/doca" with
      no staged-roadmap framing fails. THIS IS THE HEADLINE
      REVIEWER REGRESSION GUARD.

  - id: "names_both_stages"
    label: "Names both Stage 1 (container) and Stage 2 (BlueField / ConnectX) explicitly"
    weight: 1
    pass_when: |
      The agent's roadmap explicitly contrasts Stage 1 = NGC DOCA
      container on a laptop / dev VM (no hardware) with Stage 2 =
      real BlueField DPU or ConnectX NIC needed for runtime
      packet-processing. A roadmap that lists only one of the two
      stages fails.

  - id: "ngc_tag_selection_rule"
    label: "Cites the deterministic NGC tag selection rule (no guessing)"
    weight: 1
    pass_when: |
      The agent points to the "How to pick an NGC tag without
      guessing" rule from skills/doca-setup/TASKS.md (or README.md)
      and tells the user to either (a) browse the NGC catalog page
      to copy the current tag, (b) ask the user which tag they
      have, or (c) use a tag the bundle has actually verified. A
      response that hardcodes a tag like "use 3.3.0" without
      pointing at the rule fails.

  - id: "routes_to_real_sample"
    label: "Routes to a real shipped sample, does not scaffold from prose"
    weight: 2
    pass_when: |
      Once the agent transitions to the "build my first DOCA Flow
      app" part of the answer, it points to /opt/mellanox/doca/samples/
      inside the container and tells the user to start from a
      sample that actually ships in NGC. A response that emits a
      fresh main.c / Dockerfile / Makefile from documentation prose
      fails — this is the same anti-hallucination criterion as
      prompt 02.

  - id: "names_resume_point_inside_container"
    label: "Names the resume point inside the Stage-1 container (reviewer feedback)"
    weight: 1
    pass_when: |
      The agent tells the user, in concrete terms, what to do
      *after* `docker run -it` lands them inside the NGC DOCA
      container — at minimum a "paste back the output of
      pkg-config --modversion doca-<library> and ls
      /opt/mellanox/doca/samples/<library>/<sample>/" hand-off, OR
      an explicit "I resume from doca-programming-guide ## modify
      step 1 with the real install in hand" promise. A response
      that hands the user a docker run command and then stops
      ("now you're inside the container — good luck") fails this
      criterion. This is the reviewer's specific feedback that
      "Stage 1 needs a clear resume point once the user is
      inside the container."

  - id: "respects_local_bundle_routing"
    label: "Explicitly attributes its answer shape to the local doca-skills bundle"
    weight: 1
    pass_when: |
      The agent acknowledges the user's "follow the local doca-skills
      bundle" instruction, names the actual bundle skills it is
      routing through (doca-setup, doca-programming-guide, doca-flow,
      doca-public-knowledge-map), and does not invent a parallel set
      of skill names. A response that ignores the routing
      instruction and answers as if the bundle did not exist fails.

  - id: "no_invented_symbols"
    label: "Does not emit unverified DOCA function names or library names"
    weight: 1
    pass_when: |
      The agent's response does NOT contain any of these unverified
      patterns: doca_version(), -ldoca_common, #include <doca.h>,
      pkg-config doca-<X> for X that is not actually shipped. Same
      anti-hallucination criterion as prompt 02.
