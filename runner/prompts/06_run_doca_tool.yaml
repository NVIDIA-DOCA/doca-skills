id: "06_run_doca_tool"
name: "Run a DOCA tool to verify a capability \u2014 class-shaped"
description: |
  Class-shaped tool-invocation prompt. The HEADLINE is the class
  ("use a DOCA tool to verify a capability on this device"); the
  worked example is doca_caps, because that is the DOCA tool
  currently covered by skills/tools/doca-caps in the bundle.

  Per AUTHORING.md \u00a7 1a, the bundle MUST teach the agent how to
  reach for the right DOCA tool for ANY hardware-capability question,
  not just hand back a doca_caps invocation. The bundle proves this
  by asking the agent to (a) identify which tool answers the
  question, (b) cite the canonical invocation, (c) explain what to
  look for in the output, (d) name the next tool to reach for if
  doca_caps is silent on the asked capability. The same shape
  applies to doca-bench, doca-pcc-counters, doca-flow-tune,
  doca-comm-channel-admin, etc.

  A baseline agent without skills typically: invents a flag like
  `doca_caps --check-rdma`, guesses output formats, or recommends
  reading source code instead of running a public tool.

prompt: |
  I have a BlueField-3 in a server I just got hands-on. Before I
  start building a DOCA Flow program, I want to confirm that the
  hardware actually supports the offload capabilities I need (Flow
  hardware steering, RDMA, GPUNetIO). Which DOCA tool should I run,
  what command, and what should the output tell me?

  After answering for that capability check, name ONE OTHER thing I
  might want to ask the hardware about (for example: PCC counter
  exposure, port speeds, or whether SR-IOV is enabled) and tell me
  which DOCA tool would answer that, even if you do not give the
  full command for it.

context:
  audience: "intermediate"
  intent: "verify_capability"
  prior_knowledge: "fresh BlueField-3, DOCA installed, no app yet"
  # Class-shaped probe targeting the doca-caps skill, but the
  # `generalizes_beyond_worked_example` criterion below requires the
  # answer to also gesture at the broader DOCA tools catalog.
  baseline_artifact: "doca-caps"
  changed_skill_in_pr: null
  expected_skill_co_load:
    - "doca-caps"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "names_the_tool"
    label: "Names doca_caps as the right tool, before any command"
    weight: 1
    pass_when: |
      The agent names doca_caps (the DOCA Capabilities Print Tool)
      as the tool that answers "what does this device support?". A
      response that invents a wrapper script, recommends reading
      header files, or jumps straight to a doca_flow program fails.

  - id: "canonical_invocation"
    label: "Cites a canonical, runnable doca_caps invocation"
    weight: 1
    pass_when: |
      The agent provides a doca_caps command the user can paste
      verbatim (with the right device-selection flag or with the
      note that running it bare prints all devices). A response
      that fabricates a `--check-rdma` style flag without grounding
      it in the tool's --help output fails.

  - id: "what_to_read_in_output"
    label: "Tells the user what to look for in the output"
    weight: 1
    pass_when: |
      The agent explains which fields / lines in doca_caps output
      answer each of the three capability questions (Flow HW
      steering, RDMA, GPUNetIO). A response that ends "run this
      and check the output" without specifying which lines matter
      fails.

  - id: "absence_means_unsupported"
    label: "Calls out the absence-vs-unsupported distinction"
    weight: 1
    pass_when: |
      The agent points out the failure mode where a capability is
      absent from doca_caps because (a) the device does not
      support it OR (b) the firmware / driver version does not
      surface it yet, and gives the user a next step
      (firmware / OFED / DOCA version check via doca-setup) to
      tell those two apart. A response that treats absence as
      definitive "your hardware cannot do X" fails.

  - id: "uses_setup_for_install_check"
    label: "Cross-links to doca-setup for install / version baseline"
    weight: 1
    pass_when: |
      The agent points the user at the doca-setup skill (or its
      content: pkg-config --modversion doca-common, /opt/mellanox
      layout check, NGC container fallback) as the prerequisite
      step before believing doca_caps' answer. A standalone
      doca_caps walk-through with no install / version baseline
      fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from doca_caps to another DOCA tool"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names at least ONE other DOCA tool (doca-bench,
      doca-pcc-counters, doca-flow-tune, doca-flow-tune-server,
      doca-comm-channel-admin, doca-socket-relay, doca-dpacc, ...)
      and ties it to a real question the user might ask the
      hardware. A response that only walks doca_caps and is silent
      on the broader tool catalog fails this criterion.
