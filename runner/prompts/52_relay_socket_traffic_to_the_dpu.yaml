id: "52_relay_socket_traffic_to_the_dpu"
name: "Relay socket traffic from the host onto a BlueField DPU — class-shaped"
description: |
  Class-shaped data-path bridging prompt for the DOCA Socket Relay,
  the operator-facing tool that lets a socket-oriented host
  application terminate its sockets locally while the relay forwards
  the bytes to a DPU-side terminator across the DOCA fabric. The
  HEADLINE is the class ("relay socket-shaped traffic from the host
  onto a BlueField DPU without rewriting the application against the
  DOCA programming surface"); the worked example is a single
  socket-based host service whose peer the operator wants to move onto
  the BlueField, with the agent walking the three-axis configuration
  decision, the bind → connect → round-trip smoke, and the
  high-stakes data-path posture that gates every state-changing
  operation.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to drive
  the Socket Relay for ANY socket-oriented host application — not a
  pinned use case (load balancer, NAT, …). The bundle proves this by
  asking the agent to:
    - pick the deployment shape (in-process vs sidecar vs container)
      on the basis of the operator's environment, not by guessing;
    - identify the socket type / protocol the wrapping host
      application speaks (TCP / UDP / UDS — class shape, not an
      exhaustive enumeration);
    - identify the DPU-side terminator the relay will forward to,
      confirmed reachable from the DPU side before the relay is
      bound;
    - walk the bind → connect → one-round-trip → admit-fleet loop in
      that order, with smoke before bulk;
    - treat a forwarding-endpoint misconfiguration as a HIGH-STAKES
      silent data-path break (the host application connects, the
      relay accepts, the bytes go nowhere or somewhere wrong);
    - refuse to invent binary names, flag strings, socket-path
      defaults, or port numbers from memory — `--help` on the
      installed artifact and the public DOCA Socket Relay guide are
      the joint contract;
    - apply the doca-version overlay (relay agrees with `doca-common`;
      three anchors when the relay ships as a service container);
    - generalize to the doca-comch control-plane sibling so the agent
      names host ↔ DPU bridging as a *two-half* design space (data
      plane via the relay, control plane via comch) rather than a
      single tool.

  A baseline agent without skills typically: invents a `doca-relay
  --bind tcp://0.0.0.0:5555 --forward dpu://terminator` style
  invocation string from generic CLI knowledge; picks one deployment
  shape (almost always sidecar) without naming the alternatives;
  jumps straight from "the relay is running" to "point the whole
  fleet at it" with no round-trip smoke; treats a "the relay accepted
  but no bytes arrived" symptom as a relay bug rather than a
  forwarding-endpoint misconfiguration; conflates the relay with the
  comch programming API; quotes a partial-install hazard as if it
  were resolved; cannot name the doca-comch control-plane sibling or
  the doca-container-deployment runtime that hosts the service-
  container shape.

prompt: |
  I have a host service that speaks a socket protocol to a local
  peer process today. I want to move the peer onto the BlueField DPU
  side without rewriting the host service against the DOCA C API —
  the host service has to keep speaking sockets locally. I've heard
  the DOCA Socket Relay is the tool for this, but before I bind
  anything I want you to walk me through the deploy.

  Pick any single socket type / protocol you want to use as the
  worked example (TCP, UDP, UDS — your choice), but teach me the
  CLASS pattern that applies to any socket-oriented host application
  on the BlueField, not just the one you picked.

  Walk me through:

  1. Where does the relay actually run, and how do I pick? You keep
     hearing it can run in-process beside my app, as a sidecar next
     to it, or as a service container on the BlueField — what's the
     decision, and what changes about my preconditions for each
     shape?
  2. Beyond the deployment shape, what else do I have to decide
     BEFORE I touch the relay? In particular, what does the relay
     actually have to know about the DPU side, and how do I confirm
     that side is reachable before I bind anything on the host?
  3. The relay process / container is up. What's the FIRST host
     application I should bring up against it — the whole fleet, or
     something smaller? Walk me through the smoke I should run
     before I admit any other clients.
  4. Here's the failure mode I'm scared of: the relay says "client
     connected, byte received from host", but the DPU side never
     sees the byte. Walk me through why this is a silent failure
     mode, how I diagnose it without just restarting the relay, and
     which layer of the stack to look at.
  5. Don't quote a specific relay binary name, flag string, socket
     path, or port number from memory. If you don't know the exact
     spelling, say so and tell me where to look it up on my
     installed version.
  6. Do I need to worry about versions? My host DOCA is at one
     release, and if the relay ships as a BlueField service container
     there's another anchor on top. Walk the version overlay.
  7. Briefly: this relay carries my socket BYTES across the host ↔
     DPU boundary. What is the *control-plane* counterpart, where
     two programs (mine on the host, one on the DPU) coordinate the
     bridge programmatically? Name the DOCA library that owns that
     control plane and how it pairs with the relay.

  After that, generalize: name ONE OTHER socket-oriented host
  application that would benefit from this exact deployment (your
  worked example is one; name a different shape — different protocol
  or different deployment shape), and identify which parts of your
  answer above STAY THE SAME for that other case (the bind → connect
  → round-trip smoke, the silent-data-path-break risk of a wrong
  forwarding endpoint, the public-guide-plus-`--help` source-of-truth
  rule, the version overlay, pairing with the comch control-plane
  sibling when programmatic control is needed) versus which CHANGE
  (the socket type / protocol the application speaks, the
  per-deployment-shape precondition surface, the specific DPU-side
  terminator the relay forwards to).

context:
  audience: "intermediate"
  intent: "bridge_socket_traffic_to_dpu"
  prior_knowledge: "has a host service speaking a socket protocol to a local peer, has a BlueField-3 plus host with DOCA installed on the host side, has heard of the DOCA Socket Relay but has never bound one, has not rewritten the host service against the DOCA C API and does not want to as part of this phase"
  baseline_artifact: "doca-socket-relay"
  changed_skill_in_pr: "tools/doca-socket-relay"
  expected_skill_co_load:
    - "doca-socket-relay"
    - "doca-comch"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-debug"

criteria:
  - id: "names_deployment_shape_decision"
    label: "Names the in-process vs sidecar vs container deployment-shape decision as load-bearing"
    weight: 3
    pass_when: |
      In response to question 1, the agent explicitly names the
      three deployment shapes the public DOCA Socket Relay guide
      documents — in-process beside the host application, sidecar
      process / container next to the application, or service
      container on the BlueField via the kubelet-standalone runtime
      — and walks the trade-offs (host-OS permission surface for
      in-process; lifecycle coupling for sidecar; the static-pod /
      image-pull / per-service config-file mount surface from
      doca-container-deployment for the container shape). A
      response that picks one shape without naming the alternatives,
      that collapses the three into "just run the relay", or that
      treats the relay as a single fixed deployment story, fails.

  - id: "walks_bind_connect_roundtrip_loop"
    label: "Walks bind → connect → one-round-trip → admit-fleet in that order, with smoke before bulk"
    weight: 3
    pass_when: |
      In response to questions 2-3, the agent walks the explicit
      ordered loop: (a) bind the relay on the configured host-side
      endpoint and confirm the relay's documented bound / listening
      signal; (b) bring up ONE host application client and confirm
      from BOTH the application side and the relay side that the
      connect succeeded; (c) drive ONE trivial end-to-end round-trip
      from the host application through the relay to the DPU-side
      terminator and back, capturing all three observability views
      (host-application-side, relay-side, DPU-side terminator);
      (d) ONLY THEN admit the rest of the host application fleet,
      one client at a time. The agent must NOT jump from "the relay
      is running" straight to fleet admit; the one-client round-trip
      step is the load-bearing piece. A response that collapses the
      steps, that admits the fleet on a freshly-bound relay without
      a smoke, or that treats "the relay started without error" as
      proof of end-to-end function, fails.

  - id: "forwarding_endpoint_misconfig_is_high_stakes"
    label: "Treats a wrong forwarding endpoint as a HIGH-STAKES silent data-path break"
    weight: 3
    pass_when: |
      In response to question 4, the agent explicitly states that a
      misconfigured forwarding endpoint produces a SILENT data-path
      break — the host application connects to the relay, the relay
      accepts, the host application thinks it is talking to its
      peer, and yet the bytes go nowhere (or somewhere the operator
      did not intend). The agent must name the diagnosis discipline:
      capture the relay's view (was the byte received from the
      host?), the BlueField-side terminator's view (was the byte
      delivered?), and the DPU-side peer application's view (was
      the byte processed?) BEFORE blaming any single layer. The
      agent must also state that retrying "connect again" without
      root-cause analysis is the wrong move, and that the no-relay
      regression baseline (the same trivial request without the
      relay in the picture) is the recommended control comparison
      before promoting the deployment. A response that treats the
      symptom as a generic relay bug, that recommends restarting
      the relay as the first move, or that omits the silent-break
      framing entirely, fails.

  - id: "no_invented_binary_or_socket_path_strings"
    label: "Does not invent relay binary names, flag strings, socket-path defaults, or port numbers from memory"
    weight: 3
    pass_when: |
      The agent does NOT quote a specific relay binary name (e.g.
      invented strings like `doca_socket_relay`, `doca-relay`,
      `doca_relay`), a specific flag (e.g. invented strings like
      `--bind tcp://...`, `--forward dpu://...`), a specific socket
      path default, or a specific port number as the authoritative
      answer derived from memory. Instead the agent states that the
      authoritative source for the binary name, subcommand
      inventory, flag names, socket-path defaults, and port numbers
      is the public DOCA Socket Relay guide (reachable via
      `doca-public-knowledge-map ## DOCA tools`) plus the installed
      `--help` on the user's version, and explicitly tells the user
      to look them up there rather than memorize them. If the agent
      DOES surface a candidate command shape, it must clearly frame
      it as a placeholder / sketch with the agent telling the user
      to replace it with the value from `--help`. Inventing
      specific strings from memory and presenting them as the
      answer fails — that is the canonical relay-skill
      hallucination failure mode.

  - id: "version_overlay_via_doca_version"
    label: "Surfaces the version overlay via doca-version (relay vs doca-common; three anchors for the container shape)"
    weight: 3
    pass_when: |
      In response to question 6, the agent surfaces the
      version-handling rule via `doca-version`: the relay's own
      `--version` (per `--help`) must agree with
      `pkg-config --modversion doca-common` as part of the four-way
      match, and disagreement is a partial-install hazard the agent
      must surface (not paper over) per
      `doca-version ## debug`. The agent must ALSO state that when
      the relay ships as a service container on the BlueField via
      the doca-container-deployment runtime, THREE version anchors
      apply (host DOCA on the side the relay runs, BFB version on
      the BlueField, per-service container tag pulled from NGC), and
      route the body to `doca-version` rather than re-deriving it.
      A response that treats the version check as optional, that
      asserts the relay and `doca-common` agree without checking,
      that omits the three-anchor rule for the container shape, or
      that quotes a hardcoded version from memory, fails.

  - id: "generalizes_to_doca_comch"
    label: "Names doca-comch as the host ↔ DPU control-plane sibling of the data-plane relay"
    weight: 3
    pass_when: |
      In response to question 7, the agent explicitly names
      `doca-comch` (the DOCA Comm Channel library) as the
      host ↔ DPU CONTROL-PLANE primitive — the PCIe-based message
      channel between a host program and a DPU program that lets
      the two coordinate the bridge programmatically — and pairs it
      with the Socket Relay as the DATA-PLANE counterpart for
      socket-oriented applications. The agent must say that the
      relay carries the socket-shaped BYTES across the host ↔ DPU
      boundary, while comch carries programmatic CONTROL messages
      across the same boundary, and recommend pairing the two when
      the operator is migrating in stages (control plane first via
      comch, data plane via the relay until a per-library rewrite
      is justified). A response that recommends the relay without
      naming comch, that conflates the relay with the comch
      programming API, or that proposes a single tool covers both
      the data plane and the control plane, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from the worked-example deployment to another socket-oriented host application"
    weight: 2
    pass_when: |
      The agent explicitly addresses the generalization part of the
      prompt: it names AT LEAST ONE OTHER socket-oriented host
      application or a different deployment shape (e.g. if the
      worked example was a TCP in-process deployment, generalize to
      a UDS sidecar or a UDP service-container deployment; if the
      worked example was a UDP sidecar, generalize to a TCP
      in-process or a UDS container deployment) and identifies
      which parts STAY THE SAME (the bind → connect → round-trip
      smoke, the silent-data-path-break risk of a wrong forwarding
      endpoint, the public-guide-plus-`--help` source-of-truth
      rule, the version overlay via `doca-version`, pairing with
      the doca-comch control-plane sibling when programmatic
      control is needed, the no-relay regression-baseline rule)
      versus which CHANGE (the socket type / protocol the
      application speaks, the per-deployment-shape precondition
      surface, the specific DPU-side terminator the relay forwards
      to, the per-service container tag when the deployment shape
      is the container). A response that walks only the one worked
      example and is silent on the broader CLASS of socket-oriented
      host applications fails this criterion.
