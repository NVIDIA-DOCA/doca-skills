id: "55_apply_a_hardware_touching_doca_change_safely"
name: "Apply a hardware-touching DOCA change safely on a live BlueField — class-shaped"
description: |
  Class-shaped hardware-safety prompt. The HEADLINE is the class
  ("apply a hardware-touching DOCA change safely on a live
  BlueField — ensure rollback works"); the worked example is
  applying an `mlxconfig`-class parameter write on a production
  BlueField inside a maintenance window with a rehearsed rollback,
  because `mlxconfig`-class writes are the most common hardware-
  touching change a per-artifact skill recommends and they carry
  every cross-cutting safety surface (cold-power-cycle commit, OOB
  precondition, replica-first rehearsal, documented rollback).

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  apply ANY hardware-touching DOCA change safely (firmware burn, BFB
  reflash, mode flip, `mlxconfig` write, kernel boot parameter, link
  state change, PCIe rescan, BlueField cold reboot). The bundle
  proves this on the `mlxconfig`-class write by asking the agent to
  walk: identify the change class up front; require a pre-flight
  inventory (PCIe topology + link state + firmware level + BFB level
  + config snapshot + host-side env snapshot) BEFORE issuing the
  change; require an out-of-band path for the link-breaking shape;
  frame the maintenance window with a named rollback decision point;
  surface the `mlxconfig` cold-power-cycle rule (a warm reboot does
  NOT commit firmware-stored configuration); rehearse the change AND
  the rollback on a non-prod replica that matches the production
  hardware class BEFORE touching production; gate the workload
  behind a post-change four-way match (per `doca-version`) AND the
  per-artifact health metric AND an end-to-end observability path
  proven; refuse to invent specific `mlxconfig` parameter names,
  firmware versions, BFB versions, PCI addresses, BMC IPs, or kernel
  command literals; refuse to proceed when no documented rollback
  exists and escalate instead; and generalize the discipline beyond
  the worked `mlxconfig` example to firmware burn / BFB reflash /
  kernel-boot-parameter changes.

  A baseline agent without skills typically: jumps straight to a
  specific `mlxconfig` command without naming the change class;
  invents a parameter literal and a PCI BDF from memory; recommends
  `mlxconfig ... && reboot` and assumes the change took effect on a
  warm reboot; skips the pre-flight inventory because the change
  "is small"; does not mention out-of-band access; does not frame a
  maintenance window; declares the deployment "ready" without a
  post-change four-way match or an observability gate; treats the
  rollback as a discovered-during-failure improvisation rather than
  a rehearsed plan; cannot generalize the discipline to firmware
  burn / BFB reflash / kernel-boot-parameter changes.

prompt: |
  I have a production BlueField-3 DPU running a DOCA workload. The
  per-artifact skill I read for my service said the next step is to
  write an `mlxconfig`-class firmware-level parameter on the
  BlueField to enable an emulation slot the service needs. I have
  not done a hardware-touching change on this BlueField before, and
  the workload on the host is real production traffic that ops will
  notice if it drops. I want to do this right.

  Walk me through the change:

  1. Before I touch anything on the hardware, what do I have to
     capture? I want to be able to roll back if this goes wrong, and
     I understand rollback is only possible against a captured
     baseline.
  2. Does this kind of change risk dropping the link I'm currently
     managing the BlueField over? If so, what do I need in place
     BEFORE I issue the change? Be specific about the *class* of
     access path; the actual endpoint on my deployment is mine to
     name.
  3. When should I actually apply this change — right now during
     business hours, or do I need a different posture? What has to
     be true about timing and stakeholders before I run the command?
  4. The per-artifact skill told me the sequence is roughly
     "`mlxconfig` write, then reboot the BlueField". Is a warm
     reboot enough to commit the change, or do I need something
     stronger? I want to understand WHY in terms of where this kind
     of configuration is actually stored.
  5. I have a non-prod replica BlueField-3 with what I think is the
     same hardware class as production. Should I run this change on
     the replica first, or is the change small enough to apply
     directly to production? Be honest about what skipping the
     replica costs me.
  6. After I apply the change in production, how do I tell whether
     it actually landed correctly BEFORE I let workload move back
     to the affected path? What gates does my verification have to
     pass?
  7. If the change goes wrong, walk me through the rollback ladder.
     I want the SHAPE of the rollback, not invented register values.
  8. Don't quote specific `mlxconfig` parameter names, firmware
     versions, BFB versions, PCI addresses, BMC IPs, or kernel
     command literals from memory. If you don't know the exact
     value, say so and tell me where it has to come from on my
     deployment.

  After that, briefly tell me which parts of your discipline
  generalize beyond `mlxconfig`-class writes to the other classes
  of hardware-touching change I might face later — specifically:
  a NIC firmware burn, a BlueField BFB reflash, and a host kernel
  boot parameter change (IOMMU mode or hugepage reservation).
  Identify which parts STAY THE SAME (the pre-flight inventory, the
  OOB precondition for link-breaking changes, the maintenance-
  window framing, the replica-first rehearsal, the
  observability-before-workload gate, the documented and rehearsed
  rollback path, the refuse-and-escalate rule when no rollback
  exists) vs which CHANGE shape (different commit actions —
  cold-power-cycle for `mlxconfig`-class, the burn tool's
  documented completion handshake for firmware burn, BlueField
  cold reboot plus container re-deploy for BFB reflash, a host
  reboot with a verified post-reboot env-class state for kernel
  boot parameters; different rollback paths; different
  preconditions like power continuity for firmware burn).

context:
  audience: "intermediate"
  intent: "apply_hardware_touching_change"
  prior_knowledge: "has a production BlueField-3 with a real workload on the attached host, has read the per-artifact skill for their service which named the specific mlxconfig-class write to apply, has a non-prod BlueField-3 replica available, has heard of out-of-band management but has not yet picked the access class for this deployment, has never applied a firmware-level configuration change on this BlueField before"
  baseline_artifact: "doca-hardware-safety"
  changed_skill_in_pr: "doca-hardware-safety"
  expected_skill_co_load:
    - "doca-hardware-safety"
    - "doca-version"
    - "doca-setup"
    - "doca-debug"
    - "doca-container-deployment"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"

criteria:
  - id: "identifies_change_class_up_front"
    label: "Identifies the change as an mlxconfig-class firmware-level parameter write and names what that class implies"
    weight: 2
    pass_when: |
      In response to the prompt's overall framing (and specifically
      question 4), the agent explicitly names that the recommended
      change is in the `mlxconfig`-class CHANGE CLASS (a firmware-
      level parameter write committed at next cold power cycle of
      the NIC / DPU) BEFORE walking the apply step. The agent must
      not treat the change as generic "config edit"; the class
      determines the commit action, the rollback shape, and the
      observability gate. A response that walks straight to a
      specific `mlxconfig` command without naming the class, or
      that conflates `mlxconfig`-class writes with runtime config
      changes, fails.

  - id: "requires_pre_flight_inventory"
    label: "Requires a pre-flight inventory (PCIe topology + link state + firmware level + BFB level + config snapshot + host-side env snapshot) before any change"
    weight: 3
    pass_when: |
      In response to question 1, the agent explicitly requires the
      operator to CAPTURE the pre-flight inventory BEFORE issuing
      any hardware-touching action, and names the inventory
      dimensions: PCIe topology (PFs / VFs / SFs / representors),
      link state, running firmware level, BFB level on the
      BlueField side, the current `mlxconfig`-class configuration
      snapshot, and the host-side env snapshot (kernel command
      line, loaded `mlx5_*` modules, kernel version). The agent
      must explain WHY: rollback is only possible against a
      captured baseline, and the agent cannot reconstruct what was
      lost without the baseline. A response that skips the pre-
      flight inventory, or that names only one or two of the
      dimensions, or that treats the inventory as optional
      "background reading" rather than a hard prerequisite, fails.

  - id: "requires_out_of_band_for_link_breaking"
    label: "Requires an out-of-band path as a precondition for link-breaking changes; refuses to issue them without OOB"
    weight: 3
    pass_when: |
      In response to question 2, the agent explicitly states that
      the recommended `mlxconfig`-class write is in the link-
      breaking class of hardware-touching changes (or, at minimum,
      that the operator must assume any firmware-level change can
      reshape the PCIe surface / link state), and that the agent
      REFUSES to issue the change until an out-of-band (OOB)
      management path is in place AND confirmed reachable. The
      agent must name the CLASS of OOB path (BMC serial console,
      RShim USB / RShim-over-PCIe, operator-managed KVM / terminal
      server / OCC-attached console) without inventing a specific
      BMC IP, console TTY device, or operator-side endpoint —
      those are operator-specific. A response that omits OOB, that
      treats *"just SSH in"* as sufficient, or that invents a BMC
      IP / TTY device from memory, fails.

  - id: "frames_maintenance_window_with_rollback_named"
    label: "Frames an explicit, time-boxed maintenance window with stakeholders notified AND names the rollback plan and the verification gate up front"
    weight: 2
    pass_when: |
      In response to question 3, the agent explicitly requires
      that the change run inside an explicit, time-boxed
      maintenance window with operations notified, AND requires
      that the rollback plan and the verification gate be
      DOCUMENTED BEFORE the change is applied (not as an
      afterthought). The agent must refuse to issue the change
      silently during business hours. The agent must NOT treat
      *"do it now"* as acceptable. A response that omits the
      maintenance-window framing, or that treats the rollback as
      something to figure out only if the change fails, fails.

  - id: "surfaces_cold_power_cycle_rule"
    label: "Surfaces that mlxconfig-class writes commit at COLD POWER CYCLE, not warm reboot, and refuses the warm-reboot-and-assume anti-pattern"
    weight: 3
    pass_when: |
      In response to question 4, the agent explicitly surfaces
      that `mlxconfig`-class writes are committed at NEXT COLD
      POWER CYCLE (full A/C power removal) of the NIC / DPU, NOT
      at a warm reboot. The agent must explain WHY in terms of
      where firmware-stored configuration lives: a warm reboot
      does not power-cycle the device and therefore does not
      commit firmware-level configuration. The agent must
      explicitly refuse the "`mlxconfig ...; reboot` and assume
      the change took effect" anti-pattern. A response that
      treats a warm reboot as sufficient, or that omits the
      cold-power-cycle rule, fails.

  - id: "requires_replica_first_rehearsal_with_rollback"
    label: "Requires the change AND the rollback to be rehearsed on a hardware-class-matching non-prod replica before production"
    weight: 3
    pass_when: |
      In response to question 5, the agent explicitly requires the
      change to be applied first on a non-prod replica that
      matches production's hardware class (same BlueField
      generation, same running firmware level, same host kernel,
      same set of representors / VFs / SFs the change touches),
      and ALSO requires the ROLLBACK to be rehearsed on the same
      replica before production is exposed. The agent must
      explain WHY skipping the replica costs the operator: the
      replica is the last opportunity to discover that the
      rollback path does not work before production is exposed
      to the risk; a change without a tested rollback is not a
      small change but a change with an untested recovery surface.
      A response that treats the replica as optional, that walks
      only the forward change on the replica and never the
      rollback, or that recommends going directly to production
      because the change "is small", fails.

  - id: "post_change_verification_gates_workload"
    label: "Gates production workload behind post-change four-way match + per-artifact health metric + end-to-end observability path before lifting the gate"
    weight: 2
    pass_when: |
      In response to question 6, the agent explicitly gates the
      workload behind THREE post-change verifications BEFORE any
      production traffic moves back: (a) the four-way match per
      `doca-version` (`pkg-config --modversion doca-common`,
      `cat /opt/mellanox/doca/applications/VERSION`,
      `doca_caps --version`, and the BFB version on BlueField all
      agree on the post-change state); (b) the per-artifact
      health metric from the matching per-artifact skill's smoke
      test; (c) the observability path proven end-to-end (logs
      visible, counters readable, container / service stdout
      reachable). The agent must NOT declare the deployment
      "ready" until all three gates pass. A response that
      declares the change applied after a single reboot without
      naming the post-change verification gates, or that names
      only one of the three gates, fails.

  - id: "names_rollback_ladder_shape_not_invented_values"
    label: "Names the SHAPE of the rollback ladder without inventing register values, parameter literals, or firmware versions"
    weight: 2
    pass_when: |
      In response to question 7, the agent walks the rollback
      ladder by NAMING THE SHAPE: confirm the failure against
      the captured baseline → apply the matching rollback class
      (revert the `mlxconfig` values to the captured baseline,
      then cold-power-cycle) → re-verify the inventory and the
      four-way match against the captured baseline → if a
      residual software-layer symptom remains, hand off to
      `doca-debug`. The agent must use the OPERATOR'S CAPTURED
      BASELINE values for the revert, not invented values. A
      response that quotes a specific `mlxconfig` parameter name
      with a specific value from memory, or that invents
      register-level recovery commands, fails this criterion.

  - id: "no_invented_hardware_literals"
    label: "Refuses to invent specific mlxconfig parameter names, firmware versions, BFB versions, PCI BDFs, BMC IPs, or kernel command literals"
    weight: 3
    pass_when: |
      Throughout the response (and in direct answer to question
      8), the agent does NOT quote specific `mlxconfig`
      parameter names with their valid value sets, specific
      firmware version strings, specific BFB version strings,
      specific PCI bus / device / function addresses, specific
      BMC management IP addresses, or specific kernel command-
      line literals (e.g. `intel_iommu=on`, `iommu=pt`,
      `default_hugepagesz=...`) from memory as if they were the
      values the operator should use. Class examples to make a
      pedagogical point (e.g. "kernel boot parameters of the
      `iommu=pt` / `intel_iommu=on` shape") are acceptable when
      clearly framed as the CLASS shape; presenting any of those
      literals as the answer to "what value should I write" is
      the canonical hallucination failure mode and fails. The
      agent must surface that the specific values come from the
      per-artifact skill, the operator's captured pre-flight
      inventory, or the operator's deployment-specific
      configuration — not from agent memory.

  - id: "refuse_and_escalate_when_no_rollback_exists"
    label: "Refuses to proceed and escalates when no documented rollback exists, instead of guessing"
    weight: 2
    pass_when: |
      The agent explicitly states that when no documented
      rollback exists for a hardware-touching change (the vendor
      states the firmware roll is one-way; a board-level change
      has no reversal; the captured baseline cannot be restored;
      no OOB plan exists and the link is down), the right move
      is to REFUSE to proceed and ESCALATE — to the operator's
      change-control process, to vendor support, or to the
      public DOCA Developer Forum for the public surface — NOT
      to guess at a recovery. A response that proposes invented
      register resets, invented "try this register value"
      recovery, or any other guess-at-rollback workaround,
      fails. The agent must frame guessing-at-rollback as a
      user-visible regression dressed up as helpfulness.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes the discipline from the mlxconfig worked example to firmware burn / BFB reflash / kernel-boot-parameter changes; identifies what stays the same vs what changes"
    weight: 3
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it generalizes from the `mlxconfig`-class worked
      example to AT LEAST the three other change classes named
      in the prompt (NIC firmware burn, BlueField BFB reflash,
      host kernel boot parameter change). The agent must
      identify which parts STAY THE SAME across the classes —
      the pre-flight inventory, the OOB precondition for link-
      breaking changes, the maintenance-window framing with a
      documented rollback decision point, the replica-first
      rehearsal of both the change AND the rollback, the
      observability-before-workload gate, the documented and
      rehearsed rollback, and the refuse-and-escalate rule when
      no rollback exists — vs which parts CHANGE — the commit
      action (cold power cycle for `mlxconfig`-class; the burn
      tool's documented completion handshake plus power
      continuity for firmware burn; BlueField cold reboot plus
      a re-deploy of every hosted service container for BFB
      reflash per the canonical container-deployment recipe;
      a host reboot with a verified post-reboot env-class state
      for kernel boot parameters), the rollback path's class
      (revert + cold-power-cycle vs reflash-prior-firmware vs
      reflash-prior-BFB vs revert-kernel-command-line + reboot),
      and the change-class-specific preconditions (power
      continuity for firmware burn, do-not-interrupt-the-burn,
      a verified post-reboot env-class state for kernel boot
      parameter changes). A response that walks only the
      `mlxconfig` worked example and is silent on the
      generalization, OR that names only one of the three other
      classes, OR that conflates the four classes into a single
      "hardware change" with no class-specific commit action /
      rollback shape, fails this criterion.
