id: "60_manage_device_state_programmatically"
name: "Query or modify BlueField device-level state programmatically via the management plane — class-shaped"
description: |
  Class-shaped programmatic-management prompt. The HEADLINE
  is the class ("query or modify BlueField device-level state
  programmatically via the DOCA management plane"); the worked
  example is a fleet-management tool that queries each
  BlueField's data-direct capability and toggles a feature
  flag if supported, because doca-mgmt is the focused
  management-plane surface for that pattern.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how
  to design ANY device-administration / fleet-management
  operation that doca-mgmt surfaces (capability query, feature
  flag toggle, ICM-quota set, congestion-control global
  status, diagnostics-data query, raw firmware-control
  command — each one is one instance of the same class). The
  bundle proves this by asking the agent to walk: surface
  selection vs telemetry / caps CLI / bench FIRST (gate, not
  error path), the EXPERIMENTAL-tag rule on the entire
  doca_mgmt_* symbol set, the management-context + representor-
  context object pair, the capability-supported-first
  discipline, the apply-with-rollback workflow (pre-state
  capture → write → re-query → diff → rollback if unexpected),
  the raw-command scope ladder, and the cross-link to the
  bundle-wide hardware-safety meta-policy. The same SHAPE
  applies to every programmatic device-state operation; the
  per-operation details differ.

  A baseline agent without skills typically: conflates
  doca-mgmt with doca-telemetry / doca-caps and recommends
  the wrong surface for a programmatic write; ignores the
  EXPERIMENTAL tag and treats the entire API as
  production-stable; invents doca_mgmt_* symbol names from
  generic device-management knowledge; recommends a `_set`
  call WITHOUT a preceding `_get` to capture pre-state;
  recommends `doca_mgmt_raw_cmd` with `DEBUG_WRITE_FULL` for
  a read-only query; provides no rollback path before the
  write; silently bypasses the hardware-safety meta-policy
  for a write that could change link state.

prompt: |
  I'm building a fleet-management tool that walks every
  BlueField-3 in my data center. For each device, I want my
  tool to (a) query whether the device supports
  "data-direct" through the DOCA programmatic API, and (b)
  if supported, toggle the device's data-direct setting on
  a specific VF representor. The tool runs as root on each
  host, hits one DPU at a time, and reports back to a
  central inventory store.

  Walk me through the design. Specifically:

  1. Which DOCA library is the right surface for this — and
     which surfaces are NOT the right answer? I know there
     are doca-mgmt, doca-telemetry, and a doca-caps CLI; I
     do NOT want you to silently pick — explicitly compare
     them and tell me when each is right.

  2. Whatever you recommend, tell me HONESTLY about its API
     stability: is the symbol set stable, EXPERIMENTAL, or
     somewhere in between? I am writing a long-lived fleet
     tool and I need to know what I'm signing up for.

  3. Walk me through the object model — what contexts I
     create (device-level vs representor-level), what
     handles I populate, when I call which `_set` vs `_get`.

  4. Before I do the write, what do I need to do FIRST? I
     do not want to break a device because I rushed.

  5. How do I structure the rollback path? Be explicit
     about what state I need to capture and how I would
     undo the change.

  6. The data-direct toggle is one specific operation. I
     also need this tool to eventually query ICM-quota
     utilization, enable/disable congestion-control, and
     query diagnostics-data. Walk me through how the SAME
     workflow applies — is there a generic shape I should
     follow, or does each operation need its own
     reasoning?

  7. Finally — what is the bundle-wide discipline I should
     wrap around any of these writes? I do not want my
     fleet tool to be the thing that takes a DPU offline at
     2 AM.

context:
  audience: "intermediate"
  intent: "modify_device_state_safely"
  prior_knowledge: "knows what a DPU, a VF representor, and a fleet-management tool are; has multiple BlueField-3 hosts with DOCA installed; has done at least one DOCA build before but has never used doca-mgmt specifically; does not yet know how doca-mgmt relates to doca-telemetry, doca-caps, or doca-bench; understands that device-state writes need rollback discipline but does not yet know what doca-mgmt's specific surface looks like"
  baseline_artifact: "doca-mgmt"
  changed_skill_in_pr: "libs/doca-mgmt"
  expected_skill_co_load:
    - "doca-mgmt"
    - "doca-telemetry"
    - "doca-caps"
    - "doca-bench"
    - "doca-pcc"
    - "doca-hardware-safety"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-debug"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "doca_mgmt_vs_telemetry_caps_bench_selection_called_out"
    label: "Selects doca-mgmt over telemetry / caps CLI / bench, with a stated rule"
    weight: 3
    pass_when: |
      The agent's FIRST move is to pick among doca-mgmt,
      doca-telemetry (with doca-telemetry-exporter), the
      doca-caps CLI, and doca-bench — explicitly, with a
      stated rule. The correct pick for this prompt is
      doca-mgmt, BECAUSE the operation is a programmatic
      point-in-time read AND write of device-level state.
      The agent must also surface that doca-telemetry is
      the right answer for streaming metrics, doca-caps is
      the right answer for an interactive read-only
      snapshot, and doca-bench is for live performance
      probing. A response that recommends doca-telemetry
      for a programmatic write fails. A response that
      silently picks one surface and never compares fails.

  - id: "experimental_tag_surfaced_honestly"
    label: "Surfaces that every doca_mgmt_* symbol is currently EXPERIMENTAL"
    weight: 3
    pass_when: |
      The agent explicitly surfaces that every public
      doca_mgmt_* symbol is currently tagged EXPERIMENTAL
      in the installed DOCA, AND that the API can change
      shape between releases, AND that a long-lived fleet
      tool against this surface requires explicit per-
      release re-verification (re-running the test
      workflow against every new install). A response that
      recommends doca_mgmt_* symbols without any stability
      caveat fails. A response that claims doca-mgmt is GA
      / stable / production-stable fails. A response that
      mentions "experimental" but does not name what that
      implies for the fleet tool's update cadence fails.

  - id: "management_context_and_representor_object_model"
    label: "Names doca_mgmt_dev_ctx + doca_mgmt_dev_rep_ctx as the lifecycle pair"
    weight: 2
    pass_when: |
      The agent names the two host-side management objects —
      doca_mgmt_dev_ctx (the device-wide context, created
      on a doca_dev) and doca_mgmt_dev_rep_ctx (the
      representor-targeted context, created either from a
      doca_dev_rep or via doca_mgmt_dev_rep_ctx_create_by_pci_addr
      with the "Domain:Bus:Device.Function" HEX format) —
      and walks the lifecycle (device context first, then
      representor context; destroy representor context
      before the device context; close the device last).
      The agent must also name that the data-direct
      sub-domain operation uses
      doca_mgmt_device_caps_general_create / _set_data_direct
      / _set on a representor context. A response that
      walks only the device context where the operation is
      representor-targeted fails. A response that conflates
      the two contexts fails.

  - id: "pre_state_capture_before_write"
    label: "Calls out pre-state capture (`_get` before `_set`) as a hard precondition"
    weight: 3
    pass_when: |
      The agent explicitly states that BEFORE the
      doca_mgmt_device_caps_general_set (or any other
      doca_mgmt_* write), the user must call the matching
      _get / _query against the target context to capture
      the device's CURRENT state. The captured state is what
      the rollback path quotes; without it, rollback is
      impossible. The agent must frame this as a hard
      precondition, not an optional best practice. A
      response that recommends `_set` without an explicit
      preceding `_get` fails. A response that mentions
      "rollback" without naming the pre-state capture
      mechanism fails.

  - id: "raw_cmd_scope_ladder_named"
    label: "Names the doca_mgmt_cmd_scope ladder and the narrowest-scope rule"
    weight: 2
    pass_when: |
      The agent names the doca_mgmt_cmd_scope enum
      (DOCA_MGMT_CMD_SCOPE_CONFIGURATION,
      DOCA_MGMT_CMD_SCOPE_DEBUG_READ_ONLY,
      DOCA_MGMT_CMD_SCOPE_DEBUG_WRITE,
      DOCA_MGMT_CMD_SCOPE_DEBUG_WRITE_FULL) when discussing
      doca_mgmt_raw_cmd, AND states the rule "pick the
      narrowest scope that satisfies the operation". The
      agent must also surface that for the data-direct
      toggle in the prompt, the dedicated sub-domain
      wrapper (doca_mgmt_device_caps_general_*) is the
      right surface, NOT doca_mgmt_raw_cmd. A response
      that recommends raw_cmd for a write that has a
      dedicated wrapper fails. A response that ignores
      the scope enum entirely fails.

  - id: "hardware_safety_meta_policy_cross_linked"
    label: "Cross-links doca-hardware-safety for the change-application discipline"
    weight: 3
    pass_when: |
      The agent explicitly cross-links the bundle-wide
      hardware-safety meta-policy (doca-hardware-safety) as
      THE surface that owns the change-application
      discipline (pre-flight inventory, out-of-band access
      for link-breaking changes, maintenance window,
      replica-first validation, documented rollback,
      observability-before-workload, no-documented-rollback-
      means-refuse). The agent must surface that doca-mgmt
      writes are *the* programmatic surface where the
      meta-policy is enforced, AND that the per-artifact
      overlay does not redefine the meta-policy's rules.
      A response that walks safety as if it were a doca-mgmt-
      internal concern (and does not name the meta-policy)
      fails. A response that recommends a write without
      naming the maintenance-window / OOB / rollback gates
      fails.

  - id: "capability_supported_first"
    label: "Calls out the capability-supported-first discipline for each sub-domain"
    weight: 2
    pass_when: |
      The agent explicitly states that, for each sub-domain
      doca-mgmt exposes (caps-general, cc-global-status,
      diagnostics-data, icm-quota), the agent calls the
      sub-domain's capability gate FIRST before any write —
      doca_mgmt_cap_icm_quota_is_supported for icm-quota;
      doca_mgmt_cap_diagnostics_data_multi_domain_is_supported
      for multi-domain diagnostics; an attempt-and-handle-
      NOT_SUPPORTED pattern for caps-general and
      cc-global-status. A response that recommends a write
      without naming the capability gate fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_mgmt_* API symbols or sub-domains"
    weight: 2
    pass_when: |
      Every doca_mgmt_* symbol the agent mentions is either
      in the verified public surface this skill documents
      (doca_mgmt_dev_ctx_create / destroy / get_doca_dev;
      doca_mgmt_dev_rep_ctx_create / create_by_pci_addr /
      destroy / get_doca_dev_rep / get_mgmt_dev_ctx;
      doca_mgmt_raw_cmd with the doca_mgmt_cmd_scope enum;
      doca_mgmt_device_caps_general_create / destroy /
      set_data_direct / get_data_direct / clear / set /
      get; doca_mgmt_cc_global_status_* with
      DOCA_MGMT_CC_GLOBAL_STATUS_PROTOCOL_RP / _NP;
      doca_mgmt_diagnostics_data_*; doca_mgmt_icm_quota_*
      with DOCA_MGMT_ICM_QUOTA_LIMIT_UNLIMITED) OR
      explicitly framed as pseudocode with the agent
      telling the user to confirm the symbol against the
      installed headers (doca_mgmt.h plus the sub-domain
      headers). A response that invents symbols like
      doca_mgmt_easy_set(), doca_mgmt_quick_query(), or
      that names a sub-domain the public version map does
      not expose, fails — that is the baseline-agent
      hallucination failure mode the bundle exists to
      prevent.

  - id: "version_overlay_named"
    label: "Quotes pkg-config --modversion doca-mgmt AND the four-way version match for the fleet tool"
    weight: 1
    pass_when: |
      The agent surfaces the version-discovery rule:
      `pkg-config --modversion doca-mgmt` is the build-time
      anchor; the four-way match between `doca-mgmt.pc`,
      `doca-common.pc`, `doca_caps --version`, and the
      installed firmware on each device is the runtime
      gate. The agent must surface that for a fleet tool,
      the four-way match is a per-host concern (different
      hosts may have different version states; the tool
      cannot assume homogeneity). A response that quotes a
      DOCA version pin from memory, or that promises a
      feature without naming either the version anchor or
      the per-host four-way match, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from data-direct toggle to ICM-quota / CC / diagnostics-data — names the generic apply-with-rollback shape"
    weight: 2
    pass_when: |
      The agent explicitly addresses the prompt's second
      part: it generalizes from the data-direct toggle to
      ICM-quota set, congestion-control enable/disable, and
      diagnostics-data query, AND identifies that the SAME
      apply-with-rollback shape applies to every sub-
      domain — capability-supported-first → pre-state
      capture via `_get` / `_query` → narrowest-scope write
      via the dedicated `_set` / `_modify` / `_set_limit`
      wrapper → post-write re-query → diff → rollback if
      unexpected. The agent must also surface that some
      sub-domains layer onto deeper surfaces
      (cc-global-status is the *global* control plane
      that layers on the programmable congestion-control
      surface owned by doca-pcc) and route accordingly. A
      response that walks only the data-direct case and is
      silent on the generic shape fails this criterion. A
      response that pretends each sub-domain needs its own
      unique workflow (when the apply-with-rollback shape
      is in fact universal) fails.
