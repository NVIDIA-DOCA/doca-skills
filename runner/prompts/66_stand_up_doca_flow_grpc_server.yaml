id: "66_stand_up_doca_flow_grpc_server"
name: "Stand up a doca-flow-grpc-server and program Flow rules remotely from a non-C++ client, validating the rules actually program the dataplane — class-shaped"
description: |
  Class-shaped remote-control gRPC prompt. The HEADLINE is the
  class ("stand up `doca_flow_grpc_server` and program Flow
  rules remotely from a non-C++ client across a hardened
  network boundary, then validate that the RPCs actually
  program the live dataplane"); the worked example is a Python
  client programming Flow rules on a BlueField-3 across a
  control-plane VLAN, because Python is the most common
  non-C++ control-plane language and the bundle's
  `skills/tools/doca-flow-grpc-server` skill is the newly
  covered tool.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  drive ANY remote-gRPC-control-of-doca-flow question: surface
  the remote-vs-direct trade-off (do you actually need gRPC, or
  should the client just link `libdoca_flow.so`?); locate the
  shipped `.proto` files on the user's install as the
  authoritative contract; refuse to invent RPC method names or
  message fields from generic gRPC patterns; pick the
  auth / TLS / network-segment posture explicitly (the endpoint
  is an admin attack surface); generate language-specific client
  stubs via `protoc` + the gRPC plugin per `grpc.io`; smoke ONE
  client end-to-end with a read-only RPC before any
  state-changing RPC; cross-check the gRPC response against the
  live Flow application's own view; cross-link `doca-version`
  for the four-way match plus the `.proto`-vs-binary version
  rule; generalize to another non-C++ client language (Go,
  Rust) or another control-plane topology.

  A baseline agent without skills typically: defaults to gRPC
  without surfacing the direct-library-link alternative; invents
  RPC method names (`AddFlowRule`, `ListPipes`) from generic
  gRPC patterns; invents endpoint paths (`localhost:50051`) and
  treats them as authoritative; recommends binding on
  `0.0.0.0` without auth or TLS; jumps from "server bound" to
  "issue mutating RPCs" without a one-client read-only smoke in
  between; treats the gRPC endpoint as a benign read-only
  surface rather than an admin attack surface; cannot generalize
  to other non-C++ client languages; paraphrases gRPC status
  codes instead of quoting them.

prompt: |
  I have a doca-flow application running on a BlueField-3 — it
  brought up its Flow ports, created several pipes, and is
  programming entries against them from its own C++ process.
  Now I want to ADD a remote control plane: a Python service
  running on a different host should be able to program Flow
  rules on this BlueField over the network, instead of every
  controller-side change requiring me to redeploy the C++
  application.

  Walk me through:

  1. First, is `doca_flow_grpc_server` actually the right
     answer for this question? Tell me HONESTLY when I should
     reach for the gRPC server versus when I should just link
     `libdoca_flow.so` directly into a C++ client on the same
     host. Surface the trade-off — network boundary, language
     barrier, deployment topology, attack surface — and say
     when each side wins. Do NOT default to gRPC because it
     sounds modern.
  2. Tell me where the AUTHORITATIVE gRPC contract for this
     tool lives. I have heard people quote RPC names like
     `AddFlowRule` and `ListPipes` from blog posts; are those
     real, are they on my installed version, or are they
     hallucinations? Where on my install do I actually find the
     `.proto` file(s) and how do I treat them as the contract?
     I do NOT want you to invent method names or message field
     names from generic gRPC patterns; if you do not know the
     spelling on my installed version, say so and tell me
     where to look.
  3. Walk me through the auth / TLS / network-segment posture
     I have to commit to BEFORE I expose the endpoint. My
     Python service is on a different host from the BlueField,
     across a control-plane VLAN. Walk me through (a) the auth
     mechanism (mTLS / token / plaintext-on-trusted-segment),
     (b) the TLS posture, (c) which segment / address I should
     bind on, and (d) why binding on `0.0.0.0` without TLS or
     auth would be an admin attack surface. Route the gRPC
     ecosystem-side guidance to `grpc.io` rather than inventing
     a posture from memory.
  4. How do I generate the Python client stubs from the shipped
     `.proto` files? Class-level only — name the tooling
     (`protoc` + the language-specific gRPC plugin per
     `grpc.io`), point me at the `grpc.io` quickstart for
     Python, and tell me what the input is (the shipped
     `.proto` files on my install). Tell me also which other
     non-C++ client languages would work the same way (Go,
     Rust, Java, etc.) so I know my decision generalizes.
  5. Tell me the FIRST thing I should run on this hardware. I
     want the cheapest read-only sequence that proves my
     server bound the configured endpoint, that my Python
     client can complete the TLS handshake and any auth check,
     and that ONE read-only RPC actually programs the right
     doca-flow application (and not, say, an unrelated
     application that happened to be running). Tell me what
     passing each step looks like, what failing looks like, and
     what to do next in each case. Do NOT skip the version
     check between the server, the `.proto` contract my client
     was generated against, and the `doca-flow` library the
     server links against.
  6. After the read-only smoke is clean, walk me through
     issuing my first STATE-CHANGING RPC (a rule-create or
     entry-add operation). Tell me explicitly that this is the
     high-stakes class of operation because the RPC does to
     Flow state exactly what a direct `libdoca_flow.so` call
     would do, and that the smoke from step 5 is the gating
     precondition. Tell me what I do if the RPC returns a
     non-OK gRPC status code — point me at the standard gRPC
     status codes reference on `grpc.io` and tell me how each
     one maps back to either a gRPC-server-side issue or a
     `doca-flow`-side precondition issue.
  7. If my client cannot reach the server, gets
     `UNAUTHENTICATED` / `PERMISSION_DENIED`, gets
     `FAILED_PRECONDITION`, or gets a response that disagrees
     with what `libdoca_flow.so` would report on the
     application side — walk me through the layered diagnosis.
     I want to know which layer I am in (server-not-started /
     server-binding-failed / TLS-or-auth-rejected /
     RPC-call-error / Flow-precondition-failed /
     version / cross-cutting) and which skill or public doc I
     should be reading at each layer. Tell me when I am
     supposed to STOP retrying and escalate.
  8. How do I know my `doca_flow_grpc_server` binary, the
     `.proto` file my Python client was generated against, and
     the `doca-flow` library the server links against on my
     BlueField all came from the same DOCA install? What is
     the right way to handle it if they did not?

  After that, briefly generalize: name ONE OTHER instance of
  this class — for example, switching the client language
  from Python to Go (or Rust, or Java) on the same control-
  plane topology, OR keeping Python but switching from the
  cross-host control-plane VLAN topology to a same-host
  loopback topology — and identify which parts of your answer
  above STAY THE SAME (the `.proto`-as-contract rule, the
  read-only-smoke-before-state-changing-RPC loop, the gRPC
  status code interpretation rule, the version overlay via
  `doca-version`, the four-way match) versus which CHANGE
  (which `protoc` plugin / gRPC library version applies, the
  exact stub generation command, the auth / TLS / network-
  segment posture, the per-language idioms for dialing and
  invoking RPCs).

context:
  audience: "intermediate"
  intent: "stand_up_remote_doca_flow_control_plane"
  prior_knowledge: "has a doca-flow application running on a BlueField-3 with pipes already created, has a Python service on a different host across a control-plane VLAN, has read about doca-flow-grpc-server but has not used it, is comfortable with the C++ side of doca-flow but does NOT want to invent a Python flag string or RPC name"
  baseline_artifact: "doca-flow-grpc-server"
  changed_skill_in_pr: "tools/doca-flow-grpc-server"
  expected_skill_co_load:
    - "doca-flow-grpc-server"
    - "doca-flow"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-debug"
    - "doca-hardware-safety"

criteria:
  - id: "remote_vs_direct_trade_off_surfaced"
    label: "Surfaces the remote-vs-direct trade-off rather than defaulting to gRPC"
    weight: 3
    pass_when: |
      In response to question 1, the agent explicitly surfaces
      the trade-off: linking `libdoca_flow.so` directly into a
      C++ client in the same address space is simpler, faster,
      and has a smaller attack surface; the gRPC server is the
      right answer only when the deployment topology genuinely
      requires a network boundary (cross-host client) or a
      client language without bindings to `libdoca_flow.so`.
      The agent must say when each side wins. A response that
      defaults to gRPC without surfacing the direct-link
      alternative, that asserts gRPC is always the right
      answer, or that treats remote-vs-direct as a non-question,
      fails.

  - id: "proto_file_is_the_authoritative_contract"
    label: "Names the shipped .proto files on the user's install as the authoritative gRPC contract"
    weight: 3
    pass_when: |
      In response to question 2, the agent explicitly states
      that the AUTHORITATIVE gRPC contract is the `.proto`
      files shipped under the tool's source tree on the user's
      DOCA install (the path is install-specific; the agent
      should point the user there rather than invent a path).
      The agent must refuse to quote RPC method names like
      `AddFlowRule` or `ListPipes` from generic gRPC patterns
      or blog posts as if they were authoritative; the right
      answer is to ask the user to confirm the method names by
      reading the shipped `.proto` files. The agent should
      also route to the public DOCA Flow gRPC Server page on
      `docs.nvidia.com` (via `doca-public-knowledge-map ## DOCA
      tools`) for the documented release-specific contract. A
      response that quotes RPC method names from memory and
      presents them as authoritative, that omits the `.proto`
      file location entirely, or that asserts a documented set
      of methods exists without checking, fails.

  - id: "auth_tls_segment_posture_named"
    label: "Names the auth / TLS / network-segment posture as a load-bearing operator decision"
    weight: 3
    pass_when: |
      In response to question 3, the agent walks the auth /
      TLS / network-segment posture as three independent
      decisions: (a) auth mechanism (mTLS-with-client-cert,
      token-based, or plaintext-on-trusted-segment), (b) TLS
      posture (TLS, mTLS, or plaintext only on a genuinely
      trusted segment), (c) network segment the endpoint binds
      on (loopback, an internal management VLAN, a control-
      plane-only subnet, or a broader network). The agent must
      explicitly route the gRPC-ecosystem-side guidance to the
      `grpc.io` auth concepts page, must refuse to invent a
      specific CA / cert path or token shape, and must
      explicitly state that binding on `0.0.0.0` without auth
      or TLS is an admin attack surface. A response that
      treats auth / TLS as optional, that asserts a default
      posture without operator review, or that recommends
      binding broadly without TLS, fails.

  - id: "client_stub_generation_routed_to_grpc_io"
    label: "Routes client stub generation to standard gRPC tooling (protoc + language plugin) per grpc.io"
    weight: 2
    pass_when: |
      In response to question 4, the agent explicitly names
      the standard gRPC client stub generation tooling
      (`protoc` + the language-specific gRPC plugin) and
      routes the user to `grpc.io` (the gRPC language support
      / quickstart pages) for the Python-specific invocation.
      The agent must say that the same tooling generalizes to
      Go, Rust, Java, and other languages the standard gRPC
      ecosystem covers. The agent must NOT invent a
      Python-specific stub generation command from memory; the
      authoritative source is `grpc.io`. A response that
      invents a `protoc` invocation, that omits the
      `grpc.io` routing, or that asserts a hand-written
      Python client without the `.proto` file inputs, fails.

  - id: "smoke_before_state_changing_rpc"
    label: "Walks the read-only smoke BEFORE any state-changing RPC"
    weight: 3
    pass_when: |
      In response to questions 5 and 6, the agent walks the
      explicit ordered flow: (a) FIRST start the server with
      the chosen auth / TLS / bind config; (b) THEN confirm
      the server bound the configured endpoint from the
      server's own log; (c) THEN dial the endpoint from ONE
      Python client and complete the TLS handshake / auth
      check; (d) THEN issue ONE read-only RPC documented in
      the shipped `.proto` files (the method name comes from
      the `.proto`, NOT from agent memory); (e) THEN cross-
      check the response against the live `doca-flow`
      application's own view; (f) ONLY THEN issue a
      state-changing RPC. The agent must NOT collapse the
      sequence, must NOT issue a state-changing RPC before the
      read-only smoke is clean, and must explicitly state that
      a state-changing RPC does to Flow state exactly what a
      direct `libdoca_flow.so` call would do. A response that
      jumps from "server bound" to "issue a mutating RPC", or
      that treats the read-only smoke as optional, fails.

  - id: "grpc_status_codes_quoted_not_paraphrased"
    label: "Quotes gRPC status codes verbatim and maps them to the layered taxonomy"
    weight: 2
    pass_when: |
      In response to questions 6 and 7, the agent quotes
      standard gRPC status codes verbatim (`UNAVAILABLE`,
      `UNAUTHENTICATED`, `PERMISSION_DENIED`,
      `INVALID_ARGUMENT`, `NOT_FOUND`, `FAILED_PRECONDITION`,
      etc.) and maps each one to a layer in the error
      taxonomy: `UNAUTHENTICATED` / `PERMISSION_DENIED` →
      TLS-or-auth-rejected; `INVALID_ARGUMENT` → RPC-call-
      error from a malformed request; `NOT_FOUND` /
      `FAILED_PRECONDITION` → Flow-side precondition (route to
      `doca-flow`). The agent must route the canonical
      interpretation of the status codes to the
      `grpc.io` status codes reference. The agent must NOT
      paraphrase the status code (e.g. "the auth thing
      failed") instead of quoting it. A response that
      paraphrases status codes, that asserts a status code
      means something other than what `grpc.io` documents, or
      that omits the routing to `grpc.io`, fails.

  - id: "endpoint_is_an_admin_attack_surface"
    label: "Treats the gRPC endpoint as an admin attack surface attached to the dataplane"
    weight: 3
    pass_when: |
      In response to questions 3, 6, and 7, the agent
      explicitly states that exposing `doca_flow_grpc_server`
      is an ADMIN ATTACK SURFACE attached to the dataplane —
      every state-changing RPC does to Flow state exactly what
      a direct `libdoca_flow.so` call would do. The agent must
      recommend (a) binding on a trusted segment, (b) gating
      with auth + TLS, (c) smoke-before-bulk, (d) never
      widening access as a workaround. A response that treats
      the endpoint as a benign read-only surface, that
      recommends enabling broad access for convenience, or
      that omits the dataplane-disruption risk of state-
      changing RPCs, fails.

  - id: "no_invented_rpc_or_endpoint_strings"
    label: "Does not invent RPC method names, message field names, or endpoint paths"
    weight: 3
    pass_when: |
      The agent does NOT quote a specific
      `doca_flow_grpc_server` RPC method name, message field
      name, default endpoint path, or auth-mechanism
      identifier from memory as authoritative (e.g. it does
      NOT invent something like `AddFlowRule` / `ListPipes`,
      `localhost:50051`, or a JSON config key that the agent
      did not verify against the shipped `.proto` files or
      the public guide). Instead the agent states that the
      authoritative source for the RPC method inventory,
      message field names, and default endpoint shape is the
      shipped `.proto` files on the user's install plus the
      public DOCA Flow gRPC Server guide (reachable via
      `doca-public-knowledge-map ## DOCA tools`), and
      explicitly tells the user to look them up there. If the
      agent DOES surface a candidate method name, it must
      frame it as a sketch / placeholder with the user told
      to replace it with the value from the shipped
      `.proto`. Inventing a method name and presenting it as
      authoritative fails — that is the canonical
      hallucination failure mode for this skill.

  - id: "version_overlay_with_proto_match"
    label: "Names the version overlay including the .proto-vs-server-binary match"
    weight: 2
    pass_when: |
      In response to question 8, the agent surfaces the
      version-handling rule via `doca-version`: the
      `doca_flow_grpc_server` binary, the `.proto` file the
      client was generated against, the `doca-flow` library
      the server links against, and the host package version
      MUST all come from the same DOCA install per the
      four-way match in `doca-version ## Version compatibility`.
      The agent must say that a client generated from one
      DOCA release's `.proto` cannot be assumed to work
      against a server binary from another release; if the
      contract changed, the client must be regenerated. A
      response that omits the `.proto`-versioned-with-DOCA
      rule, that treats version match as a one-time thing, or
      that omits `doca-version`, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from Python / cross-host to another language or another topology"
    weight: 2
    pass_when: |
      The agent explicitly addresses the generalization part
      of the prompt: it walks at least ONE OTHER instance —
      either switching the client language from Python to Go
      (or Rust, or Java) on the same control-plane topology,
      OR keeping Python but switching from the cross-host
      control-plane VLAN topology to a same-host loopback
      topology — and identifies which parts STAY THE SAME (the
      `.proto`-as-contract rule, the read-only-smoke-before-
      state-changing-RPC loop, the gRPC status code
      interpretation rule, the version overlay via
      `doca-version`, the four-way match) versus which CHANGE
      (which `protoc` plugin / gRPC library version applies,
      the exact stub generation command, the auth / TLS /
      network-segment posture, the per-language idioms for
      dialing and invoking RPCs). A response that walks only
      the worked example and is silent on the broader class
      fails this criterion.
