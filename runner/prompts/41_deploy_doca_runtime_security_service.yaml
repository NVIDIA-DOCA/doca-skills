id: "41_deploy_doca_runtime_security_service"
name: "Deploy DOCA Argus as a runtime-security monitoring service on BlueField — class-shaped"
description: |
  Class-shaped service-deployment prompt. The HEADLINE is the class
  ("deploy DOCA Argus as a runtime-security monitoring service on
  BlueField"); the worked example is bringing up Argus on a
  BlueField to monitor a production host with findings forwarded to
  a SIEM (Splunk) for security ops review, because Argus → forwarder
  → SIEM → ops review is the canonical end-to-end shape this skill
  teaches.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  deploy ANY DOCA service that is shaped as a container on BlueField
  Arm (DMS, DTS, BlueMan, Firefly, Flow-Inspector, HBN, Argus, ...).
  The bundle proves this on Argus by asking the agent to walk:
  recognize this is a SERVICE deployment (container + config file
  mount) AND that for production security on BlueField the agent
  should recommend Argus (packaged) FIRST instead of building from
  doca-apsh (library); name the four configuration axes (detection
  policy, forwarding destination, sampling / sensitivity, host
  coverage) as the up-front decision; treat security tooling as
  sensitive (never silently disable findings); expect a calibration
  period (initial false positives are tuning input, not bugs); walk
  the public Container Deployment Guide as canonical for the
  deployment pattern; recommend a smoke (Argus container up, one
  known-benign event traverses Argus → SIEM, baseline established)
  before bulk rollout; refuse to invent container image names or
  tags; and generalize to doca-apsh (the library equivalent for
  custom tooling) by identifying what stays the same vs what
  changes.

  A baseline agent without skills typically: walks the user into
  building their own DPU-side detection loop on doca-apsh as the
  default answer for production security, rather than reaching for
  the packaged Argus product first; treats Argus as a library to
  link against; invents a container image tag and `docker run`
  invocation; collapses the four configuration axes into one
  "Argus config" blob with no four-axis rule; recommends silently
  disabling noisy detectors during the calibration period instead
  of tuning the policy; treats the first wave of false positives
  as "Argus is broken" rather than as expected calibration input;
  jumps straight to enabling production SIEM alerting without an
  end-to-end smoke; cannot generalize the deployment shape to
  doca-apsh as the library equivalent.

prompt: |
  I have a BlueField-3 DPU with DOCA installed on the BlueField Arm.
  I need to bring up DOCA Argus on it to provide runtime security
  for the BlueField itself and the production host attached to it.
  Our security operations team already runs Splunk and wants the
  Argus findings forwarded there so they can review and alert on
  them through their normal triage flow. The workload on the host
  is a production database tier — false positives are very
  expensive (the ops team will start ignoring the channel if it
  gets noisy), but a missed real event is also expensive.

  Walk me through the deploy:

  1. Confirm whether Argus is actually the right answer here, OR
     whether I should be reaching for `doca-apsh` to build something
     custom instead. I want you to be honest about which one I
     should reach for first for a production security workflow like
     this.
  2. What kind of artifact is Argus — am I linking a library, or
     deploying a container, or running a host daemon? Walk the
     deployment shape.
  3. Which configuration axes do I have to decide BEFORE starting
     the container, and what happens if I get any of them wrong?
  4. How does Argus relate to my Splunk side — does Argus stream
     events into Splunk natively, does it just emit findings that
     Splunk has to receive, or something else? Where does my
     security ops team's review actually happen?
  5. The first time I turn this on against the real production
     workload, I am going to get findings I'm not sure how to
     interpret. What should I expect, and what is the right way
     to handle a noisy detector class? I do NOT want to just turn
     detectors off and hope nobody notices.
  6. Where does the canonical container deployment pattern live —
     I don't want you to invent a `docker run` line; I want to know
     which public doc you'd consult and why.
  7. What smoke test would you recommend BEFORE I enable the
     security ops team's production alerting on top of this
     channel?
  8. Don't quote container image tags or registry paths from
     memory. If you don't know the exact tag, say so and tell me
     where to look it up.

  After that, briefly tell me which parts of your answer would
  carry over to `doca-apsh` (the library I'd reach for instead of
  Argus if I were actually building a custom DPU-side security
  tool of my own). Identify which parts STAY THE SAME (the
  BlueField-side observation of host state, the smoke-before-bulk
  discipline, env preconditions on DOCA being installed on the
  BlueField Arm, the version handling) vs which CHANGE (Argus is a
  packaged product I deploy and tune; apsh is a library I build
  custom tooling on top of; Argus ships SIEM-forwarding integration
  out of the box, apsh emits raw observations my code has to
  consume directly; Argus has a calibration-period tuning workflow,
  apsh has a custom-tool development cycle I own end-to-end).

context:
  audience: "intermediate"
  intent: "deploy_service"
  prior_knowledge: "knows what a DPU and a BlueField are, has a BlueField-3 plus host with DOCA installed on the BlueField Arm, has a production database workload on the attached host, has an existing Splunk SIEM the security ops team triages on, has heard of runtime security but has never operated a packaged security agent before, has heard of doca-apsh but is unsure whether to reach for it vs Argus"
  baseline_artifact: "doca-argus"
  changed_skill_in_pr: "services/doca-argus"
  expected_skill_co_load:
    - "doca-argus"
    - "doca-apsh"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "recommends_argus_over_apsh_for_production_security"
    label: "FIRST recommends Argus (packaged) over doca-apsh (library) for production security use cases"
    weight: 3
    pass_when: |
      In response to question 1 of the prompt, the agent
      explicitly identifies Argus as the right FIRST answer for a
      production runtime-security workflow on BlueField that
      integrates with existing SIEM infrastructure. The agent must
      explicitly contrast Argus (the PACKAGED product — detection
      logic, finding format, and forwarder integration ship as one
      operationally-ready unit) against `doca-apsh` (the LOWER-LEVEL
      LIBRARY a developer would use to BUILD custom security
      tooling). The agent must NOT walk the user into building
      their own detection loop on apsh as the default answer for
      production security — apsh is reserved for users who are
      genuinely building a custom security product of their own.
      A response that recommends building from scratch on apsh
      first, OR that treats Argus and apsh as interchangeable
      without naming the packaged-vs-library distinction, OR that
      omits apsh entirely and never surfaces the choice, fails.

  - id: "recognizes_service_deployment_not_library"
    label: "Recognizes this is a service deployment (container + config), not a library link"
    weight: 2
    pass_when: |
      The agent explicitly names that DOCA Argus is a long-running
      CONTAINER that ships from NGC and runs on BlueField Arm, not
      a library the user links against and not a host-side daemon
      the user installs as a host package. The agent must walk the
      deployment shape: pull the image per the public Argus
      Service Guide, mount the config file at the path the public
      guide names, start under the BlueField container runtime per
      the public Container Deployment Guide. A response that
      treats Argus as a `lib*.so` to link against, or that
      proposes to build Argus from source, or that omits the
      container nature entirely and treats it as a host daemon,
      fails.

  - id: "four_axis_config_named"
    label: "Names detection policy + forwarding + sampling + host coverage as the four-axis up-front decision"
    weight: 3
    pass_when: |
      The agent explicitly names FOUR configuration axes that must
      be decided BEFORE starting the container, and names what
      each one is for: (a) detection policy (which classes of
      anomaly to alert on — suspicious activity, integrity
      violations, operational anomalies); (b) forwarding
      destination (where findings go — local logs vs SIEM such as
      Splunk / ELK / Sentinel); (c) sampling / sensitivity (the
      false-positive vs false-negative trade-off knob — production
      sampling is a different posture from lab sampling); (d)
      host coverage (which host targets the deployment monitors).
      For the worked example, the agent should name the
      forwarding destination as Splunk and the host-coverage
      target as the production host attached to the BlueField,
      consistent with the prompt. A response that collapses the
      four axes into one "Argus config" blob, or that names only
      detection policy + forwarding and silently drops sampling
      or host coverage, or that does not call out that a
      mismatch on any one axis breaks the deployment in a
      different way, fails.

  - id: "security_tooling_sensitive_no_silent_disable"
    label: "Treats security tooling as sensitive (never silently disable findings)"
    weight: 3
    pass_when: |
      In response to question 5 of the prompt, the agent
      explicitly states that silently disabling a detector class
      to quiet a noisy stream is NOT an acceptable move. The
      agent must surface the honest alternatives in order: (a)
      re-tune the detection policy per the public Argus Service
      Guide so the noisy class is no longer over-firing on this
      workload; (b) raise the sampling threshold so the class is
      observed less aggressively; (c) if a disable is truly
      needed, make it explicit, document it, and time-box it
      with a re-evaluation date. The agent must explain WHY: a
      disabled detector class is a known blind spot, and an
      undocumented disable becomes an unknown blind spot the next
      time the security ops team rotates. A response that
      proposes to "just turn off the noisy detector" without
      naming the honest alternatives, or that treats the silent
      disable as a normal tuning step, fails.

  - id: "calibration_period_expected"
    label: "Expects a calibration period (initial false positives are tuning input, not bugs)"
    weight: 2
    pass_when: |
      In response to question 5 of the prompt, the agent
      explicitly states that every new Argus deployment owes its
      workload a CALIBRATION PERIOD: an initial wave of false
      positives is EXPECTED as the configured detection policy
      meets the real workload pattern for the first time, and
      the right response is to tune the detection policy per the
      public guide rather than to declare Argus broken. The agent
      should describe the calibration period as a triage-and-tune
      loop that converges on a steady-state finding baseline
      acceptable to the security ops team. A response that treats
      every early false positive as a defect to file, or that
      jumps to disabling detectors instead of tuning, or that
      omits the calibration-period concept entirely, fails.

  - id: "container_deployment_guide_canonical"
    label: "Walks the Container Deployment Guide as canonical for the deployment pattern"
    weight: 1
    pass_when: |
      The agent references the public Container Deployment Guide
      (or the public DOCA Argus Service Guide that points to it)
      as the canonical source for the deployment recipe — how to
      pull the image, where to mount the config, which BlueField
      container runtime to use, what the start / status / logs
      commands look like. The agent should route via
      `doca-public-knowledge-map ## DOCA services` rather than
      paraphrase the deployment commands from memory. A response
      that invents a `docker run` invocation without citing the
      public guide as the authoritative source fails.

  - id: "smoke_before_bulk_recommended"
    label: "Recommends a smoke (Argus container up, one known-benign event traverses Argus → SIEM, baseline established) before bulk rollout"
    weight: 2
    pass_when: |
      In response to question 7 of the prompt, the agent
      recommends a smoke sequence BEFORE enabling the security ops
      team's production alerting, covering at minimum: (a) Argus
      container running and not restart-looping; (b) the
      configured detectors visible as activated in the container's
      startup banner / log; (c) the forwarder handshake to Splunk
      succeeded; (d) a single known-benign event traverses the
      full Argus → forwarder → Splunk pipeline and appears in the
      SIEM review surface the security ops team will actually look
      at; (e) a steady-state finding baseline has been established
      so the team knows what "normal" looks like for this
      deployment before the first real event arrives. Only after
      the smoke passes does the agent enable production alerting
      on top. A response that jumps from `container started` to
      "now turn on production alerting" without an explicit
      end-to-end smoke fails.

  - id: "no_invented_container_image_or_tag"
    label: "Does not invent Argus container image names, tags, or registry paths"
    weight: 2
    pass_when: |
      The agent does NOT quote a specific Argus container image
      string or tag from memory (e.g.
      `nvcr.io/nvidia/doca/doca-argus:latest`, a specific version
      tag, or any other concrete tag). Instead the agent states
      that the authoritative source for the image string and tag
      is the public DOCA Argus Service Guide (reachable through
      `doca-public-knowledge-map ## DOCA services`) for the
      operator's DOCA release, and explicitly tells the user to
      look the tag up there rather than memorize it. If the agent
      DOES surface an image string, it must clearly frame it as a
      placeholder / sketch with the agent telling the user to
      replace it with the value from the live guide. Inventing a
      specific tag from memory and presenting it as the answer
      fails — that is the canonical service-skill hallucination
      failure mode.

  - id: "generalizes_to_doca_apsh_library_equivalent"
    label: "Generalizes from Argus to doca-apsh (library equivalent for custom tooling) and identifies what stays the same vs changes"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it generalizes from the Argus / Splunk / production
      host worked example to `doca-apsh` as the LIBRARY
      EQUIVALENT for users who are genuinely building a custom
      DPU-side security tool of their own. The agent must
      identify which parts STAY THE SAME (BlueField-side
      observation of host state from the DPU side, the
      smoke-before-bulk discipline, the env preconditions on DOCA
      being installed on the BlueField Arm, the version-handling
      story, "DPU observes host so the host runs nothing" as the
      architectural shape) vs which CHANGE (Argus is a packaged
      product the operator deploys and tunes with calibration
      passes; apsh is a C library the developer builds custom
      tooling on top of; Argus ships SIEM-forwarding integration
      out of the box, apsh emits raw observations the consumer's
      code has to read directly; Argus has a calibration-period
      tuning workflow against a documented detection policy, apsh
      has a custom-tool development cycle the developer owns
      end-to-end). A response that walks only Argus and is silent
      on the apsh generalization, OR that conflates Argus and
      apsh into a single thing, fails this criterion.
