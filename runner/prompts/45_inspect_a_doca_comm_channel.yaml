id: "45_inspect_a_doca_comm_channel"
name: "Inspect a stuck DOCA Comm Channel from the host or DPU — class-shaped"
description: |
  Class-shaped admin-tool inspection prompt. The HEADLINE is the
  class ("inspect a stuck DOCA control-plane channel from the
  outside using its admin CLI, then decide whether to drain or
  restart"); the worked example is a stuck DOCA Comch channel
  between a host process and a DPU agent inspected via the DOCA
  Comm Channel Admin Tool, because that is the newly-covered tool
  in skills/tools/doca-comm-channel-admin.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  drive ANY DOCA control-plane admin / inspection CLI by pairing
  it with the library that created the state it inspects, walking
  the list → inspect → decide flow, and gating state-changing
  operations on a clean read-only smoke. The bundle proves this on
  the Comm Channel Admin Tool by asking the agent to: pair the
  admin tool with the doca-comch library that owns the channels;
  walk the list → inspect-one → decide-drain-vs-restart sequence;
  treat drain and restart as state-changing operations gated on a
  smoke-before-bulk inspection; refuse to invent CLI flag strings,
  subcommand names, or output column names; honor the
  version-handling overlay via doca-version; and generalize to
  another DOCA admin / inspection pattern by analogy.

  A baseline agent without skills typically: invents a
  `doca_comch_admin --restart-channel <id>` style flag string from
  generic CLI knowledge; recommends restart as the first move on a
  stuck channel without an inspection step in between; treats
  drain and restart as interchangeable retries; conflates the admin
  tool's name with the library name (assumes the tool was also
  renamed to "comch" in DOCA 2.5); jumps to code changes on the
  Comch program when the real cause is a representor / driver
  layer issue the admin tool would have surfaced; and cannot
  generalize the list → inspect → decide pattern to other DOCA
  admin tools.

prompt: |
  I have a host-side process and a DPU-side agent that have been
  exchanging DOCA Comch messages for a few hours. Suddenly the
  host side reports its slow-path send-task is hanging and the
  recv callback on the DPU side has stopped firing. The Comch
  program on both sides is still running — the processes are
  alive, no obvious crash — but no messages are flowing.

  Before I touch the program or restart the processes, I want to
  inspect the channel from outside the program using the DOCA
  admin CLI for Comch. Walk me through:

  1. Which admin tool I should reach for (and which library it
     pairs with), and where its canonical public documentation
     lives.
  2. The first thing I should run on a stuck channel — which side
     (host vs DPU Arm) and what kind of operation. I do NOT want
     you to invent flag strings or subcommand names from memory;
     if you don't know the exact spelling, say so and tell me
     where to look it up on my installed version.
  3. What I should look at in the output to decide whether the
     channel is genuinely stuck or just busy.
  4. If the channel really is stuck, walk me through the decision
     of whether to drain it or restart it. I want to understand
     which one is the lower-stakes move, what the program side
     will observe in each case, and what I should re-check
     immediately after.
  5. If both drain and restart fail to unstick the channel, where
     do I go next? I want to know which layer below the admin tool
     I should be looking at, and which skills / docs cover that
     layer.
  6. How do I know the admin tool I'm running and the comch `*.so`
     my program linked against came from the same DOCA install?
     What is the right way to handle it if they didn't?

  After that, briefly generalize: name ONE OTHER DOCA admin /
  inspection CLI (for example a tool that inspects another DOCA
  library's runtime state on the BlueField), and identify which
  parts of your answer above STAY THE SAME for that other tool
  (the list → inspect → decide pattern, the smoke-before-bulk
  gating of state-changing operations, the public-guide-plus-`--help`
  source-of-truth rule, the version-handling overlay) versus
  which CHANGE (the library the tool pairs with, the per-channel
  / per-object state surface, the specific subcommand names, the
  permission shape).

context:
  audience: "intermediate"
  intent: "inspect_admin_tool_state"
  prior_knowledge: "has a host + BlueField-3 pair, knows what DOCA Comch is at a high level, has a Comch program in production but has never used the Comm Channel Admin Tool, is currently looking at a stuck channel symptom"
  baseline_artifact: "doca-comm-channel-admin"
  changed_skill_in_pr: "tools/doca-comm-channel-admin"
  expected_skill_co_load:
    - "doca-comm-channel-admin"
    - "doca-comch"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"
    - "doca-debug"

criteria:
  - id: "pairs_admin_tool_with_comch_library"
    label: "Pairs the admin tool with the doca-comch library and names its public doc"
    weight: 3
    pass_when: |
      In response to question 1, the agent explicitly identifies
      the DOCA Comm Channel Admin Tool as the right answer AND
      explicitly pairs it with the `doca-comch` library (the
      library that created the channels the admin tool inspects).
      The agent must say that the admin tool is the operator-side
      / read-only-first counterpart to the comch library's
      programmatic surface, and route the user at the public DOCA
      Comm Channel Admin Tool guide via
      `doca-public-knowledge-map ## DOCA tools` for the canonical
      flag and subcommand inventory. A response that names the
      admin tool but never connects it to the comch library, OR
      that recommends going straight to the comch library API
      without using the admin tool first, OR that invents an
      unrelated tool name, fails.

  - id: "walks_list_inspect_decide_flow"
    label: "Walks list → inspect-one → decide-drain-vs-restart in that order"
    weight: 3
    pass_when: |
      In response to questions 2-4, the agent walks the explicit
      ordered flow: (a) FIRST enumerate / list the channels from
      the side the user reports the symptom; (b) THEN inspect the
      one channel the user is asking about by its identifier from
      step (a); (c) THEN read the per-channel state from the
      inspection output to decide whether the channel is healthy,
      busy, or genuinely stuck; (d) ONLY THEN, if stuck, consider
      drain or restart. The agent must NOT jump from "the channel
      seems stuck" straight to a state-changing operation; the
      inspection step is the load-bearing piece. A response that
      collapses the steps, that recommends drain or restart as
      the first move, or that invents a one-shot "fix it"
      subcommand, fails.

  - id: "drain_and_restart_are_high_stakes"
    label: "Treats drain and restart as state-changing, gated on a clean smoke and on root-cause, never retried in place"
    weight: 3
    pass_when: |
      In response to questions 4 and 5, the agent explicitly
      states that drain and restart are STATE-CHANGING operations
      (not read-only), that each can interrupt in-flight traffic,
      and that each may surface to the program side as
      DOCA_ERROR_CONNECTION_RESET or a DISCONNECTED transition on
      the connection callback. The agent must gate each on a
      clean read-only inspection FIRST (smoke-before-bulk), name
      drain as the lower-stakes of the two when in-flight work
      might still complete, and name restart as the
      higher-stakes move reserved for after drain did not help or
      when the peer is gone. The agent MUST also say that if a
      state-changing operation does not resolve the symptom, the
      next move is to escalate to a deeper layer (driver /
      firmware / mode / partial install) per the cross-cutting
      debug ladder — NOT to re-issue the same drain or restart as
      a retry. A response that treats drain / restart as
      interchangeable retries, that recommends restart first
      without inspection, or that loops on the same
      state-changing operation as a workaround, fails.

  - id: "no_invented_cli_strings"
    label: "Does not invent CLI flag strings, subcommand names, or output column names"
    weight: 3
    pass_when: |
      The agent does NOT quote a specific admin-tool subcommand
      name, flag string, or output column name from memory as
      authoritative (e.g. it does NOT invent something like
      `doca_comch_admin list --json`, `--restart-channel <id>`,
      or a specific output column header). Instead the agent
      states that the authoritative source for the subcommand
      inventory, flag names, channel-identifier shape, and
      output column names is the public DOCA Comm Channel Admin
      Tool guide (reachable via
      `doca-public-knowledge-map ## DOCA tools`) plus the
      installed `--help` on the user's version, and explicitly
      tells the user to look them up there rather than memorize
      them. If the agent DOES surface a candidate command shape,
      it must clearly frame it as a placeholder / sketch with
      the agent telling the user to replace it with the value
      from `--help`. Inventing a specific flag string from
      memory and presenting it as the answer fails — that is
      the canonical admin-tool hallucination failure mode.

  - id: "version_overlay_via_doca_version"
    label: "Names the version overlay via doca-version and the partial-install hazard"
    weight: 1
    pass_when: |
      In response to question 6, the agent surfaces the
      version-handling rule via `doca-version`: the admin tool's
      `--version` and `pkg-config --modversion doca-comch`
      MUST agree as part of the four-way match, and disagreement
      is a partial-install hazard the agent must surface (not
      paper over) per `doca-version ## debug`. The agent should
      also surface the naming asymmetry that the admin tool's
      public guide retains the "Comm Channel" name even on
      installs ≥ 2.5 where the library was renamed to
      `doca-comch` — searching for "DOCA Comch Admin" alone may
      miss the right guide. A response that treats the version
      check as optional, that asserts tool and library versions
      match without checking, or that omits the naming asymmetry
      entirely, fails.

  - id: "generalizes_beyond_worked_example"
    label: "Generalizes from the Comm Channel Admin Tool to another DOCA admin / inspection pattern"
    weight: 3
    pass_when: |
      The agent explicitly addresses the generalization part of
      the prompt: it names at least ONE OTHER DOCA admin /
      inspection CLI (for example doca_caps for capability
      inspection, a DPA admin or statistics tool, a Flow Tune
      tool, a PCC counter tool, or any other DOCA tool that
      pairs with a DOCA library to inspect its runtime state)
      and identifies which parts STAY THE SAME (the list →
      inspect → decide pattern, the smoke-before-bulk gating of
      any state-changing operation, the
      public-guide-plus-`--help` source-of-truth rule, the
      version overlay via `doca-version`, pairing the tool with
      its companion library skill) vs which CHANGE (the library
      the tool pairs with, the per-channel / per-object state
      surface the tool reports, the specific subcommand names,
      the permission shape, whether the tool has any
      state-changing operations at all). A response that walks
      only the Comm Channel Admin Tool worked example and is
      silent on the broader admin / inspection-tool catalog
      fails this criterion.
