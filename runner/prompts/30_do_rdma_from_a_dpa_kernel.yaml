id: "30_do_rdma_from_a_dpa_kernel"
name: "Do RDMA directly from a DPA kernel — class-shaped"
description: |
  Class-shaped *DPA-side RDMA escape hatch* prompt. The HEADLINE is
  the class ("do RDMA directly from a DPA kernel — the DPA-side
  verbs surface beneath the host-side doca-dpa control library");
  the worked example is a user whose doca-dpa kernel needs to fetch
  a 4 KiB buffer from a remote peer via RDMA read, process it on
  the DPA, and signal completion without round-tripping to the
  host CPU. The DPA-Verbs material is folded into the doca-dpa
  skill itself as the `## verbs` H2 anchor (see `doca-dpa
  CAPABILITIES.md ## verbs` and `doca-dpa TASKS.md ## verbs`),
  not a separate skill.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  navigate the 4-way RDMA matrix (host vs DPA execution side, ×
  high-level vs raw verbs abstraction level) for ANY RDMA need
  the user surfaces. The bundle proves this by asking the agent
  to walk: (1) navigate the 4-way matrix FIRST and place this case
  in the right corner; (2) confirm the host round-trip is the
  actual measured latency bottleneck (not an intuition);
  (3) name the host-configures-QP / DPA-uses-QP coupling pattern
  (QPs are configured by the host through doca-dpa; the DPA-side
  doca_dpa_verbs_* primitives consume the QP handles); (4) name
  doca-dpa as the required parent skill AND DPACC as the required
  DPA-side build component; (5) run the doca_dpa_verbs_cap_*
  query on the HOST against the active doca_devinfo BEFORE the
  kernel is launched (not from inside the kernel); (6) recommend
  a single-WR-post smoke (one DPA kernel launch posting one RDMA
  read; one completion observed from the host) BEFORE scaling;
  (7) avoid inventing doca_dpa_verbs_* / doca_dpa_* API symbols;
  (8) generalize to the other three corners of the 4-way matrix
  (doca-rdma, doca-rdma-verbs, and the DPA-Comms surface folded
  into doca-dpa as `## comms`) and name what stays the same vs
  what changes.

  A baseline agent without skills typically: jumps straight into
  DPA-side code because the user said "RDMA from the DPA" without
  first checking whether the host round-trip is actually the
  bottleneck; conflates doca-dpa-verbs with the host-side
  doca-rdma-verbs and recommends the host-side raw-verbs surface
  for a DPA-side need (or vice versa); conflates doca-dpa-verbs
  with doca-dpa-comms (the local-messaging DPA-side library, which
  is not RDMA); has the DPA kernel "create the QP" rather than
  consume a host-configured QP handle; forgets DPACC is the
  DPA-side compiler and proposes building the DPA-side translation
  unit with the host C/C++ compiler; cap-queries from inside the
  kernel (or skips the cap-query entirely) instead of from the host
  before launch; treats the smoke as a streaming-launch loop;
  invents API symbols like doca_dpa_verbs_post_rdma_read_easy() or
  doca_dpa_verbs_init_qp(); and never generalizes back to the other
  three corners of the matrix.

prompt: |
  I have a BlueField DPU plugged into a host over PCIe, DOCA
  installed on the host, the DPACC compiler installed alongside it,
  and I'm already running a small piece of compute on the DPA
  processor through doca-dpa — a kernel I wrote, that DPACC
  compiled into the DPA application image my host program loads
  and launches. So the host-side DPA lifecycle (per-DPA-instance
  context, loaded image, DPA thread, host-launched kernel,
  host-observed completion) is in place.

  The problem: my DPA kernel produces a small intermediate result,
  and then it needs the next 4 KiB input buffer from a remote peer
  to continue. Today the kernel exits, the host wakes up, the host
  posts an RDMA read for the next buffer, the host waits for the
  RDMA completion, and then the host re-launches the kernel. We've
  measured this pipeline and the host round-trip between
  "DPA finishes one step" and "next RDMA read completes on the
  host so the host can re-launch" is the dominant per-step latency
  for our workload.

  Someone on my team said "just have the DPA kernel do the RDMA
  read itself with doca-dpa-verbs", since we'd skip the
  DPA → host → DPA round-trip entirely. Someone else said
  "doca-dpa-comms — isn't that the DPA-side communication
  library?". A third person said "doca-rdma-verbs sits below
  doca-rdma; that's basically what you want, right?" and another
  pointed at the host-side doca-rdma we're already using.

  Walk me through this. Specifically:

  1. Before I touch any DPA-side code, which of those four DOCA
     surfaces (doca-rdma, doca-rdma-verbs, doca-dpa-comms,
     doca-dpa-verbs) is actually the right place for this need,
     and how do I tell the wrong ones apart from the right one?
     What would change your answer if the host round-trip turned
     out NOT to be the bottleneck?
  2. Assuming this case really does land on doca-dpa-verbs:
     which side of the program owns the RDMA QP setup, and which
     side does the RDMA-read post? Where does doca-dpa fit in
     relative to doca-dpa-verbs? And what compiles the DPA-side
     translation unit that issues the RDMA read?
  3. Before I launch the modified kernel, what capability do I
     have to check and from which side? Can the DPA-side code
     check it for me at runtime inside the kernel, or does the
     check live on the host?
  4. What's the cheapest smoke test that proves my DPA kernel
     can actually do a single RDMA read directly and produce a
     visible completion, before I scale this to a streaming
     compute + RDMA loop? How do I see whether the kernel even
     finished — both for the kernel itself, and for the RDMA op
     it issued?
  5. Once it works, when should I stay on the DPA-side RDMA path
     and when should I move it back to host-side RDMA?

  Then briefly tell me which parts of your answer generalize to
  the OTHER three corners of the matrix above — what SHAPE stays
  the same when picking between any of doca-rdma /
  doca-rdma-verbs / doca-dpa-comms / doca-dpa-verbs, and what
  CHANGES across the four.

context:
  audience: "intermediate"
  intent: "do_rdma_from_a_dpa_kernel"
  prior_knowledge: "already runs a doca-dpa setup with a DPACC-compiled DPA kernel that the host launches, has measured the host round-trip and confirmed it dominates per-step latency, has DOCA + DPACC installed, knows what a BlueField DPU is, has not used doca-dpa-verbs before, has not written DPA-side RDMA code before"
  baseline_artifact: "doca-dpa"
  changed_skill_in_pr: "libs/doca-dpa"
  expected_skill_co_load:
    - "doca-dpa"
    - "doca-rdma"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "navigates_four_way_matrix_first"
    label: "FIRST navigates the 4-way matrix (host vs DPA × high-level vs verbs) and places the case correctly"
    weight: 2
    pass_when: |
      The agent's FIRST move is to lay out the 4-way matrix
      explicitly — TWO axes (execution side: host CPU vs DPA
      processor; abstraction level: high-level task vs raw verbs)
      yielding FOUR libraries (doca-rdma, doca-rdma-verbs,
      doca-dpa-comms, doca-dpa-verbs) — and to place THIS user's
      case in the doca-dpa-verbs corner with explicit reasoning
      tied to BOTH axes (the kernel needs RDMA semantics AND the
      execution must happen on the DPA, not the host). The
      DPA-Verbs surface is folded into the doca-dpa skill as the
      `## verbs` H2 anchor (see `doca-dpa CAPABILITIES.md
      ## verbs`); the agent must place the case there. The agent
      must explicitly distinguish doca-dpa-verbs from each of the
      other three corners: doca-rdma (different execution side
      AND different abstraction level), doca-rdma-verbs (different
      execution side; same abstraction level), and doca-dpa-comms
      (same execution side but different purpose — local DPA
      messaging, not RDMA, folded into doca-dpa as `## comms`).
      A response that walks straight into DPA-side code without
      surfacing the matrix, OR that names only one or two of the
      four libraries, OR that conflates doca-dpa-verbs with
      doca-dpa-comms ("isn't it the same DPA-side library?"),
      fails this criterion.

  - id: "confirms_host_roundtrip_bottleneck"
    label: "Confirms host round-trip is the actual measured bottleneck before recommending the drop into DPA-side verbs"
    weight: 2
    pass_when: |
      The agent explicitly frames the decision to drop into
      doca-dpa-verbs as conditional on the host round-trip
      *actually* being the measured latency bottleneck (the user
      states they measured this; the agent confirms it as the
      load-bearing precondition and explicitly says what would
      change the answer if it were not measured). The agent says
      that if the host round-trip were NOT the bottleneck, the
      right answer would be host-side doca-rdma (or
      doca-rdma-verbs for raw-verbs needs), because the
      two-side-program maintenance cost of DPA-side RDMA is not
      paid for unless the latency win is real. A response that
      recommends dropping to DPA-side RDMA without naming the
      bottleneck-evidence precondition, OR that treats "I want
      RDMA from the DPA" as automatically sufficient, fails.

  - id: "host_configures_qp_dpa_uses_qp"
    label: "Names the host-configures-QP / DPA-uses-QP coupling pattern"
    weight: 2
    pass_when: |
      The agent explicitly teaches that the RDMA QP(s) the DPA
      kernel posts against are CREATED AND CONFIGURED ON THE HOST
      SIDE through the parent doca-dpa setup, and that the
      DPA-side translation unit's doca_dpa_verbs_* primitives
      consume the QP handle(s) the host setup made available to
      the kernel (typically through the launch-argument shape or
      DPA-visible memory). The agent must explicitly reject the
      naive model "the DPA kernel creates its own QP" and place
      the QP-create work on the host side. A response that has
      the DPA-side code calling something like a QP-create
      primitive, OR that is silent on which side owns the QP
      lifecycle, fails.

  - id: "doca_dpa_parent_and_dpacc_named"
    label: "Names doca-dpa as the parent skill AND DPACC as the required DPA-side compiler"
    weight: 2
    pass_when: |
      The agent explicitly names doca-dpa (the host-side DPA
      control library) as the PARENT skill the DPA-Verbs material
      lives under — the `## verbs` H2 anchor inside the doca-dpa
      skill is where the DPA-Verbs overlay is documented (see
      `doca-dpa CAPABILITIES.md ## verbs` and `doca-dpa
      TASKS.md ## verbs`); the DPA-side `doca-dpa-verbs` library
      presupposes the host-side doca-dpa flow is already loaded
      and adopted. AND the agent explicitly names DPACC (dpacc)
      as the compiler that builds the DPA-side translation unit
      (the one that calls doca_dpa_verbs_*) into the binary the
      host executable embeds as the DPA application image. The
      agent must NOT add doca-dpa-verbs to the host link line (it
      is a DPA-side library; host links against doca-dpa +
      doca-common only). A response that omits doca-dpa, OR that
      places doca-dpa-verbs on the host link line, OR that names
      "a C compiler" / "the system compiler" as sufficient for
      the DPA-side translation unit instead of DPACC, fails this
      criterion.

  - id: "cap_query_on_host_before_kernel_launch"
    label: "Cap-queries the SPECIFIC DPA-side verb on the HOST against doca_devinfo BEFORE the kernel is launched"
    weight: 2
    pass_when: |
      The agent says the user MUST run a doca_dpa_verbs_cap_*
      query against the active doca_devinfo for the SPECIFIC
      verb / opcode the DPA kernel will use (RDMA read in the
      worked example), FROM THE HOST SIDE, BEFORE the DPA kernel
      is launched. The agent must explicitly state that the
      cap-query family lives on the host (because the BlueField
      generation and the DOCA + DPACC install pair determine
      what the DPA hardware exposes) and that the DPA-side
      translation unit cannot cap-query from inside the kernel.
      The agent's recommendation must include BOTH the
      DOCA-version axis (pkg-config --modversion doca-dpa-verbs
      agreeing with doca-dpa, doca-common, doca_caps --version,
      and the installed dpacc per the DOCA Compatibility Policy)
      AND the hardware-presence axis (the BlueField on this host
      actually exposes the DPA-side verb the kernel will post).
      A response that proposes cap-querying from inside the
      kernel, OR that skips the cap-query entirely, OR that
      quotes only one of the two axes, fails this criterion.

  - id: "single_wr_post_smoke_before_scale"
    label: "Recommends a single DPA-side WR-post smoke (one kernel launch, one RDMA read, one completion) BEFORE scaling"
    weight: 1
    pass_when: |
      Before any second WR opcode, second QP, or
      streaming-launch loop, the agent explicitly recommends a
      single-shot smoke: exactly ONE DPA kernel launch, exactly
      ONE doca_dpa_verbs_* WR post inside the kernel (an RDMA
      read of the small remote buffer in the worked example),
      exactly ONE completion observed end-to-end on whichever
      completion surface the agent picked (host-side
      doca_dpa_completion drained by host, or in-kernel
      completion poll on the DPA side). The agent must name this
      as the cheapest place to catch a hidden two-side-program
      configuration bug across BOTH the parent doca-dpa setup
      AND the DPA-side WR construction. A response that walks
      straight to a streaming compute + RDMA loop, or that
      skips the single-WR-post smoke, fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_dpa_verbs_* / doca_dpa_* API symbols"
    weight: 1
    pass_when: |
      Every doca_dpa_verbs_* / doca_dpa_* symbol the agent
      mentions is one that actually exists in the public DOCA
      DPA Verbs / DOCA DPA surface (doca_dpa, doca_dpa_app,
      doca_dpa_thread, doca_dpa_kernel_launch_update_*,
      doca_dpa_completion, doca_dpa_cap_*, doca_dpa_verbs_cap_*,
      doca_ctx_start, doca_pe_progress, dpacc — or the agent
      explicitly frames a name as a placeholder / pseudocode the
      user must look up in their installed headers). When in
      doubt, the agent directs the user to
      /opt/mellanox/doca/samples/doca_dpa_verbs/ or the
      DPA-side header path the DPACC compiler uses, rather than
      quoting a symbol from memory. A response that invents API
      names like doca_dpa_verbs_post_rdma_read_easy(),
      doca_dpa_verbs_init_qp(), doca_dpa_verbs_quick_post(), or
      doca_dpa_verbs_attach_completion_easy() fails — that is
      the baseline-agent hallucination failure mode the bundle
      exists to prevent.

  - id: "generalizes_across_four_corners_of_matrix"
    label: "Generalizes to the other 3 corners of the 4-way matrix; names what stays the same vs what changes"
    weight: 2
    pass_when: |
      The agent explicitly addresses the generalization part of
      the prompt: it walks the SHAPE that stays the same across
      all four corners (doca-rdma, doca-rdma-verbs, doca-dpa-comms,
      doca-dpa-verbs) AND what CHANGES across them. The shared
      shape must include at least: the DOCA Core lifecycle on
      the owning side, the cap-query against the active
      doca_devinfo as the runtime authority for what's
      supported, the smoke-before-scale principle, the
      paired-library setup pattern when a library has a parent /
      sibling it presupposes (doca-dpa-verbs ↔ doca-dpa as the
      worked example with the DPA-Verbs material folded into
      doca-dpa as `## verbs`; doca-rdma-verbs ↔ doca-rdma as the
      host-side sibling). The differences must include at least:
      the execution side (host CPU vs DPA processor), raw verbs
      vs task abstractions, comms (local DPA messaging — folded
      into doca-dpa as `## comms`) vs RDMA semantics, the build
      pipeline (host C/C++ compiler for host-side; DPACC for
      DPA-side), the cap-query family per library
      (doca_rdma_cap_* vs doca_rdma_verbs_cap_* vs
      doca_dpa_verbs_cap_*), and which side owns QP / connection
      setup. A response that walks only doca-dpa-verbs and is
      silent on the generalization fails this criterion. A
      response that says any two of the four libraries are
      interchangeable, or that merges their surfaces, fails. A
      response that names a different DOCA library entirely
      (e.g. doca-flow, doca-gpunetio) instead of generalizing
      across the four-corner matrix fails.
