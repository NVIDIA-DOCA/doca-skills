id: "20_bridge_dpdk_app_to_doca_libraries"
name: "Bridge an existing DPDK application to DOCA libraries — class-shaped"
description: |
  Class-shaped DPDK-to-DOCA interop prompt. The HEADLINE is the
  class ("bridge an existing DPDK application to DOCA libraries
  in-place, without rewriting the data-plane"); the worked
  example is adding DOCA Flow rules for HW steering to an
  existing DPDK packet-processing app via the DOCA DPDK Bridge,
  because that is the newly-covered library in
  skills/libs/doca-dpdk-bridge.

  Per AUTHORING.md § 1a, the bundle MUST teach the agent how to
  handle ANY interop request between an existing third-party
  data-plane and DOCA libraries (the DOCA DPDK Bridge is the
  shipped instance; the same SHAPE — interop-layer vs migration,
  matched-pair version coupling across two independent install
  surfaces, capability-query-before-assume, single-trivial-
  operation smoke before scale — applies any time the user's
  starting point is an existing data-plane that does not already
  speak DOCA natively). The bundle proves this by asking the
  agent to walk: recognize the EXISTING-DPDK case FIRST (the
  bridge-vs-native path selection), refuse to recommend a
  full rewrite into native doca-eth, surface the DPDK ↔ DOCA
  matched-pair version coupling explicitly, run cap-query
  against the active doca_devinfo before assuming any bridge
  feature works, walk the DOCA Core lifecycle on top of an
  externally-owned DPDK port, name the conversion path (DPDK
  port → doca_dpdk_port → usable by DOCA Flow), recommend a
  single-trivial-rule smoke before scaling, and refuse to
  invent doca_dpdk_* API symbols.

  A baseline agent without skills typically: ignores that the
  user already has a working DPDK app and recommends rewriting
  the data-plane into native doca-eth as if it were a fresh
  project, never mentions the DPDK ↔ DOCA matched-pair version
  coupling and is then surprised when "the bridge loads but
  every operation returns confusing errors", invents
  doca_dpdk_* API symbols (typically doca_dpdk_init_easy() or
  doca_dpdk_bridge_register_port() with a made-up signature)
  from generic interop knowledge, skips the
  doca_dpdk_*_cap_* query and asserts a particular bridge
  feature works, conflates the DPDK port handle and the
  doca_dpdk_port view (or proposes the bridge "takes over" the
  DPDK port), and jumps from doca_ctx_start() to "now drive
  line rate" without an explicit one-trivial-rule smoke.

prompt: |
  I have a host with a ConnectX NIC, DOCA already installed,
  and an existing C-language packet-processing application of
  mine that already drives an rte_eth_* port via DPDK — mbufs
  in, mbufs out, the normal DPDK fastpath. I want to add
  hardware-offloaded steering on the incoming side using DOCA
  Flow rules (drop / count / forward in HW so my CPU only sees
  the packets I actually care about), WITHOUT rewriting my
  whole data-plane from DPDK into something native. I keep
  reading about both DOCA Ethernet and a DOCA DPDK Bridge and
  I am not sure which one applies to me, or how the DOCA pieces
  even attach to my existing DPDK port.

  Walk me through this end-to-end. Which DOCA library do I link
  for the interop layer (vs. the alternative of rewriting my
  fastpath into native DOCA queues — please don't recommend
  that rewrite unless you can justify it for an existing
  working DPDK app)? What does the DPDK side and the DOCA side
  each have to be on, version-wise — I assume they are not
  independent, but spell out the coupling? Which capability
  queries do I have to run against my install / device before I
  assume any bridge feature works on this hardware? How does my
  existing DPDK port id become a thing DOCA Flow can program a
  rule on — what is the actual handover and lifecycle, and who
  keeps owning the DPDK port? Finally, what is the smallest
  smoke test you'd recommend I run FIRST — before I install my
  real production rule set — to convince myself the bridge is
  alive and one HW steering rule actually applies to packets on
  this port?

  After that, briefly tell me which parts of your answer would
  CHANGE for someone who is starting completely fresh — no DPDK
  code yet, wants to do raw line-rate packet I/O against DOCA
  natively — and which parts would stay the same. I want to
  understand both paths' shape so I can explain to my team why
  we are picking the bridge here.

context:
  audience: "intermediate"
  intent: "bridge_existing_dpdk_app_to_doca_libraries"
  prior_knowledge: "maintains a working C-language DPDK packet-processing app (rte_eth_* / rte_mbuf fastpath), has DOCA installed on the same host, knows DOCA Flow exists for HW steering but has not used the DOCA DPDK Bridge before and does not yet distinguish bridge-mode from native doca-eth"
  baseline_artifact: "doca-dpdk-bridge"
  changed_skill_in_pr: "libs/doca-dpdk-bridge"
  expected_skill_co_load:
    - "doca-dpdk-bridge"
    - "doca-eth"
    - "doca-flow"
    - "doca-version"
    - "doca-structured-tools-contract"
    - "doca-programming-guide"
    - "doca-public-knowledge-map"
    - "doca-setup"

criteria:
  - id: "recognizes_existing_dpdk_case"
    label: "Recognizes the user has EXISTING DPDK code and selects bridge over native doca-eth on that basis"
    weight: 2
    pass_when: |
      The agent's FIRST routing step explicitly recognizes that
      the user has an EXISTING DPDK application (rte_eth_* port,
      rte_mbuf fastpath, working today) and on that basis
      selects the DOCA DPDK Bridge as the right interop layer —
      not native doca-eth. The agent must name both paths and
      tie the selection to "you already have DPDK in your
      codebase", not to a generic preference. A response that
      treats the user as a fresh DOCA-native project, that
      recommends starting from doca-eth without addressing the
      existing DPDK code, or that is silent on the path-
      selection axis (bridge vs native) and jumps straight to
      API calls, fails.

  - id: "no_full_rewrite_recommendation"
    label: "Does NOT recommend a full rewrite of the DPDK data-plane into native doca-eth"
    weight: 2
    pass_when: |
      The agent declines to recommend migrating the user's
      working DPDK data-plane into native doca_eth_rxq /
      doca_eth_txq, and explains why: the bridge exists exactly
      so the user can layer DOCA libraries (DOCA Flow for HW
      steering) on top of the existing DPDK fastpath without a
      multi-week rewrite for a feature the bridge can deliver
      in-place. A response that proposes "first port your
      fastpath to doca-eth, then add Flow rules", that buries a
      migration recommendation in a multi-step plan, or that
      treats the bridge as a short-term workaround on the way to
      a doca-eth rewrite, fails. The bundle exists in part to
      prevent this exact anti-pattern (it is almost always the
      wrong tradeoff for a working DPDK app) and the agent must
      surface that.

  - id: "dpdk_doca_version_coupling_explicit"
    label: "Calls out the DPDK ↔ DOCA matched-pair version coupling explicitly, before any code change"
    weight: 2
    pass_when: |
      The agent explicitly states that DPDK and DOCA are NOT
      independent installs on this skill — the bridge is built
      against a specific DPDK version on each DOCA release, the
      user's installed DPDK must fall within the bridge's
      compatibility window, and disagreement is the canonical
      "the bridge loads but every operation returns confusing
      errors" failure mode. The agent must name the runtime
      probes (pkg-config --modversion doca-dpdk-bridge AND
      pkg-config --modversion libdpdk, plus doca_caps --version)
      and refuse to quote a DPDK version pin from memory. A
      response that walks the DOCA-side four-way match alone, or
      that treats the DPDK install as orthogonal to the bridge,
      or that quotes "the latest DPDK works" without reading the
      host, fails.

  - id: "capability_query_before_assume"
    label: "Runs the doca_dpdk_*_cap_* family against the active doca_devinfo before assuming bridge features"
    weight: 2
    pass_when: |
      The agent says the user MUST query the doca_dpdk_*_cap_*
      family on the active doca_devinfo (in addition to the
      pkg-config presence check) BEFORE assuming any bridge
      feature, conversion shape, or port role works on this
      device + this DOCA + this DPDK. The agent must frame
      cap-query as the runtime authority on top of the version
      check; the exact symbol family is the load-bearing claim,
      not any specific cap-query name. A response that asserts
      a particular bridge feature is available without naming
      the cap-query gate, or that quotes a numeric limit from
      memory, fails.

  - id: "walks_doca_core_lifecycle_on_dpdk_port"
    label: "Walks the DOCA Core lifecycle on top of an externally-owned DPDK port, in order"
    weight: 2
    pass_when: |
      The agent walks the lifecycle across the DPDK ↔ DOCA seam
      explicitly and in order: DPDK side up first
      (rte_eal_init → port configure → rte_eth_dev_start) →
      open doca_dev against the same physical device → register
      the DPDK port with the bridge to obtain a doca_dpdk_port
      handle → pass that handle to the DOCA library (DOCA Flow)
      → doca_ctx_start() on the DOCA-side context → run →
      teardown in reverse (DOCA contexts stop / destroy first,
      then release the bridge handle, then DPDK port stop /
      EAL cleanup). The agent must state explicitly that DPDK
      keeps owning the rte_eth_dev (start, stop, queue config)
      and the bridge handle is a VIEW, not a transfer of
      ownership. A response that registers the bridge handle
      before rte_eth_dev_start, that has the bridge "take over"
      the DPDK port, or that conflates the DPDK and DOCA
      lifecycles into one start/stop, fails.

  - id: "names_conversion_path_to_doca_flow"
    label: "Names the conversion path: DPDK port → doca_dpdk_port → usable by DOCA Flow"
    weight: 2
    pass_when: |
      The agent names the concrete conversion path the user's
      DPDK port follows to become something DOCA Flow can
      program a rule on: the existing DPDK port id (from
      rte_eth_dev_* enumeration) is registered with the bridge
      to produce a doca_dpdk_port handle, and that handle is
      what DOCA Flow programs steering rules onto. The agent
      must keep the boundary clean — DOCA Flow programs the
      rule onto the doca_dpdk_port; the bridge does not program
      the rule itself, and DOCA Flow does not reach DPDK
      directly. A response that has DOCA Flow program the rule
      directly on the rte_eth_* port id, that invents an
      intermediate "DOCA Flow port" abstraction in front of the
      bridge handle, or that omits the conversion path entirely,
      fails.

  - id: "single_rule_smoke_before_scale"
    label: "Recommends a one-trivial-DOCA-Flow-rule smoke (with verification) before installing the production rule set"
    weight: 2
    pass_when: |
      The agent recommends installing ONE trivial DOCA Flow rule
      (e.g. a wide-match drop or count rule on the port) via
      the bridge handle and INDEPENDENTLY verifying that the
      rule is programmed AND that packets are actually steered
      as expected (e.g. counter increments under known traffic,
      or expected packets disappear) as the FIRST functional
      test, BEFORE installing the user's production rule set or
      scaling to line rate. The agent must call out that a
      failure here narrows cleanly to DPDK-side, bridge-
      handover, or DOCA-side, while a failure at scale-up
      without the smoke pass is a much harder bisection across
      two version surfaces. A response that jumps from
      doca_ctx_start() to "install all your rules" without
      naming the single-rule smoke, that recommends a smoke
      without the verification half (only "rule install
      returned success"), or that treats the smoke as optional,
      fails.

  - id: "no_hallucinated_api"
    label: "Does not invent doca_dpdk_* API symbols beyond the bridge's public surface"
    weight: 1
    pass_when: |
      Every doca_dpdk_* (or doca_ctx_*, doca_pe_*) symbol the
      agent mentions is either part of the public bridge
      surface the skill documents (the doca_dpdk_port handle
      object, the doca_dpdk_*_cap_* capability-query family,
      mbuf ↔ doca_buf conversion helpers as a shape) or it is
      explicitly framed as pseudocode / family-pattern / sketch
      with a note that the exact symbol must be verified against
      the user's installed headers under
      /opt/mellanox/doca/infrastructure/include/. A response
      that invents convenience-API names like
      doca_dpdk_init_easy(), doca_dpdk_bridge_register_port()
      with a confidently-asserted exact signature, or
      doca_dpdk_quick_attach(), fails — that is the baseline-
      agent hallucination failure mode the bundle exists to
      prevent. A response that confidently quotes a specific
      cap-query symbol from memory (rather than the
      doca_dpdk_*_cap_* family pattern) also fails.

  - id: "generalizes_to_native_doca_eth_path"
    label: "Generalizes from the bridge (interop) path to the native doca-eth (start-fresh) path, naming both shared and divergent parts"
    weight: 2
    pass_when: |
      The agent explicitly addresses the second part of the
      prompt: it names the native doca-eth (start-fresh, no
      DPDK in the picture) path as the alternative and walks
      which parts of the bridge workflow stay the same on the
      doca-eth path (the universal DOCA Core lifecycle per
      context, capability-query against doca_devinfo BEFORE
      assuming any feature works, env-side preconditions before
      writing code, single-packet / single-rule smoke before
      scale-up) versus which parts CHANGE (bridge = interop
      layer on an externally-owned DPDK port and EAL vs
      doca-eth = native doca_eth_rxq / doca_eth_txq queues
      owned end-to-end by DOCA; the bridge inherits the DPDK
      lifecycle and the mbuf ↔ doca-buf conversion overhead at
      the data-plane boundary while doca-eth has no DPDK
      lifecycle dependency and no conversion overhead; the
      bridge has the matched-pair DPDK ↔ DOCA version coupling
      while doca-eth has only the DOCA-side four-way match).
      A response that walks only the bridge path and is silent
      on generalization to doca-eth, or that names doca-eth
      without identifying the shared vs divergent parts, fails
      this criterion.
